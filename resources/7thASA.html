function loadState() {
  const s = localStorage.getItem('trig_quiz_state');
  if (s) state = JSON.parse(s);
}

function saveState() {
  localStorage.setItem('trig_quiz_state', JSON.stringify(state));
}

let timerInterval;
function startTimer() {
  if (state.submitted) return;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (state.time <= 0) {
      clearInterval(timerInterval);
      doSubmit(true);
    } else {
      state.time--;
      if (state.time % 5 === 0) saveState();
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const t = document.getElementById('timer');
  if (state.time <= 0) {
    t.innerText = "00:00";
    t.classList.add('danger');
    return;
  }
  const m = Math.floor(state.time / 60);
  const s = state.time % 60;
  t.innerText = `${m}:${s.toString().padStart(2, '0')}`;
  if (state.time < 300) t.classList.add('danger');
  else t.classList.remove('danger');
}

function render() {
  const container = document.getElementById('quiz-content');
  container.innerHTML = '';
  
  let currentSec = '';
  
  QS.forEach((q, idx) => {
    if (q.sec !== currentSec) {
      currentSec = q.sec;
      const sh = document.createElement('h2');
      sh.className = 'sect-header';
      sh.innerText = `Section ${currentSec}: ${SECTION_META[currentSec].title}`;
      container.appendChild(sh);
    }
    
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'qcard-' + idx;
    
    let html = `<h3>Question ${q.n}</h3>`;
    html += `<div class="qtext">${q.q}</div>`;
    if (q.svg) html += `<div class="qsvg">${q.svg}</div>`;
    html += `<div class="choices">`;
    q.ch.forEach((cText, cIdx) => {
      const checked = state.answers[idx] === cIdx ? 'checked' : '';
      const disabled = state.submitted ? 'disabled' : '';
      html += `
        <label class="choice" id="lbl-${idx}-${cIdx}">
          <input type="radio" name="q${idx}" value="${cIdx}" onchange="capture(${idx}, ${cIdx})" ${checked} ${disabled}>
          <span>${cText}</span>
        </label>
      `;
    });
    html += `</div>`;
    html += `<div class="feedback" id="fb-${idx}"></div>`;
    
    card.innerHTML = html;
    container.appendChild(card);
  });
  
  buildNav();
  updateNav();
  
  if (state.submitted) showResults();
  
  MathJax.typesetPromise();
}

function buildNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  QS.forEach((q, idx) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = 'navbtn-' + idx;
    btn.innerText = q.n;
    btn.onclick = () => document.getElementById('qcard-' + idx).scrollIntoView({behavior: 'smooth', block: 'center'});
    grid.appendChild(btn);
  });
}

function capture(qIdx, cIdx) {
  if (state.submitted) return;
  state.answers[qIdx] = cIdx;
  saveState();
  updateNav();
}

function updateNav() {
  let count = 0;
  let secCounts = { A:0, B:0, C:0, D:0 };
  
  QS.forEach((q, idx) => {
    const btn = document.getElementById('navbtn-' + idx);
    const ans = state.answers[idx];
    
    btn.className = 'nav-btn';
    if (ans !== undefined) {
      count++;
      secCounts[q.sec]++;
      if (state.submitted) {
        if (ans === q.ans) btn.classList.add('correct');
        else btn.classList.add('incorrect');
      } else {
        btn.classList.add('answered');
      }
    } else if (state.submitted) {
      btn.classList.add('incorrect');
    }
  });
  
  document.getElementById('progress-text').innerText = `${count} / 40 answered`;
  document.getElementById('section-counts').innerText = `A:${secCounts.A} B:${secCounts.B} C:${secCounts.C} D:${secCounts.D}`;
  
  if (state.submitted) document.getElementById('btn-submit').disabled = true;
}

function doSubmit(isTimeout = false) {
  if (state.submitted) return;
  if (!isTimeout) {
    const count = Object.keys(state.answers).length;
    if (count < 40) {
      if (!confirm(`You have only answered ${count} / 40 questions. Are you sure you want to submit?`)) return;
    }
  }
  
  clearInterval(timerInterval);
  state.submitted = true;
  saveState();
  
  QS.forEach((q, idx) => {
    const radios = document.getElementsByName('q' + idx);
    radios.forEach(r => r.disabled = true);
    
    const ans = state.answers[idx];
    const fb = document.getElementById('fb-' + idx);
    fb.style.display = 'block';
    
    if (ans === q.ans) {
      fb.classList.add('correct');
      fb.innerHTML = `<strong>Correct.</strong> ${q.exp}`;
    } else {
      fb.classList.add('incorrect');
      let text = `<strong>Incorrect.</strong> `;
      if (ans === undefined) text += `You did not answer this question. `;
      text += q.exp;
      fb.innerHTML = text;
      
      const correctLbl = document.getElementById(`lbl-${idx}-${q.ans}`);
      if (correctLbl) {
        correctLbl.style.borderColor = 'var(--ok)';
        correctLbl.style.backgroundColor = 'var(--ok-bg)';
      }
      if (ans !== undefined) {
        const wrongLbl = document.getElementById(`lbl-${idx}-${ans}`);
        if (wrongLbl) {
          wrongLbl.style.borderColor = 'var(--bad)';
          wrongLbl.style.backgroundColor = 'var(--bad-bg)';
        }
      }
    }
  });
  
  updateNav();
  showResults();
  MathJax.typesetPromise();
  window.scrollTo({top: 0, behavior: 'smooth'});
  
  if (isTimeout) {
    setTimeout(() => alert("Time expired. Click Submit."), 100);
  }
}

function showResults() {
  let score = 0;
  let secScores = { A:0, B:0, C:0, D:0 };
  
  QS.forEach((q, idx) => {
    if (state.answers[idx] === q.ans) {
      score++;
      secScores[q.sec]++;
    }
  });
  
  const pct = Math.round((score / 40) * 100);
  let band = '';
  if (pct >= 90) band = "Excellent — ready for the credit exam";
  else if (pct >= 75) band = "Solid — review the weaker sections below";
  else if (pct >= 60) band = "Developing — targeted review needed";
  else band = "Foundational gaps — reteach before moving on";
  
  let html = `<h2>Results: ${score} / 40 (${pct}%)</h2>`;
  html += `<p><strong>Band:</strong> ${band}</p>`;
  
  html += `<table>
    <tr><th>Section</th><th>Topic</th><th>Correct</th><th>Total</th><th>%</th></tr>`;
    
  let coachingHtml = '';
  
  ['A','B','C','D'].forEach(s => {
    const sm = SECTION_META[s];
    const sPct = Math.round((secScores[s] / sm.count) * 100);
    html += `<tr>
      <td>${s}</td>
      <td>${sm.title}</td>
      <td>${secScores[s]}</td>
      <td>${sm.count}</td>
      <td>${sPct}%</td>
    </tr>`;
    
    if (sPct < 80) {
      coachingHtml += `<div class="coaching-note"><strong>Section ${s} Coaching:</strong> ${sm.coach}</div>`;
    }
  });
  html += `</table>`;
  
  if (coachingHtml) {
    html += `<div class="coaching-notes"><h3>Coaching Notes</h3>${coachingHtml}</div>`;
  }
  
  const panel = document.getElementById('results-panel');
  panel.innerHTML = html;
  panel.style.display = 'block';
  document.getElementById('footer').style.display = 'block';
}

function doReset() {
  if (confirm("Are you sure you want to reset the entire quiz? All progress will be lost.")) {
    localStorage.removeItem('trig_quiz_state');
    location.reload();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  render();
  startTimer();
});
</script>
</body>
</html>
