<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveSTEM: 60-Second Transformation Drill</title>
  <meta name="description" content="High-stakes rapid execution drill for geometric transformations.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      chtml: { scale: 1.1 },
      options: {
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    :root {
      --bg:         #F4F6F9;
      --surface:    #FFFFFF;
      --surface-2:  #F0F4FF;
      --border:     #DDE3EF;
      --text:       #12192B;
      --text-muted: #64748B;
      --accent:     #1A4FDB;
      --accent-lt:  #EEF2FF;
      --gold:       #B8860B;
      --gold-lt:    #FEF9E7;
      --success:    #0B7A57;
      --success-lt: #ECFDF5;
      --error:      #C0392B;
      --error-lt:   #FEF2F2;
      --sidebar-w:  270px;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      line-height: 1.65;
      font-size: 15px;
    }

    h1, h2, h3, h4, .brand-name {
      font-family: 'Fraunces', Georgia, serif;
    }

    /* ── Sidebar ───────────────────────────── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; bottom: 0; left: 0;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      transition: transform 0.3s ease;
      z-index: 100;
      box-shadow: 2px 0 12px rgba(0,0,0,0.04);
    }

    .brand { margin-bottom: 2rem; }
    .brand-name { font-size: 1.5rem; color: var(--accent); font-weight: 700; letter-spacing: -0.5px; }
    .brand-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

    .side-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    .side-score-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; margin-bottom: 0.3rem; }
    .side-score-value { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 700; line-height: 1; }
    .side-score-value.pos { color: var(--accent); }
    .side-score-value.neg { color: var(--error); }

    .side-prog-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; margin-bottom: 0.75rem; }
    .q-dots { display: flex; flex-wrap: wrap; gap: 7px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
    .dot.cor { background: var(--success); box-shadow: 0 0 0 3px var(--success-lt); }
    .dot.inc { background: var(--error); box-shadow: 0 0 0 3px var(--error-lt); }
    .dot.act { background: transparent; border: 2px solid var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }

    .rst {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
      margin-top: 2rem;
    }
    .rst:hover { border-color: var(--error); color: var(--error); background: var(--error-lt); }

    /* ── Main Content ─────────────────────── */
    main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 2.5rem 3rem;
      max-width: 860px;
    }

    .hdr { margin-bottom: 2rem; }
    .hdr h1 { font-size: 2rem; color: var(--text); font-weight: 700; margin-bottom: 0.3rem; letter-spacing: -0.5px; }
    .hdr .sub { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1rem; }

    .badge-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-scoring { background: var(--error-lt); color: var(--error); border: 1px solid #FECACA; }
    .badge-range   { background: var(--accent-lt); color: var(--accent); border: 1px solid #C7D7FD; }

    /* ── Timer ────────────────────────────── */
    .timer-wrap { margin-bottom: 1.5rem; }
    .timer-top { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; }
    .time-text {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
    }
    .time-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .timer-track { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .timer-bar { height: 100%; width: 100%; border-radius: 3px; transition: width 1s linear, background-color 0.4s ease; background: var(--success); }
    .timer-bar.warn   { background: #D97706; }
    .timer-bar.danger { background: var(--error); }

    /* ── Question Card ────────────────────── */
    article {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.25rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }

    .q-section-tag {
      display: inline-block;
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid #C7D7FD;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      margin-bottom: 1.25rem;
    }

    .q-prompt {
      font-size: 1.05rem;
      margin-bottom: 2rem;
      color: var(--text);
      line-height: 1.7;
    }

    /* SVG figure: light background, centered */
    .q-figure {
      margin: 1rem 0 1.5rem;
      display: flex;
      justify-content: flex-start;
    }
    .q-figure svg {
      max-width: 220px;
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Answer Choices ───────────────────── */
    .q-opts { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.25rem; }
    .choice {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--surface);
      user-select: none;
    }
    .choice:hover:not(.disabled) { border-color: var(--accent); background: var(--accent-lt); }
    .choice input { margin-right: 1rem; cursor: pointer; transform: scale(1.15); accent-color: var(--accent); }
    .choice .lbl { font-weight: 700; color: var(--text-muted); margin-right: 0.7rem; min-width: 1.2rem; font-size: 0.85rem; }
    .choice.sel { border-color: var(--accent); background: var(--accent-lt); }
    .choice.cor-ans { background: var(--success-lt); border-color: var(--success); color: var(--success); }
    .choice.cor-ans .lbl { color: var(--success); }
    .choice.wr-ans { background: var(--error-lt); border-color: var(--error); color: var(--error); }
    .choice.wr-ans .lbl { color: var(--error); }
    .choice.disabled { cursor: not-allowed; opacity: 0.8; }

    /* ── Buttons ──────────────────────────── */
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
    .btn-sub, .btn-nxt {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .btn-sub { background: var(--accent); color: #fff; }
    .btn-sub:hover:not(:disabled) { background: #1340B8; }
    .btn-sub:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .btn-nxt { background: var(--success); color: #fff; display: none; }
    .btn-nxt:hover { background: #096344; }

    .warn-msg { color: var(--error); font-size: 0.88rem; font-weight: 600; display: none; }

    /* ── Feedback Box ─────────────────────── */
    .fb {
      margin-top: 1.25rem;
      padding: 1.25rem 1.5rem;
      border-radius: 8px;
      font-size: 0.97rem;
      display: none;
      border-left: 4px solid transparent;
      line-height: 1.7;
      animation: fbIn 0.3s ease;
    }
    .fb.sh  { display: block; }
    .fb.ok  { background: var(--success-lt); border-color: var(--success); color: #065F46; }
    .fb.no  { background: var(--error-lt);   border-color: var(--error);   color: #7F1D1D; }
    .fb strong { display: block; margin-bottom: 0.5rem; font-family: 'Fraunces', serif; font-size: 1.1rem; }
    .fb.ok strong { color: var(--success); }
    .fb.no strong { color: var(--error); }

    @keyframes fbIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── End / Report ─────────────────────── */
    .done {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4rem 2rem;
      text-align: center;
      display: none;
      box-shadow: var(--shadow);
    }
    .done.sh { display: block; animation: fbIn 0.4s ease; }
    .done h2 { font-family: 'Fraunces', serif; font-size: 2rem; color: var(--text); margin-bottom: 0.5rem; }
    .done .final-score { font-family: 'Fraunces', serif; font-size: 5rem; font-weight: 700; line-height: 1; margin: 0.5rem 0; }
    .done .final-score.pos { color: var(--accent); }
    .done .final-score.neg { color: var(--error); }
    .done .score-range { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1rem;}

    .report { display: none; margin-top: 2.5rem; }
    .report.sh { display: block; }
    .report h2 { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--text); margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }

    .rep-q { background: var(--surface); padding: 1.75rem; border-radius: 10px; margin-bottom: 1.25rem; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .rep-q h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.75rem; font-weight: 600; }
    .rep-prompt { font-size: 1rem; margin-bottom: 0.75rem; color: var(--text); }
    .rep-exp {
      background: var(--surface-2);
      color: #1E3A5F;
      padding: 1rem 1.25rem;
      border-radius: 6px;
      border-left: 4px solid var(--accent);
      margin-top: 0.75rem;
      font-size: 0.94rem;
      line-height: 1.7;
    }
    .rep-exp.missed { border-left-color: var(--error); background: var(--error-lt); color: #7F1D1D; }
    .rep-exp.unanswered { border-left-color: var(--text-muted); background: #F1F5F9; color: var(--text-muted); }

    .tag-err {
      display: inline-block;
      font-size: 0.7rem;
      background: var(--error-lt);
      color: var(--error);
      padding: 0.2rem 0.55rem;
      border-radius: 3px;
      margin-left: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
      vertical-align: middle;
    }

    /* ── Mobile ───────────────────────────── */
    .mob-toggle {
      display: none;
      position: fixed; top: 1rem; left: 1rem; z-index: 200;
      background: var(--accent); color: #fff;
      border: none; padding: 0.45rem 0.7rem;
      border-radius: 7px; font-size: 1.3rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 90; backdrop-filter: blur(3px); }

    @media (max-width: 768px) {
      .mob-toggle { display: block; }
      aside { transform: translateX(-100%); border-right: none; box-shadow: 4px 0 20px rgba(0,0,0,0.12); }
      aside.open { transform: translateX(0); }
      .overlay.open { display: block; }
      main { margin-left: 0; padding: 5rem 1.1rem 2rem; }
      article { padding: 1.5rem; }
      .hdr h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <button class="mob-toggle" id="menuBtn" aria-label="Toggle navigation">☰</button>
  <div class="overlay" id="mobOverlay"></div>

  <aside id="sidebar">
    <div class="brand">
      <div class="brand-name">ActiveSTEM</div>
      <div class="brand-tag">60-Second Drill</div>
    </div>

    <hr class="side-divider">

    <div style="margin-bottom:1.5rem;">
      <div class="side-score-label">Score</div>
      <div class="side-score-value pos" id="ss">0</div>
    </div>

    <hr class="side-divider">

    <div style="margin-bottom:1.5rem;">
      <div class="side-prog-label" id="pt">Q1 of 10</div>
      <div class="q-dots" id="dots"></div>
    </div>

    <button class="rst" id="resetBtn">↻ Abandon Attempt</button>
  </aside>

  <main>
    <div class="hdr" id="mainHdr">
      <h1>Transformation Drill</h1>
      <div class="sub">10 questions · 60 seconds each · No second guessing</div>
      <div class="badge-row">
        <span class="badge badge-scoring">Brutal Scoring: +10 / −10</span>
        <span class="badge badge-range">Score Range: −100 to +100</span>
      </div>
    </div>

    <div id="qArea">
      <div class="timer-wrap">
        <div class="timer-top">
          <span class="time-text" id="timeTxt">60</span>
          <span class="time-label">seconds remaining</span>
        </div>
        <div class="timer-track"><div class="timer-bar" id="tBar"></div></div>
      </div>
      <div id="qs"></div>
    </div>

    <div class="done" id="dn">
      <h2>Drill Complete</h2>
      <div class="final-score pos" id="fsc">0</div>
      <div class="score-range">Score Range: &minus;100 to +100</div>
    </div>

    <div class="report" id="rep">
      <h2>Actionable Review</h2>
      <div id="rep-qs"></div>
    </div>
  </main>

  <script>
    // ── Mathematically Corrected SVG Diagrams ──
    // Grid: 200x200. Center is (100,100). 10 pixels = 1 unit.
    const svgDilation = `
      <div class="q-figure tex2jax_ignore">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="gDil" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="none" stroke="#E2E8F0" stroke-width="1"/>
            </pattern>
          </defs>
          <rect width="200" height="200" fill="url(#gDil)"/>
          <line x1="100" y1="0" x2="100" y2="200" stroke="#94A3B8" stroke-width="1.5"/>
          <line x1="0" y1="100" x2="200" y2="100" stroke="#94A3B8" stroke-width="1.5"/>
          
          <circle cx="90" cy="80" r="5" fill="#334155"/>
          <text x="75" y="75" font-size="12" fill="#334155" font-weight="bold" font-family="sans-serif">P</text>
          
          <circle cx="110" cy="50" r="5" fill="#1A4FDB"/>
          <text x="118" y="54" font-size="12" fill="#1A4FDB" font-weight="bold" font-family="sans-serif">E</text>
        </svg>
      </div>`;

    const svgTrans = `
      <div class="q-figure tex2jax_ignore">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="gTr" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="none" stroke="#E2E8F0" stroke-width="1"/>
            </pattern>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706"/>
            </marker>
          </defs>
          <rect width="200" height="200" fill="url(#gTr)"/>
          <line x1="100" y1="0" x2="100" y2="200" stroke="#94A3B8" stroke-width="1.5"/>
          <line x1="0" y1="100" x2="200" y2="100" stroke="#94A3B8" stroke-width="1.5"/>
          
          <circle cx="70" cy="20" r="5" fill="#334155"/>
          <text x="50" y="25" font-size="12" fill="#334155" font-weight="bold" font-family="sans-serif">A</text>
          
          <line x1="70" y1="20" x2="116" y2="38" stroke="#D97706" stroke-width="2" marker-end="url(#arrow)"/>
          <text x="125" y="45" font-size="11" fill="#D97706" font-weight="bold" font-family="sans-serif">v = &#x27E8;5,&#x2212;2&#x27E9;</text>
        </svg>
      </div>`;

    // ── Question Data ────────────────────────────────────────────────────────────
    const D = [
      {
        sec: "Translation",
        prompt: `Point \\( A(-3, 8) \\) is translated by the vector \\( \\vec{v} = \\langle 5, -2 \\rangle \\).${svgTrans}What are the exact coordinates of \\( A' \\)?`,
        ch: ["\\( (-8, 10) \\)", "\\( (-2, 6) \\)", "\\( (2, 6) \\)", "\\( (6, 2) \\)"],
        ans: 2,
        exp: "Add the vector components to the coordinates: \\( A' = (-3 + 5,\\; 8 + (-2)) = (2, 6) \\). Subtracting the vector or mixing signs are common careless errors.",
        err: "Arithmetic/Sign Error"
      },
      {
        sec: "Origin Dilation",
        prompt: `Point \\( B(4, -6) \\) is dilated by a scale factor of \\( k = \\tfrac{1}{2} \\) centered at the origin.<br><br>What is \\( B' \\)?`,
        ch: ["\\( (2, -3) \\)", "\\( (-2, 3) \\)", "\\( (8, -12) \\)", "\\( (2, -6) \\)"],
        ans: 0,
        exp: "Multiply both coordinates by \\( k \\): \\( (4 \\times 0.5,\\; -6 \\times 0.5) = (2, -3) \\). Multiplying by the reciprocal or missing a coordinate are execution traps.",
        err: "Scale/Multiplication Error"
      },
      {
        sec: "Line Reflection",
        prompt: `Point \\( C(5, 2) \\) is reflected across the line \\( y = -x \\).<br><br>What are the coordinates of \\( C' \\)?`,
        ch: ["\\( (2, 5) \\)", "\\( (-2, -5) \\)", "\\( (-5, -2) \\)", "\\( (5, -2) \\)"],
        ans: 1,
        exp: "Reflecting across \\( y = -x \\) requires you to swap and negate both coordinates. Rule: \\( (x,y) \\rightarrow (-y, -x) \\). Thus \\( (5, 2) \\rightarrow (-2, -5) \\).",
        err: "Rule Recognition Error"
      },
      {
        sec: "Origin Rotation",
        prompt: `Point \\( D(3, 7) \\) is rotated \\( 90^{\\circ} \\) counterclockwise around the origin.<br><br>Find \\( D' \\).`,
        ch: ["\\( (7, -3) \\)", "\\( (-3, -7) \\)", "\\( (7, 3) \\)", "\\( (-7, 3) \\)"],
        ans: 3,
        exp: "Rule for 90° CCW rotation: \\( (x,y) \\rightarrow (-y, x) \\). Swap to get \\( (7, 3) \\), then negate the new x-coordinate: \\( (-7, 3) \\). Option A is the 90° CW rotation.",
        err: "Rule/Sign Error"
      },
      {
        sec: "Off-Center Dilation",
        prompt: `Point \\( E(1, 5) \\) is dilated from center \\( P(-1, 2) \\) by a scale factor of \\( k = 2 \\).${svgDilation}What are the coordinates of \\( E' \\)?`,
        ch: ["\\( (2, 10) \\)", "\\( (-1, 16) \\)", "\\( (3, 8) \\)", "\\( (4, 6) \\)"],
        ans: 2,
        exp: "Formula: \\( E' = P + k(E - P) \\).<br>1. \\( E - P = (1-(-1),\\; 5-2) = (2, 3) \\).<br>2. Scale: \\( 2(2,3) = (4,6) \\).<br>3. Add center: \\( (-1+4,\\; 2+6) = (3, 8) \\). Forgetting to add the center back leaves you at \\( (4,6) \\).",
        err: "Setup/Execution Error"
      },
      {
        sec: "Vertical Reflection",
        prompt: `Point \\( F(-2, 4) \\) is reflected across the vertical line \\( x = 2 \\).<br><br>What is \\( F' \\)?`,
        ch: ["\\( (2, 4) \\)", "\\( (6, 4) \\)", "\\( (-2, 0) \\)", "\\( (0, 4) \\)"],
        ans: 1,
        exp: "The horizontal distance from \\( x = -2 \\) to the mirror \\( x = 2 \\) is 4 units. Move 4 more units past the mirror: \\( 2 + 4 = 6 \\). The y-coordinate stays fixed. Result: \\( (6, 4) \\).",
        err: "Spatial/Arithmetic Error"
      },
      {
        sec: "Negative Dilation",
        prompt: `Point \\( G(-4, 2) \\) is dilated from the origin by a scale factor \\( k = -1.5 \\).<br><br>What are the coordinates of \\( G' \\)?`,
        ch: ["\\( (-6, 3) \\)", "\\( (6, 3) \\)", "\\( (6, -3) \\)", "\\( (-5.5, 0.5) \\)"],
        ans: 2,
        exp: "Multiply both coordinates by \\( -1.5 \\):<br>\\( -4 \\times -1.5 = 6 \\) and \\( 2 \\times -1.5 = -3 \\).<br>Result: \\( (6, -3) \\). Dropping the negative sign is a fatal execution error.",
        err: "Arithmetic/Sign Error"
      },
      {
        sec: "Origin Rotation",
        prompt: `Point \\( H(5, -1) \\) is rotated \\( 180^{\\circ} \\) around the origin.<br><br>What is \\( H' \\)?`,
        ch: ["\\( (-5, -1) \\)", "\\( (1, 5) \\)", "\\( (-1, -5) \\)", "\\( (-5, 1) \\)"],
        ans: 3,
        exp: "Rule for 180° rotation: \\( (x,y) \\rightarrow (-x, -y) \\). Negate both coordinates without swapping. Result: \\( (-5, 1) \\).",
        err: "Rule Recognition Error"
      },
      {
        sec: "Composite Transformation",
        prompt: `Point \\( J(2, 3) \\) is translated by \\( \\langle -4, 1 \\rangle \\), then reflected across the \\( x \\)-axis.<br><br>What is the final coordinate?`,
        ch: ["\\( (2, 4) \\)", "\\( (-2, -2) \\)", "\\( (-6, -4) \\)", "\\( (-2, -4) \\)"],
        ans: 3,
        exp: "Step 1 — Translate: \\( (2,3) + \\langle -4, 1 \\rangle = (-2, 4) \\).<br>Step 2 — Reflect over x-axis: negate the y-coordinate. \\( (-2, -4) \\). Applying operations out of order ruins the composite.",
        err: "Execution/Order Error"
      },
      {
        sec: "Algebraic Recovery",
        prompt: `Pre-image \\( K(2,3) \\) maps to image \\( K'(6,7) \\) under a dilation with scale factor \\( k = 2 \\).<br><br>Find the exact center of dilation \\( P(x,y) \\).`,
        ch: ["\\( (4, 5) \\)", "\\( (2, 1) \\)", "\\( (-2, -1) \\)", "\\( (4, 4) \\)"],
        ans: 2,
        exp: "From \\( K' = P + 2(K - P) \\), simplify to \\( K' = 2K - P \\), so \\( P = 2K - K' \\).<br>\\( P = 2(2,3) - (6,7) = (4,6) - (6,7) = (-2,-1) \\).",
        err: "Algebraic/Sign Error"
      }
    ];

    // ── State ────────────────────────────────────────────────────────────────────
    const SKEY = 'activestem_drill_v4';
    let sc = 0, ans = 0, currQ = 0, timeRem = 60, tInterval = null, qLocked = false;
    const tot = D.length;
    let state = Array(tot).fill(null);

    // ── Sidebar toggle ───────────────────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('mobOverlay').classList.toggle('open');
    }
    
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('mobOverlay').classList.remove('open');
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    function init() {
      document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
      document.getElementById('mobOverlay').addEventListener('click', closeSidebar);
      document.getElementById('resetBtn').addEventListener('click', resetQuiz);
      
      try {
        const saved = localStorage.getItem(SKEY);
        if (saved) {
          const p = JSON.parse(saved);
          sc = p.sc ?? 0; ans = p.ans ?? 0;
          state = p.state || Array(tot).fill(null);
          currQ = p.currQ ?? 0; timeRem = p.timeRem ?? 60;
        }
      } catch(e) { 
        console.error("Local storage corrupted, resetting.", e);
        localStorage.removeItem(SKEY); 
      }
      
      updateSidebar();
      currQ < tot ? renderQuestion(currQ) : finish();
    }

    // ── Sidebar update ───────────────────────────────────────────────────────────
    function updateSidebar() {
      const ssNode = document.getElementById('ss');
      ssNode.textContent = sc;
      ssNode.className = 'side-score-value ' + (sc < 0 ? 'neg' : 'pos');
      document.getElementById('pt').textContent = `Q${Math.min(currQ+1, tot)} of ${tot}`;
      
      const dots = document.getElementById('dots');
      dots.innerHTML = '';
      for (let i = 0; i < tot; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        if (state[i]) d.classList.add(state[i].isCor ? 'cor' : 'inc');
        else if (i === currQ) d.classList.add('act');
        dots.appendChild(d);
      }
    }

    // ── Render question ──────────────────────────────────────────────────────────
    function renderQuestion(idx) {
      // If the question is already answered (refresh exploit prevention)
      if (state[idx] !== null) {
          qLocked = true;
      } else {
          qLocked = false;
          // Only give 60 seconds if it's a completely fresh question
          if (timeRem <= 0 || timeRem > 60) timeRem = 60;
      }
      
      const q = D[idx];
      const labels = ['A','B','C','D'];
      const chHtml = q.ch.map((c, j) => `
        <label class="choice ${qLocked ? 'disabled' : ''}" id="lbl-${j}">
          <input type="radio" name="qRad" value="${j}" id="rad-${j}" ${qLocked ? 'disabled' : ''}>
          <span class="lbl">${labels[j]}</span>
          <div>${c}</div>
        </label>`).join('');

      document.getElementById('qs').innerHTML = `
        <article id="qArt">
          <div class="q-section-tag">${q.sec}</div>
          <div class="q-prompt">${q.prompt}</div>
          <div class="q-opts">${chHtml}</div>
          <div class="warn-msg" id="wMsg"></div>
          <div class="btn-row">
            <button class="btn-sub" id="subBtn" ${qLocked ? 'style="display:none;"' : ''}>Lock Answer</button>
            <button class="btn-nxt" id="nxtBtn" ${qLocked ? 'style="display:block;"' : ''}>Next Question →</button>
          </div>
          <div id="fbBox" class="fb"></div>
        </article>`;

      if (!qLocked) {
        document.getElementById('subBtn').addEventListener('click', submitAns);
        document.querySelectorAll('.choice').forEach((el, j) => {
          el.addEventListener('click', () => {
            if (qLocked) return;
            document.getElementById(`rad-${j}`).checked = true;
            document.querySelectorAll('.choice').forEach(c => c.classList.remove('sel'));
            el.classList.add('sel');
            document.getElementById('wMsg').style.display = 'none';
          });
        });
        startTimer();
      } else {
        // If restoring a locked question
        document.getElementById('nxtBtn').addEventListener('click', nextQuestion);
        clearInterval(tInterval);
        
        // Restore visual state of the locked question
        const sel = state[idx].sel;
        const isCor = state[idx].isCor;
        
        if (sel !== -1) {
            document.getElementById(`rad-${sel}`).checked = true;
            document.getElementById(`lbl-${sel}`).classList.add(isCor ? 'cor-ans' : 'wr-ans');
            if (!isCor) document.getElementById(`lbl-${q.ans}`).classList.add('cor-ans');
        } else {
            document.getElementById(`lbl-${q.ans}`).classList.add('cor-ans');
        }

        const fbBox = document.getElementById('fbBox');
        fbBox.className = isCor ? 'fb sh ok' : 'fb sh no';
        fbBox.innerHTML = isCor 
            ? `<strong>Correct — +10 Points</strong>${q.exp}`
            : `<strong>${sel === -1 ? 'Timeout Penalty' : 'Incorrect'} — −10 Points</strong>${q.exp}`;
      }

      if (window.MathJax) {
        MathJax.typesetPromise([document.getElementById('qArt')]).catch(console.log);
      }
    }

    // ── Timer ────────────────────────────────────────────────────────────────────
    function startTimer() {
      clearInterval(tInterval);
      updateTimerUI();
      tInterval = setInterval(() => {
        timeRem--;
        updateTimerUI();
        saveState(); // Save timeRem every second to prevent refresh exploits
        if (timeRem <= 0) { clearInterval(tInterval); timeOutSubmit(); }
      }, 1000);
    }

    function updateTimerUI() {
      document.getElementById('timeTxt').textContent = timeRem > 0 ? timeRem : 0;
      const bar = document.getElementById('tBar');
      bar.style.width = `${(Math.max(timeRem, 0) / 60) * 100}%`;
      bar.className = 'timer-bar' + (timeRem <= 15 ? ' danger' : timeRem <= 30 ? ' warn' : '');
    }

    // ── Submit / process ─────────────────────────────────────────────────────────
    function submitAns() {
      if (qLocked) return;
      let sel = -1;
      for (const r of document.getElementsByName('qRad')) {
        if (r.checked) { sel = parseInt(r.value); break; }
      }
      if (sel === -1) {
        const wNode = document.getElementById('wMsg');
        wNode.innerHTML = 'Select an option before submitting.';
        wNode.style.display = 'block';
        return;
      }
      processResult(sel);
    }

    function timeOutSubmit() {
      if (qLocked) return;
      const wNode = document.getElementById('wMsg');
      wNode.innerHTML = 'TIME EXPIRED — Automatic Penalty Applied.';
      wNode.style.display = 'block';
      processResult(-1);
    }

    function processResult(sel) {
      qLocked = true;
      clearInterval(tInterval);
      const q = D[currQ];
      const isCor = sel === q.ans;
      if (isCor) sc += 10; else sc -= 10;
      ans++;
      state[currQ] = { sel, isCor };
      saveState();
      updateSidebar();

      document.getElementById('subBtn').style.display = 'none';
      const nxt = document.getElementById('nxtBtn');
      nxt.style.display = 'block';
      
      // Essential: Attach event listener dynamically since inline onclicks were removed
      nxt.addEventListener('click', nextQuestion);
      
      for (const r of document.getElementsByName('qRad')) r.disabled = true;
      document.querySelectorAll('.choice').forEach(el => el.classList.add('disabled'));

      if (sel !== -1) {
        document.getElementById(`lbl-${sel}`).classList.add(isCor ? 'cor-ans' : 'wr-ans');
        if (!isCor) document.getElementById(`lbl-${q.ans}`).classList.add('cor-ans');
      } else {
        document.getElementById(`lbl-${q.ans}`).classList.add('cor-ans');
      }

      const fbBox = document.getElementById('fbBox');
      if (isCor) {
        fbBox.className = 'fb sh ok';
        fbBox.innerHTML = `<strong>Correct — +10 Points</strong>${q.exp}`;
      } else {
        fbBox.className = 'fb sh no';
        fbBox.innerHTML = `<strong>${sel === -1 ? 'Timeout Penalty' : 'Incorrect'} — −10 Points</strong>${q.exp}`;
      }
      if (window.MathJax) {
        MathJax.typesetPromise([document.getElementById('fbBox')]).catch(console.log);
      }
    }

    function nextQuestion() {
      currQ++;
      timeRem = 60;
      saveState();
      currQ < tot ? (renderQuestion(currQ), updateSidebar()) : finish();
    }

    function saveState() {
      localStorage.setItem(SKEY, JSON.stringify({ sc, ans, state, currQ, timeRem }));
    }

    // ── Finish ───────────────────────────────────────────────────────────────────
    function finish() {
      clearInterval(tInterval);
      document.getElementById('qArea').style.display = 'none';
      document.getElementById('mainHdr').style.display = 'none';

      const dn = document.getElementById('dn');
      dn.classList.add('sh');
      const fscNode = document.getElementById('fsc');
      fscNode.textContent = sc;
      fscNode.className = 'final-score ' + (sc < 0 ? 'neg' : 'pos');

      const labels = ['A','B','C','D'];
      let qHtml = '';
      
      // FIXED: Loop goes through ALL questions to ensure skipped/unanswered ones are shown on early termination
      D.forEach((q, i) => {
        const st = state[i];
        let statusTag = '';
        let expClass = '';
        
        if (!st) {
          statusTag = `<span style="color:var(--text-muted);font-weight:700;">Unanswered (0)</span>`;
          expClass = 'rep-exp unanswered';
        } else if (st.isCor) {
          statusTag = `<span style="color:var(--success);font-weight:700;">Correct (+10)</span>`;
          expClass = 'rep-exp';
        } else {
          statusTag = `<span style="color:var(--error);font-weight:700;">Incorrect (${st.sel === -1 ? 'Timeout' : 'Chose ' + labels[st.sel]})</span><span class="tag-err">${q.err}</span>`;
          expClass = 'rep-exp missed';
        }

        qHtml += `
          <div class="rep-q">
            <h4>Question ${i+1} — ${statusTag}</h4>
            <div class="rep-prompt">${q.prompt}</div>
            <div style="font-size:0.9rem;color:var(--text-muted);">
              <strong>Correct Answer:</strong> ${labels[q.ans]}. ${q.ch[q.ans]}
            </div>
            <div class="${expClass}">
              <strong>Explanation:</strong> ${q.exp}
            </div>
          </div>`;
      });

      document.getElementById('rep-qs').innerHTML = qHtml;
      document.getElementById('rep').classList.add('sh');

      if (window.MathJax) {
        MathJax.typesetPromise([document.querySelector('main')]).catch(console.log);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateSidebar();
    }

    function resetQuiz() {
      if (confirm('Erase this attempt and start over?')) {
        localStorage.removeItem(SKEY);
        location.reload();
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
