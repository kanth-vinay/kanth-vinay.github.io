<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piecewise Functions Quiz</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
        }
        
        /* Smooth transitions for UI elements */
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #eff6ff;
            border-color: #3b82f6;
        }
        .option-btn.selected {
            background-color: #dbeafe;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
        .option-btn.correct {
            background-color: #dcfce7;
            border-color: #16a34a;
            color: #166534;
        }
        .option-btn.incorrect {
            background-color: #fee2e2;
            border-color: #dc2626;
            color: #991b1b;
        }

        /* Animation for loading new questions */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* KaTeX block styling overrides for better fit */
        .katex-display {
            background-color: #f1f5f9;
            padding: 1.25rem;
            border-radius: 0.5rem;
            border-left: 4px solid #3b82f6;
            margin: 1.25rem 0 !important;
            overflow-x: auto;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden relative">
        
        <!-- Start Screen -->
        <div id="start-screen" class="p-8 md:p-12 text-center fade-in">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-4">Piecewise Functions Quiz</h1>
            <p class="text-slate-600 mb-8 text-lg">Test your skills with 30 evaluation and logic questions. No graphs, just pure algebra and word problems.</p>
            <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-xl transition-all w-full md:w-auto text-lg">
                Start Quiz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden flex flex-col h-full">
            <!-- Progress Bar -->
            <div class="bg-slate-100 h-2 w-full">
                <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
            </div>
            
            <div class="p-6 md:p-8 flex-grow fade-in" id="quiz-content-area">
                <div class="flex justify-between items-center mb-6">
                    <span id="question-counter" class="text-sm font-bold text-slate-400 uppercase tracking-wider">Question 1 / 30</span>
                    <span id="score-display" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Score: 0</span>
                </div>
                
                <div id="question-container" class="mb-8">
                    <!-- Question text injected here -->
                </div>

                <div id="options-container" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <div class="bg-slate-50 p-6 border-t border-slate-100 flex justify-end">
                <button id="next-btn" onclick="nextQuestion()" disabled class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-8 rounded-xl transition-all">
                    Next Question
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden p-8 md:p-12 text-center fade-in">
            <h2 class="text-3xl font-bold text-slate-900 mb-2">Quiz Complete</h2>
            <p class="text-slate-600 mb-8">Here is how you did on Piecewise Functions:</p>
            
            <div class="bg-slate-50 rounded-2xl p-8 mb-8 inline-block w-full max-w-sm border border-slate-200 shadow-sm">
                <div id="final-score" class="text-6xl font-black text-blue-600 mb-2">0%</div>
                <div id="score-details" class="text-lg text-slate-500 font-medium">0 out of 30 correct</div>
            </div>

            <div id="feedback-message" class="text-lg font-medium text-slate-700 mb-8"></div>

            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-8 rounded-xl shadow transition-all w-full md:w-auto">
                Retake Quiz
            </button>
        </div>

    </div>

    <script>
        // Quiz Data updated with proper LaTeX syntax for mathematical rendering
        const quizData = [
            // Basic Evaluation (2 pieces)
            { q: "Evaluate $f(0)$ for the function: $$f(x) = \\begin{cases} x + 2 & \\text{if } x < 1 \\\\ 3x & \\text{if } x \\ge 1 \\end{cases}$$", opts: ["0", "2", "3", "Undefined"], ans: 1 },
            { q: "Evaluate $f(1)$ for the function: $$f(x) = \\begin{cases} x + 2 & \\text{if } x < 1 \\\\ 3x & \\text{if } x \\ge 1 \\end{cases}$$", opts: ["2", "3", "4", "5"], ans: 1 },
            { q: "Evaluate $f(4)$ for the function: $$f(x) = \\begin{cases} x + 2 & \\text{if } x < 1 \\\\ 3x & \\text{if } x \\ge 1 \\end{cases}$$", opts: ["6", "12", "14", "Undefined"], ans: 1 },
            { q: "Evaluate $g(-3)$ for the function: $$g(x) = \\begin{cases} -x & \\text{if } x \\le -2 \\\\ x^2 & \\text{if } x > -2 \\end{cases}$$", opts: ["3", "-3", "9", "-9"], ans: 0 },
            { q: "Evaluate $g(-2)$ for the function: $$g(x) = \\begin{cases} -x & \\text{if } x \\le -2 \\\\ x^2 & \\text{if } x > -2 \\end{cases}$$", opts: ["-2", "2", "4", "-4"], ans: 1 },
            { q: "Evaluate $g(3)$ for the function: $$g(x) = \\begin{cases} -x & \\text{if } x \\le -2 \\\\ x^2 & \\text{if } x > -2 \\end{cases}$$", opts: ["-3", "3", "6", "9"], ans: 3 },
            
            // Basic Evaluation (3 pieces)
            { q: "Evaluate $h(-5)$ for the function: $$h(x) = \\begin{cases} 5 & \\text{if } x < 0 \\\\ 2 & \\text{if } x = 0 \\\\ -5 & \\text{if } x > 0 \\end{cases}$$", opts: ["-5", "0", "2", "5"], ans: 3 },
            { q: "Evaluate $h(0)$ for the function: $$h(x) = \\begin{cases} 5 & \\text{if } x < 0 \\\\ 2 & \\text{if } x = 0 \\\\ -5 & \\text{if } x > 0 \\end{cases}$$", opts: ["-5", "0", "2", "5"], ans: 2 },
            { q: "Evaluate $h(10)$ for the function: $$h(x) = \\begin{cases} 5 & \\text{if } x < 0 \\\\ 2 & \\text{if } x = 0 \\\\ -5 & \\text{if } x > 0 \\end{cases}$$", opts: ["-5", "2", "5", "10"], ans: 0 },
            
            { q: "Evaluate $f(-2)$ for the function: $$f(x) = \\begin{cases} 2x + 1 & \\text{if } x < -1 \\\\ x & \\text{if } -1 \\le x \\le 3 \\\\ 2 - x & \\text{if } x > 3 \\end{cases}$$", opts: ["-3", "-2", "0", "4"], ans: 0 },
            { q: "Evaluate $f(-1)$ for the function: $$f(x) = \\begin{cases} 2x + 1 & \\text{if } x < -1 \\\\ x & \\text{if } -1 \\le x \\le 3 \\\\ 2 - x & \\text{if } x > 3 \\end{cases}$$", opts: ["-1", "0", "-3", "Undefined"], ans: 0 },
            { q: "Evaluate $f(2)$ for the function: $$f(x) = \\begin{cases} 2x + 1 & \\text{if } x < -1 \\\\ x & \\text{if } -1 \\le x \\le 3 \\\\ 2 - x & \\text{if } x > 3 \\end{cases}$$", opts: ["5", "2", "0", "4"], ans: 1 },
            { q: "Evaluate $f(3)$ for the function: $$f(x) = \\begin{cases} 2x + 1 & \\text{if } x < -1 \\\\ x & \\text{if } -1 \\le x \\le 3 \\\\ 2 - x & \\text{if } x > 3 \\end{cases}$$", opts: ["7", "3", "-1", "0"], ans: 1 },
            { q: "Evaluate $f(5)$ for the function: $$f(x) = \\begin{cases} 2x + 1 & \\text{if } x < -1 \\\\ x & \\text{if } -1 \\le x \\le 3 \\\\ 2 - x & \\text{if } x > 3 \\end{cases}$$", opts: ["11", "5", "-3", "3"], ans: 2 },

            // Word Problems & Applications
            { q: "A mobile plan costs $20 for the first 2GB of data, then $10 per additional GB. The cost function is: $$C(x) = \\begin{cases} 20 & \\text{if } x \\le 2 \\\\ 20 + 10(x - 2) & \\text{if } x > 2 \\end{cases}$$ What is the cost for using 1 GB of data?", opts: ["$10", "$20", "$30", "$0"], ans: 1 },
            { q: "Using the same mobile plan, what is the cost for using exactly 2 GB of data? $$C(x) = \\begin{cases} 20 & \\text{if } x \\le 2 \\\\ 20 + 10(x - 2) & \\text{if } x > 2 \\end{cases}$$", opts: ["$20", "$30", "$40", "$0"], ans: 0 },
            { q: "Using the same mobile plan, what is the cost for using 4 GB of data? $$C(x) = \\begin{cases} 20 & \\text{if } x \\le 2 \\\\ 20 + 10(x - 2) & \\text{if } x > 2 \\end{cases}$$", opts: ["$20", "$40", "$60", "$80"], ans: 1 },
            
            { q: "A parking garage charges $5/hr for the first 3 hours, then a flat $20 for the rest of the day. $$C(h) = \\begin{cases} 5h & \\text{if } 0 < h \\le 3 \\\\ 20 & \\text{if } h > 3 \\end{cases}$$ How much does 2 hours of parking cost?", opts: ["$5", "$10", "$15", "$20"], ans: 1 },
            { q: "Using the parking garage function, how much does 3 hours of parking cost? $$C(h) = \\begin{cases} 5h & \\text{if } 0 < h \\le 3 \\\\ 20 & \\text{if } h > 3 \\end{cases}$$", opts: ["$10", "$15", "$20", "$25"], ans: 1 },
            { q: "Using the parking garage function, how much does 6 hours of parking cost? $$C(h) = \\begin{cases} 5h & \\text{if } 0 < h \\le 3 \\\\ 20 & \\text{if } h > 3 \\end{cases}$$", opts: ["$15", "$20", "$30", "$120"], ans: 1 },

            // Conceptual & Boundaries
            { q: "When evaluating a piecewise function, how do you know which equation to use?", opts: ["Always use the top one first", "Add both equations together", "Check which inequality condition is true for your x-value", "Use the equation that gives the highest result"], ans: 2 },
            { q: "Which inequality symbol means you SHOULD include that boundary number in the interval?", opts: ["<", ">", "≤", "≠"], ans: 2 },
            { q: "Evaluate $f(4)$ for the following function: $$f(x) = \\begin{cases} 3x & \\text{if } x < 4 \\\\ x^2 & \\text{if } x > 4 \\end{cases}$$", opts: ["12", "16", "0", "Undefined (4 is not in either domain)"], ans: 3 },
            { q: "True or False: A proper piecewise function can produce two different y-values for the exact same x-value.", opts: ["True", "False", "Only if it involves absolute value", "Only if both inequalities use ≤"], ans: 1 },
            
            // Advanced Evaluation & Compound
            { q: "The absolute value function $f(x) = |x|$ can be written piecewise as: $$f(x) = \\begin{cases} -x & \\text{if } x < 0 \\\\ x & \\text{if } x \\ge 0 \\end{cases}$$ Evaluate $f(-7)$ using this definition.", opts: ["-7", "0", "7", "Undefined"], ans: 2 },
            { q: "Evaluate $f(4.9)$ for the function: $$f(x) = \\begin{cases} 10 & \\text{if } x < 5 \\\\ 2x & \\text{if } x \\ge 5 \\end{cases}$$", opts: ["10", "9.8", "5", "4.9"], ans: 0 },
            { q: "Evaluate $f(5)$ for the function: $$f(x) = \\begin{cases} 10 & \\text{if } x < 5 \\\\ 2x & \\text{if } x \\ge 5 \\end{cases}$$", opts: ["10", "15", "5", "10"], ans: 3 },
            
            { q: "Let: $$f(x) = \\begin{cases} x - 1 & \\text{if } x \\le 2 \\\\ -x + 5 & \\text{if } x > 2 \\end{cases}$$ Find the value of $f(2) + f(3)$.", opts: ["2", "3", "4", "5"], ans: 1 },
            { q: "Let: $$f(x) = \\begin{cases} 2x & \\text{if } x < 0 \\\\ 0 & \\text{if } x = 0 \\\\ x^2 & \\text{if } x > 0 \\end{cases}$$ Find the value of $f(-3) + f(3)$.", opts: ["-6", "3", "9", "15"], ans: 1 },
            { q: "What is the domain of this function? $$f(x) = \\begin{cases} x & \\text{if } x < 0 \\\\ x + 1 & \\text{if } x > 0 \\end{cases}$$", opts: ["All real numbers", "x ≥ 0", "x ≤ 0", "All real numbers except x = 0"], ans: 3 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultsScreen = document.getElementById('results-screen');
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const quizContentArea = document.getElementById('quiz-content-area');

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            currentQuestion = 0;
            score = 0;
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            nextBtn.disabled = true;
            
            // Trigger fade animation
            quizContentArea.classList.remove('fade-in');
            void quizContentArea.offsetWidth; // Trigger reflow
            quizContentArea.classList.add('fade-in');
            
            const qData = quizData[currentQuestion];
            
            // Update Progress
            const progress = ((currentQuestion) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
            questionCounter.innerText = `Question ${currentQuestion + 1} / ${quizData.length}`;
            
            // Render Question Text
            questionContainer.innerHTML = `<h2 class="text-xl md:text-2xl font-bold text-slate-800 leading-snug">${qData.q}</h2>`;
            
            // Render Options
            optionsContainer.innerHTML = '';
            qData.opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 font-medium text-slate-700 bg-white cursor-pointer flex items-center justify-between';
                
                // Add letter prefix (A, B, C, D)
                const letter = String.fromCharCode(65 + index);
                btn.innerHTML = `<span class="flex items-center"><span class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center mr-4 font-bold text-slate-500">${letter}</span> <span class="option-text">${opt}</span></span>`;
                
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            // Trigger KaTeX rendering for the newly injected mathematical expressions
            renderMathInElement(quizScreen, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        function selectOption(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;
            nextBtn.disabled = false;
            
            const qData = quizData[currentQuestion];
            const isCorrect = selectedIndex === qData.ans;
            
            const allBtns = optionsContainer.children;
            for(let i=0; i < allBtns.length; i++) {
                allBtns[i].disabled = true;
                allBtns[i].classList.add('opacity-70');
                
                if (i === qData.ans) {
                    allBtns[i].classList.remove('opacity-70', 'border-slate-200');
                    allBtns[i].classList.add('correct', 'font-bold');
                    // Add checkmark
                    allBtns[i].innerHTML += `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
                }
            }

            if (isCorrect) {
                score++;
                updateScore();
            } else {
                btnElement.classList.remove('opacity-70', 'border-slate-200');
                btnElement.classList.add('incorrect');
                // Add cross
                btnElement.innerHTML += `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>`;
            }
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function updateScore() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            
            const percent = Math.round((score / quizData.length) * 100);
            document.getElementById('final-score').innerText = `${percent}%`;
            document.getElementById('score-details').innerText = `${score} out of ${quizData.length} correct`;
            
            const feedbackEl = document.getElementById('feedback-message');
            if (percent >= 90) {
                feedbackEl.innerText = "Outstanding. You have demonstrated a masterful understanding of piecewise functions.";
                document.getElementById('final-score').classList.replace('text-blue-600', 'text-green-500');
            } else if (percent >= 70) {
                feedbackEl.innerText = "Great job. You have a solid grasp on evaluating intervals and applying constraints.";
            } else if (percent >= 50) {
                feedbackEl.innerText = "Good effort. Review the boundary rules and condition checks to improve further.";
            } else {
                feedbackEl.innerText = "Keep practicing. Remember to carefully check which inequality is true before calculating.";
                document.getElementById('final-score').classList.replace('text-blue-600', 'text-amber-500');
            }
        }
    </script>
</body>
</html>
