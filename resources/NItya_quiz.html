<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 8 Trigonometry Readiness Assessment</title>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],
      displayMath: [['\\[', '\\]']]
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  body { 
    font-family: Arial, sans-serif; 
    max-width: 850px; 
    margin: 20px auto; 
    line-height: 1.6; 
    padding: 0 15px;
    color: #333;
  }
  h1 { text-align: center; }
  
  fieldset.question-container { 
    border: 1px solid #ddd; 
    padding: 20px; 
    margin-bottom: 20px; 
    border-radius: 8px; 
    background-color: #f9f9f9;
    transition: background-color 0.3s, border-color 0.3s;
  }
  legend {
    font-weight: bold;
    font-size: 1.1em;
    padding: 0 5px;
  }
  
  .choice { 
    margin-bottom: 10px; 
    padding: 10px; 
    border-radius: 4px;
    transition: background-color 0.2s;
  }
  .choice label { 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    margin: 0;
  }
  
  /* Validation & Feedback Styles */
  .error-msg {
    color: #d32f2f;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
    display: none;
    background-color: #ffebee;
    padding: 10px;
    border-radius: 4px;
  }
  .unanswered-highlight {
    border: 2px solid #d32f2f !important;
    background-color: #ffebee !important;
  }
  .feedback-text {
    font-weight: bold;
    margin-top: 10px;
    display: block;
  }
  .correct-choice {
    background-color: #e8f5e9;
    border: 1px solid #a5d6a7;
  }
  .incorrect-choice {
    background-color: #ffebee;
    border: 1px solid #ef9a9a;
  }
  .text-success { color: #2e7d32; }
  .text-danger { color: #c62828; }
  .correct-answer-display {
    display: block;
    margin-top: 5px;
    color: #1b5e20;
    background-color: #e8f5e9;
    padding: 8px;
    border-radius: 4px;
    border-left: 4px solid #4caf50;
    font-weight: normal;
  }

  /* Button Styles */
  .btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 40px;
  }
  button { 
    padding: 12px 24px; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer; 
    color: white; 
    border: none; 
    border-radius: 4px; 
    transition: background-color 0.2s;
  }
  #submit-btn { background-color: #0056b3; }
  #submit-btn:hover { background-color: #004494; }
  #submit-btn:disabled { background-color: #999; cursor: not-allowed; }
  
  #retry-btn { background-color: #424242; display: none; }
  #retry-btn:hover { background-color: #212121; }

  #results { 
    margin-top: 20px; 
    font-weight: bold; 
    text-align: center; 
    font-size: 1.4em; 
  }
</style>
</head>
<body>

<h1>Unit 8 Trigonometry Readiness Assessment</h1>

<div id="validation-error" class="error-msg">Please answer all highlighted questions before submitting.</div>

<form id="quiz-form">
  <div id="quiz-container"></div>
  
  <div class="btn-group">
    <button type="submit" id="submit-btn">Submit Answers</button>
    <button type="button" id="retry-btn">Retry Assessment</button>
  </div>
</form>

<div id="results"></div>

<script>
const quizData = [
  {
    prompt: "State the quadrant in which the terminal side of the angle \\( 250^\\circ \\) lies.",
    choices: ["I", "II", "III", "IV"],
    correct: 2
  },
  {
    prompt: "Find a positive and a negative coterminal angle for \\( -200^\\circ \\).",
    choices: [
      "\\( 160^\\circ \\) and \\( -560^\\circ \\)", 
      "\\( 70^\\circ \\) and \\( -290^\\circ \\)", 
      "\\( 180^\\circ \\) and \\( -540^\\circ \\)", 
      "\\( 200^\\circ \\) and \\( -400^\\circ \\)"
    ],
    correct: 0
  },
  {
    prompt: "Convert the degree measure \\( 330^\\circ \\) into radians.",
    choices: [
      "\\( \\frac{5\\pi}{6} \\)", 
      "\\( \\frac{11\\pi}{6} \\)", 
      "\\( \\frac{7\\pi}{4} \\)", 
      "\\( \\frac{5\\pi}{3} \\)"
    ],
    correct: 1
  },
  {
    prompt: "Convert the radian measure \\( \\frac{7\\pi}{4} \\) into degrees.",
    choices: [
      "\\( 270^\\circ \\)", 
      "\\( 300^\\circ \\)", 
      "\\( 315^\\circ \\)", 
      "\\( 330^\\circ \\)"
    ],
    correct: 2
  },
  {
    prompt: "Find the length of the arc of a circle with radius \\( r = 12 \\text{ cm} \\) and central angle \\( \\theta = \\frac{5\\pi}{6} \\).",
    choices: [
      "\\( 10\\pi \\text{ cm} \\)", 
      "\\( 12\\pi \\text{ cm} \\)", 
      "\\( 5\\pi \\text{ cm} \\)", 
      "\\( 20\\pi \\text{ cm} \\)"
    ],
    correct: 0
  },
  {
    prompt: "Find the area of a sector with radius \\( r = 8 \\text{ m} \\) and central angle \\( \\theta = 150^\\circ \\).",
    choices: [
      "\\( 40\\pi \\text{ m}^2 \\)", 
      "\\( \\frac{40\\pi}{3} \\text{ m}^2 \\)", 
      "\\( \\frac{80\\pi}{3} \\text{ m}^2 \\)", 
      "\\( \\frac{160\\pi}{3} \\text{ m}^2 \\)"
    ],
    correct: 2
  },
  {
    prompt: "Find \\( \\cot \\theta \\) if \\( \\cos \\theta = \\frac{3}{5} \\) and the angle is in the first quadrant.",
    choices: [
      "\\( \\frac{4}{3} \\)", 
      "\\( \\frac{3}{4} \\)", 
      "\\( \\frac{4}{5} \\)", 
      "\\( \\frac{5}{3} \\)"
    ],
    correct: 1
  },
  {
    prompt: "Use a calculator to find \\( \\sec 250^\\circ \\). Round your answer to the nearest ten-thousandth.",
    choices: [
      "\\( -0.3420 \\)", 
      "\\( 2.9238 \\)", 
      "\\( -2.9238 \\)", 
      "\\( 0.3420 \\)"
    ],
    correct: 2
  },
  {
    prompt: "Solve the triangle: In \\( \\Delta ABC \\), \\( a = 15 \\), \\( b = 20 \\), and \\( c = 25 \\). Find the measure of \\( \\angle C \\).",
    choices: [
      "\\( 45^\\circ \\)", 
      "\\( 60^\\circ \\)", 
      "\\( 90^\\circ \\)", 
      "\\( 120^\\circ \\)"
    ],
    correct: 2
  },
  {
    prompt: "Find the area of a triangle given \\( a = 10 \\text{ in} \\), \\( b = 14 \\text{ in} \\), and included angle \\( C = 45^\\circ \\). Round to the nearest tenth.",
    choices: [
      "\\( 35.0 \\text{ in}^2 \\)", 
      "\\( 49.5 \\text{ in}^2 \\)", 
      "\\( 70.0 \\text{ in}^2 \\)", 
      "\\( 99.0 \\text{ in}^2 \\)"
    ],
    correct: 1
  },
  {
    prompt: "Find the measure of the indicated angle to the nearest degree: A right triangle has a leg of 15 adjacent to angle \\( \\theta \\), and a hypotenuse of 25.",
    choices: [
      "\\( 31^\\circ \\)", 
      "\\( 37^\\circ \\)", 
      "\\( 45^\\circ \\)", 
      "\\( 53^\\circ \\)"
    ],
    correct: 3
  },
  {
    prompt: "Find the exact value of \\( \\sec \\left(\\frac{\\pi}{3}\\right) \\) without using a calculator.",
    choices: [
      "\\( \\frac{1}{2} \\)", 
      "\\( 2 \\)", 
      "\\( \\frac{2\\sqrt{3}}{3} \\)", 
      "\\( \\sqrt{3} \\)"
    ],
    correct: 1
  },
  {
    prompt: "Find the complement and supplement of \\( 52^\\circ \\).",
    choices: [
      "Complement: \\( 38^\\circ \\), Supplement: \\( 128^\\circ \\)", 
      "Complement: \\( 128^\\circ \\), Supplement: \\( 38^\\circ \\)", 
      "Complement: \\( 48^\\circ \\), Supplement: \\( 138^\\circ \\)", 
      "Complement: \\( 142^\\circ \\), Supplement: None"
    ],
    correct: 0
  },
  {
    prompt: "Convert \\( 60^\\circ 15' 18'' \\) from degrees-minutes-seconds to decimal degrees.",
    choices: [
      "\\( 60.1518^\\circ \\)", 
      "\\( 60.525^\\circ \\)", 
      "\\( 60.255^\\circ \\)", 
      "\\( 60.305^\\circ \\)"
    ],
    correct: 2
  },
  {
    prompt: "Convert \\( -112.45^\\circ \\) from decimal degrees to degrees-minutes-seconds.",
    choices: [
      "\\( -112^\\circ 45' 0'' \\)", 
      "\\( -112^\\circ 27' 0'' \\)", 
      "\\( -112^\\circ 40' 5'' \\)", 
      "\\( -112^\\circ 20' 5'' \\)"
    ],
    correct: 1
  },
  {
    prompt: "A bicycle wheel has a diameter of 26 inches and rotates at 150 revolutions per minute. Find the angular speed in radians per minute.",
    choices: [
      "\\( 75\\pi \\text{ rad/min} \\)", 
      "\\( 150\\pi \\text{ rad/min} \\)", 
      "\\( 300\\pi \\text{ rad/min} \\)", 
      "\\( 600\\pi \\text{ rad/min} \\)"
    ],
    correct: 2
  },
  {
    prompt: "You are standing 100 feet from the base of a tall building. The angle of elevation to the top of the building is \\( 60^\\circ \\). What is the exact height of the building?",
    choices: [
      "\\( 50\\sqrt{3} \\text{ ft} \\)", 
      "\\( 100 \\text{ ft} \\)", 
      "\\( 100\\sqrt{3} \\text{ ft} \\)", 
      "\\( \\frac{100\\sqrt{3}}{3} \\text{ ft} \\)"
    ],
    correct: 2
  }
];

document.addEventListener('DOMContentLoaded', () => {
  const quizContainer = document.getElementById('quiz-container');
  const form = document.getElementById('quiz-form');
  const submitBtn = document.getElementById('submit-btn');
  const retryBtn = document.getElementById('retry-btn');
  const resultsDiv = document.getElementById('results');
  const errorMsg = document.getElementById('validation-error');
  const STORAGE_KEY = 'unit8_quiz_state';

  function saveState() {
    const userAnswers = {};
    quizData.forEach((_, index) => {
      const selected = document.querySelector(`input[name="q${index}"]:checked`);
      if (selected) {
        userAnswers[index] = selected.value;
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
  }

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      return JSON.parse(saved);
    }
    return {};
  }

  function renderAssessment() {
    quizContainer.innerHTML = '';
    const savedAnswers = loadState();
    
    quizData.forEach((q, index) => {
      const fieldset = document.createElement('fieldset');
      fieldset.className = 'question-container';
      fieldset.id = `question-container-${index}`;
      
      let html = `<legend>Question ${index + 1}</legend>`;
      html += `<p>${q.prompt}</p>`;
      
      q.choices.forEach((choice, cIndex) => {
        const isChecked = savedAnswers[index] == cIndex ? 'checked' : '';
        html += `
          <div class="choice" id="choice-${index}-${cIndex}">
            <label>
              <input type="radio" name="q${index}" value="${cIndex}" ${isChecked}>
              ${choice}
            </label>
          </div>`;
      });
      
      html += `<div id="feedback-${index}" class="feedback-text"></div>`;
      
      fieldset.innerHTML = html;
      quizContainer.appendChild(fieldset);
    });
    
    typesetMath(quizContainer);
  }

  function typesetMath(root) {
    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetPromise([root]).catch((err) => console.error('MathJax error:', err));
    }
  }

  // Handle auto-saving and clear individual unanswered highlights on change
  quizContainer.addEventListener('change', (e) => {
    if (e.target.type === 'radio') {
      const fieldset = e.target.closest('fieldset');
      if (fieldset) {
        fieldset.classList.remove('unanswered-highlight');
      }
      saveState();
    }
  });

  // Handle Quiz Submission
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    submitBtn.disabled = true; // Lock button immediately
    errorMsg.style.display = 'none';
    
    let allAnswered = true;
    let score = 0;

    // Validation pass
    quizData.forEach((_, index) => {
      const selected = document.querySelector(`input[name="q${index}"]:checked`);
      const fieldset = document.getElementById(`question-container-${index}`);
      
      if (!selected) {
        allAnswered = false;
        fieldset.classList.add('unanswered-highlight');
      } else {
        fieldset.classList.remove('unanswered-highlight');
      }
    });

    if (!allAnswered) {
      errorMsg.style.display = 'block';
      submitBtn.disabled = false; // Re-enable if validation fails
      
      // Scroll to the first unanswered question
      const firstUnanswered = document.querySelector('.unanswered-highlight');
      if (firstUnanswered) {
        firstUnanswered.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return;
    }

    // Scoring and Feedback pass
    quizData.forEach((q, index) => {
      const selected = document.querySelector(`input[name="q${index}"]:checked`);
      const selectedValue = parseInt(selected.value);
      const feedbackDiv = document.getElementById(`feedback-${index}`);
      
      document.querySelectorAll(`input[name="q${index}"]`).forEach(input => {
        input.disabled = true;
      });

      if (selectedValue === q.correct) {
        score++;
        document.getElementById(`choice-${index}-${selectedValue}`).classList.add('correct-choice');
        feedbackDiv.innerHTML = '<span class="text-success">Correct!</span>';
      } else {
        document.getElementById(`choice-${index}-${selectedValue}`).classList.add('incorrect-choice');
        document.getElementById(`choice-${index}-${q.correct}`).classList.add('correct-choice');
        feedbackDiv.innerHTML = `
          <span class="text-danger">Incorrect.</span>
          <span class="correct-answer-display">The correct answer is: ${q.choices[q.correct]}</span>
        `;
      }
    });

    const percentage = Math.round((score / quizData.length) * 100);
    resultsDiv.innerHTML = `You scored ${score} out of ${quizData.length} (${percentage}%)`;
    resultsDiv.style.color = percentage >= 70 ? '#2e7d32' : '#c62828';

    submitBtn.style.display = 'none';
    retryBtn.style.display = 'inline-block';
    
    // Clear storage now that the quiz is successfully submitted
    localStorage.removeItem(STORAGE_KEY);
    
    typesetMath(quizContainer);
    typesetMath(resultsDiv);
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Handle Retry Flow
  retryBtn.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    resultsDiv.innerHTML = '';
    submitBtn.style.display = 'inline-block';
    submitBtn.disabled = false;
    retryBtn.style.display = 'none';
    errorMsg.style.display = 'none';
    
    renderAssessment();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Initial load
  renderAssessment();
});
</script>
</body>
</html>
