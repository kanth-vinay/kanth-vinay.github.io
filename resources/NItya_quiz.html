<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1D2C48;
  --navy-deep:#131E35;
  --green:#2C5545;
  --green-deep:#1E3B30;
  --gold:#B58D3D;
  --ink:#1D2C48;
  --muted:#5D6872;
  --bg:#F5F2EB;
  --bg-alt:#EAE6DD;
  --card:#FFFFFF;
  --border:#DCD8D0;
  --border-soft:#E6E2D9;
  --success:#2C5545;
  --error:#9B2C2C;
  --success-bg:#E8F0EC;
  --error-bg:#F5E6E6;
  --timer:#8B5E11;
  --sidebar-w:270px;
  --shadow:0 4px 14px rgba(29,44,72,.08);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
}
aside{
  background:var(--navy);
  color:#F5F2EB;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  z-index:100;
}
aside::-webkit-scrollbar{width:6px}
aside::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:9px}
.brand{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08)}
.brand h1{font-family:'Poppins',sans-serif;font-weight:900;font-size:1.15rem;letter-spacing:.02em}
.brand .tag{font-size:.68rem;color:rgba(245,242,235,.45);margin-top:2px;letter-spacing:.03em}
.side-box{padding:.85rem 1.25rem;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);font-weight:700;font-size:.83rem;display:flex;justify-content:space-between;gap:10px;align-items:center}
.side-box .val{color:var(--gold);font-size:1.08rem}
.side-prog{padding:.6rem 1.25rem;font-size:.72rem;color:rgba(255,255,255,.42);border-bottom:1px solid rgba(255,255,255,.06)}
.side-prog .bar{height:4px;border-radius:4px;background:rgba(255,255,255,.1);margin-top:6px;overflow:hidden}
.side-prog .bar span{display:block;height:100%;border-radius:4px;background:var(--gold);width:0%;transition:width .35s}
.nav{list-style:none;padding:.45rem 0;flex:1;overflow-y:auto}
.nav li a{
  display:flex;align-items:center;gap:8px;padding:5px 1.25rem;font-size:.78rem;
  color:rgba(245,242,235,.62);text-decoration:none;transition:background .15s,color .15s
}
.nav li a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav li a.active{background:rgba(255,255,255,.08);color:#fff}
.nav li a .d{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.26);flex-shrink:0;transition:all .2s}
.nav li a.ok .d{background:#48bb78;border-color:#48bb78}
.nav li a.no .d{background:#f56565;border-color:#f56565}
.ns{
  padding:10px 1.25rem 4px;
  font-size:.64rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:rgba(245,242,235,.28);
  font-weight:700;
  margin-top:6px
}
main{padding:2.4rem 3rem 4rem;max-width:920px;overflow-y:auto}
.hdr{
  text-align:center;
  margin-bottom:2rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--border)
}
.hdr h1{
  font-family:'Poppins',sans-serif;
  font-weight:900;
  font-size:1.9rem;
  color:var(--navy);
  line-height:1.2
}
.hdr .sub{color:var(--muted);font-size:.92rem;margin-top:.35rem}
.hdr .badge{
  display:inline-block;
  margin-top:.65rem;
  background:var(--bg-alt);
  border:1px solid var(--border);
  padding:4px 14px;
  border-radius:20px;
  font-size:.72rem;
  font-weight:700;
  color:var(--green);
  letter-spacing:.03em
}
.top-tools{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
  flex-wrap:wrap;
  margin:0 0 1.5rem
}
.timer-wrap{
  display:flex;
  align-items:center;
  gap:.7rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:.7rem 1rem;
  box-shadow:var(--shadow)
}
.timer-wrap .label{
  font-size:.74rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:700;
  color:var(--muted)
}
.timer-wrap .time{
  font-family:'Poppins',sans-serif;
  font-weight:900;
  color:var(--timer);
  font-size:1.1rem
}
.timer-wrap .time.warn{color:#b7791f}
.timer-wrap .time.danger{color:var(--error)}
.controls{
  display:flex;
  gap:.7rem;
  flex-wrap:wrap
}
.btn-lite,.btn-reset{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--navy);
  padding:.6rem .95rem;
  border-radius:10px;
  font-weight:700;
  font-size:.82rem;
  cursor:pointer;
  transition:.18s
}
.btn-lite:hover,.btn-reset:hover{background:var(--bg-alt)}
.btn-reset{border-color:#d9534f;color:#b33939}
.qc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.55rem 1.7rem;
  margin-bottom:1.35rem;
  box-shadow:var(--shadow);
  transition:border-color .2s;
  scroll-margin-top:1.2rem
}
.qc:target{border-color:var(--gold)}
.qn{
  font-family:'Poppins',sans-serif;
  font-weight:800;
  font-size:.84rem;
  color:var(--green);
  margin-bottom:.5rem;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap
}
.qn .st{
  font-family:'Inter',sans-serif;
  font-weight:600;
  color:var(--muted);
  font-size:.68rem;
  background:var(--bg);
  padding:1px 8px;
  border-radius:10px
}
.qp{font-size:.96rem;margin-bottom:1rem;line-height:1.68}
.fig{
  margin:.5rem auto .85rem;
  display:flex;
  justify-content:center
}
.fig svg{
  max-width:100%;
  height:auto;
  display:block
}
.chs{display:flex;flex-direction:column;gap:.48rem;margin-bottom:.95rem}
.ch{position:relative}
.ch input{position:absolute;opacity:0;width:0;height:0}
.ch label{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:.7rem .9rem;
  border:1.5px solid var(--border-soft);
  border-radius:10px;
  cursor:pointer;
  transition:.15s;
  font-size:.92rem;
  line-height:1.55
}
.ch label .lt{
  width:26px;height:26px;border-radius:50%;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.75rem;flex-shrink:0;
  border:1.5px solid var(--border);
  transition:.15s;margin-top:1px
}
.ch input:checked~label{border-color:var(--navy);background:rgba(29,44,72,.03)}
.ch input:checked~label .lt{background:var(--navy);color:#fff;border-color:var(--navy)}
.ch input:focus-visible~label{outline:2px solid var(--gold);outline-offset:2px}
.ch.ok label{border-color:var(--success)!important;background:var(--success-bg)!important}
.ch.ok label .lt{background:var(--success)!important;color:#fff!important;border-color:var(--success)!important}
.ch.no label{border-color:var(--error)!important;background:var(--error-bg)!important}
.ch.no label .lt{background:var(--error)!important;color:#fff!important;border-color:var(--error)!important}
.lk .ch label{cursor:default;opacity:.88}
.lk .ch input:checked~label{opacity:1}
.lk .ch.ok label{opacity:1}
.row-actions{
  display:flex;
  align-items:center;
  gap:1rem;
  flex-wrap:wrap
}
.sb{
  background:var(--green);
  color:#fff;
  border:none;
  padding:.58rem 1.55rem;
  border-radius:9px;
  font-weight:700;
  font-size:.84rem;
  cursor:pointer;
  transition:background .15s;
  font-family:inherit
}
.sb:hover{background:var(--green-deep)}
.sb:disabled{opacity:.45;cursor:not-allowed}
.vm{
  color:var(--error);
  font-size:.84rem;
  font-weight:700;
  display:none
}
.fb{
  margin-top:.8rem;
  padding:.7rem .95rem;
  border-radius:8px;
  font-size:.83rem;
  line-height:1.58;
  display:none
}
.fb.sh{display:block}
.fb.ok{background:var(--success-bg);color:var(--success);border-left:3px solid var(--success)}
.fb.no{background:var(--error-bg);color:var(--error);border-left:3px solid var(--error)}
.done{
  display:none;
  text-align:center;
  padding:2.5rem;
  background:var(--card);
  border:2px solid var(--gold);
  border-radius:14px;
  margin-top:1.6rem;
  box-shadow:var(--shadow)
}
.done h2{font-family:'Poppins',sans-serif;color:var(--navy);font-weight:900;font-size:1.35rem}
.done .fs{font-size:2rem;font-weight:900;color:var(--green);margin:.6rem 0}
.done .mx{color:var(--muted);font-size:.9rem}
.done .extra{margin-top:.5rem;font-size:.86rem;color:var(--muted)}
.done.sh{display:block}
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(19,30,53,.38);
  z-index:90
}
.overlay.sh{display:block}
@media(max-width:950px){
  :root{--sidebar-w:225px}
  main{padding:2rem 1.35rem}
}
@media(max-width:760px){
  body{grid-template-columns:1fr}
  aside{position:fixed;left:-290px;width:290px;transition:left .28s}
  aside.open{left:0}
  .mt{display:flex!important}
  main{padding:1.5rem 1rem}
}
.mt{
  display:none;
  position:fixed;
  top:12px;left:12px;
  z-index:200;
  background:var(--navy);
  color:#fff;
  border:none;
  width:40px;height:40px;
  border-radius:8px;
  align-items:center;justify-content:center;
  font-size:1.2rem;
  cursor:pointer
}
</style>
</head>
<body>
<button class="mt" id="menuBtn" aria-label="Toggle navigation">☰</button>
<div class="overlay" id="overlay"></div>

<aside id="sidebar">
  <div class="brand">
    <h1>ActiveSTEM</h1>
    <div class="tag">A Global STEM Institute with Local Impact.</div>
  </div>
  <div class="side-box">Score <span class="val" id="ss">0</span></div>
  <div class="side-box">Time Left <span class="val" id="sideTimer">30:00</span></div>
  <div class="side-prog">
    <span id="pt">0 / 25 answered</span>
    <div class="bar"><span id="pb"></span></div>
  </div>
  <ul class="nav" id="nl"></ul>
</aside>

<main>
  <div class="hdr">
    <h1>Honors Algebra 2 / Trigonometry</h1>
    <div class="sub">Advanced Trigonometry Challenge</div>
    <span class="badge">25 Questions · +10 / −5 Scoring · Timed</span>
  </div>

  <div class="top-tools">
    <div class="timer-wrap">
      <span class="label">Countdown</span>
      <span class="time" id="mainTimer">30:00</span>

    <div class="controls">
      <button class="btn-lite" id="scrollTopBtn">Top</button>
      <button class="btn-reset" id="resetBtn">Reset Assessment</button>
    </div>
  </div>

  <div id="qs"></div>

  <div class="done" id="dn">
    <h2>Assessment Complete</h2>
    <div class="fs" id="fsc"></div>
    <div class="mx">Maximum possible score: <span id="mxs"></span></div>
    <div class="extra" id="doneMsg"></div>
  </div>
</main>

<script>
const STORAGE_KEY = 'activestem_trig_challenge_v1';
const TOTAL_SECONDS = 30 * 60;
const L = ['A','B','C','D'];

const D = [
  {
    sec:"Angles & Reference Angles",
    prompt:"Which angle is coterminal with \\(-\\dfrac{19\\pi}{6}\\) and lies in \\([0,2\\pi)\\)?",
    ch:["\\(\\dfrac{5\\pi}{6}\\)","\\(\\dfrac{7\\pi}{6}\\)","\\(\\dfrac{11\\pi}{6}\\)","\\(\\dfrac{\\pi}{6}\\)"],
    ans:0,
    exp:"\\(-\\frac{19\\pi}{6} + 2\\pi = -\\frac{7\\pi}{6}\\). Adding another \\(2\\pi\\) (or \\(\\frac{12\\pi}{6}\\)) gives \\(\\frac{5\\pi}{6}\\)."
  },
  {
    sec:"Angles & Reference Angles",
    prompt:"The terminal side of \\(\\theta\\) lies in Quadrant III and has reference angle \\(\\dfrac{2\\pi}{9}\\). Which could be \\(\\theta\\)?",
    ch:["\\(\\dfrac{11\\pi}{9}\\)","\\(\\dfrac{7\\pi}{9}\\)","\\(\\dfrac{16\\pi}{9}\\)","\\(\\dfrac{2\\pi}{9}\\)"],
    ans:0,
    exp:"In Quadrant III, \\(\\theta=\\pi+\\alpha\\). So \\(\\theta=\\pi+\\frac{2\\pi}{9}=\\frac{11\\pi}{9}\\)."
  },
  {
    sec:"Angles & Reference Angles",
    prompt:"Find the exact value of \\(\\sin(-315^\\circ)\\).",
    ch:["\\(-\\dfrac{\\sqrt2}{2}\\)","\\(\\dfrac{\\sqrt2}{2}\\)","\\(-\\dfrac{\\sqrt3}{2}\\)","\\(\\dfrac12\\)"],
    ans:1,
    exp:"\\(-315^\\circ\\) is coterminal with \\(45^\\circ\\), so \\(\\sin(-315^\\circ)=\\sin 45^\\circ=\\frac{\\sqrt2}{2}\\)."
  },
  {
    sec:"Angles & Reference Angles",
    prompt:"If \\(\\cos\\theta=-\\dfrac{5}{13}\\) and \\(\\theta\\) is in Quadrant II, what is \\(\\tan\\theta\\)?",
    ch:["\\(-\\dfrac{12}{5}\\)","\\(\\dfrac{12}{5}\\)","\\(-\\dfrac{5}{12}\\)","\\(\\dfrac{5}{12}\\)"],
    ans:0,
    exp:"With \\(\\cos\\theta=\\frac{x}{r}=-\\frac{5}{13}\\), take \\(x=-5, r=13\\). Then \\(y=12\\) in Quadrant II. So \\(\\tan\\theta=\\frac{y}{x}=\\frac{12}{-5}=-\\frac{12}{5}\\)."
  },
  {
    sec:"Identities & Exact Values",
    prompt:"Given \\(\\sin\\theta=-\\dfrac{3}{5}\\) and \\(\\theta\\) is in Quadrant IV, find \\(\\sec\\theta\\).",
    ch:["\\(-\\dfrac54\\)","\\(\\dfrac54\\)","\\(-\\dfrac53\\)","\\(\\dfrac53\\)"],
    ans:1,
    exp:"If \\(\\sin\\theta=\\frac{y}{r}=-\\frac35\\), then \\(y=-3, r=5\\). In Quadrant IV, \\(x=4\\). So \\(\\cos\\theta=\\frac45\\), hence \\(\\sec\\theta=\\frac54\\)."
  },
  {
    sec:"Identities & Exact Values",
    prompt:"Which expression is equal to \\(\\cos(90^\\circ-\\theta)\\)?",
    ch:["\\(\\sin\\theta\\)","\\(-\\sin\\theta\\)","\\(\\tan\\theta\\)","\\(\\csc\\theta\\)"],
    ans:0,
    exp:"By the cofunction identity, \\(\\cos(90^\\circ-\\theta)=\\sin\\theta\\)."
  },
  {
    sec:"Identities & Exact Values",
    prompt:"Evaluate \\(\\sin\\left(-\\dfrac{7\\pi}{6}\\right)\\).",
    ch:["\\(\\dfrac12\\)","\\(-\\dfrac12\\)","\\(\\dfrac{\\sqrt3}{2}\\)","\\(-\\dfrac{\\sqrt3}{2}\\)"],
    ans:0,
    exp:"Use odd symmetry: \\(\\sin(-x)=-\\sin x\\). Since \\(\\sin\\frac{7\\pi}{6}=-\\frac12\\), then \\(\\sin(-\\frac{7\\pi}{6})=\\frac12\\)."
  },
  {
    sec:"Identities & Exact Values",
    prompt:"Find the exact value of \\(\\dfrac{\\sin 30^\\circ\\cos 60^\\circ}{\\tan 45^\\circ}\\).",
    ch:["\\(\\dfrac14\\)","\\(\\dfrac12\\)","\\(\\dfrac{\\sqrt3}{4}\\)","\\(1\\)"],
    ans:0,
    exp:"\\(\\sin30^\\circ=\\frac12\\), \\(\\cos60^\\circ=\\frac12\\), and \\(\\tan45^\\circ=1\\). So the value is \\(\\frac12\\cdot\\frac12=\\frac14\\)."
  },
  {
    sec:"Reference Angles & Signs",
    prompt:"Which statement is true?",
    ch:[
      "\\(\\sin\\theta\\) and \\(\\cos\\theta\\) are both negative in Quadrant III.",
      "\\(\\tan\\theta\\) is negative in Quadrant III.",
      "\\(\\sec\\theta\\) is positive in Quadrant II.",
      "\\(\\csc\\theta\\) is negative in Quadrant I."
    ],
    ans:0,
    exp:"In Quadrant III, both sine and cosine are negative, so tangent is positive. The other three statements are false."
  },
  {
    sec:"Reference Angles & Signs",
    prompt:"If \\(\\tan\\theta=-\\sqrt3\\) and \\(\\sin\\theta<0\\), which is the exact value of \\(\\theta\\) in \\([0,2\\pi)\\)?",
    ch:["\\(\\dfrac{2\\pi}{3}\\)","\\(\\dfrac{4\\pi}{3}\\)","\\(\\dfrac{5\\pi}{3}\\)","\\(\\dfrac{\\pi}{3}\\)"],
    ans:2,
    exp:"\\(\\tan\\theta=-\\sqrt3\\) gives a reference angle of \\(\\frac{\\pi}{3}\\). Since tangent and sine are both negative, \\(\\theta\\) must be in Quadrant IV: \\(2\\pi-\\frac{\\pi}{3}=\\frac{5\\pi}{3}\\)."
  },
  {
    sec:"Arc Length & Sector Area",
    prompt:`Find the arc length of the sector shown.
    <div class="fig">
      <svg viewBox="0 0 200 200" width="180" height="180" aria-hidden="true">
        <circle cx="100" cy="100" r="72" fill="none" stroke="#DCD8D0" stroke-dasharray="4 3"/>

        <text x="140" y="118" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">8 cm</text>
        <text x="96" y="77" font-size="11" fill="#B58D3D" font-family="Inter" font-weight="700">2.4 rad</text>

    </div>`,
    ch:["\\(19.2\\text{ cm}\\)","\\(9.6\\text{ cm}\\)","\\(15.4\\text{ cm}\\)","\\(38.4\\text{ cm}\\)"],
    ans:0,
    exp:"Arc length is \\(s=r\\theta=8(2.4)=19.2\\text{ cm}\\)."
  },
  {
    sec:"Arc Length & Sector Area",
    prompt:`Find the area of the sector shown.
    <div class="fig">
      <svg viewBox="0 0 200 200" width="180" height="180" aria-hidden="true">
        <circle cx="100" cy="100" r="72" fill="none" stroke="#DCD8D0" stroke-dasharray="4 3"/>
        <path d="M100,100 L172,100 A72,72 0 0,0 100,28 Z" fill="rgba(181,141,61,.12)" stroke="#B58D3D" stroke-width="1.8"/>
        <text x="139" y="118" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">12 in</text>
        <text x="124" y="84" font-size="11" fill="#B58D3D" font-family="Inter" font-weight="700">120°</text>

    ch:["\\(24\\pi\\text{ in}^2\\)","\\(48\\pi\\text{ in}^2\\)","\\(16\\pi\\text{ in}^2\\)","\\(12\\pi\\text{ in}^2\\)"],
    ans:0,
    exp:"Convert \\(120^\\circ\\) to \\(\\frac{2\\pi}{3}\\). Then \\(A=\\frac12r^2\\theta=\\frac12(12^2)\\left(\\frac{2\\pi}{3}\\right)=24\\pi\\)."
  },
  {
    sec:"Arc Length & Sector Area",
    prompt:"A wheel of radius \\(14\\) inches rotates through \\(225^\\circ\\). How far does a point on the rim travel?",
    ch:["\\(17.5\\pi\\text{ in}\\)","\\(28\\pi\\text{ in}\\)","\\(14\\pi\\text{ in}\\)","\\(35\\pi\\text{ in}\\)"],
    ans:0,
    exp:"\\(225^\\circ=\\frac{5\\pi}{4}\\). So \\(s=r\\theta=14\\cdot\\frac{5\\pi}{4}=17.5\\pi\\)."
  },
  {
    sec:"Angular & Linear Speed",
    prompt:"A fan rotates at \\(90\\) revolutions per second. What is its angular speed in radians per second?",
    ch:["\\(90\\pi\\)","\\(180\\pi\\)","\\(45\\pi\\)","\\(360\\pi\\)"],
    ans:1,
    exp:"One revolution is \\(2\\pi\\) radians, so \\(\\omega=90(2\\pi)=180\\pi\\text{ rad/s}\\)."
  },
  {
    sec:"Angular & Linear Speed",
    prompt:"A point on the edge of a merry-go-round of radius \\(5\\) m moves with angular speed \\(\\frac{3\\pi}{2}\\) rad/s. What is the linear speed?",
    ch:["\\(\\frac{3\\pi}{10}\\text{ m/s}\\)","\\(\\frac{15\\pi}{2}\\text{ m/s}\\)","\\(\\frac{5\\pi}{2}\\text{ m/s}\\)","\\(15\\pi\\text{ m/s}\\)"],
    ans:1,
    exp:"Linear speed is \\(v=r\\omega=5\\cdot\\frac{3\\pi}{2}=\\frac{15\\pi}{2}\\text{ m/s}\\)."
  },
  {
    sec:"Right-Triangle Trig",
    prompt:`Find \\(\\sin\\theta\\) for the triangle shown.
    <div class="fig">
      <svg viewBox="0 0 210 175" width="185" height="155" aria-hidden="true">
        <polygon points="30,150 180,150 30,50" fill="rgba(44,85,69,.04)" stroke="#1D2C48" stroke-width="1.5"/>
        <polyline points="30,136 44,136 44,150" fill="none" stroke="#5D6872"/>
        <text x="105" y="168" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">24</text>
        <text x="16" y="103" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">10</text>
        <text x="104" y="92" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">26</text>
        <path d="M160,150 A20,20 0 0,0 167,138" fill="none" stroke="#B58D3D" stroke-width="1.5"/>
        <text x="157" y="132" font-size="10" fill="#B58D3D" font-family="Inter" font-weight="700">θ</text>
      </svg>
    </div>`,
    ch:["\\(\\dfrac{5}{13}\\)","\\(\\dfrac{12}{13}\\)","\\(\\dfrac{13}{5}\\)","\\(\\dfrac{10}{13}\\)"],
    ans:0,
    exp:"Relative to \\(\\theta\\), the opposite side is 10 and the hypotenuse is 26, so \\(\\sin\\theta=\\frac{10}{26}=\\frac{5}{13}\\)."
  },
  {
    sec:"Inverse Trig",
    prompt:`Find the indicated angle to the nearest tenth of a degree.
    <div class="fig">
      <svg viewBox="0 0 210 175" width="185" height="155" aria-hidden="true">
        <polygon points="30,150 180,150 30,60" fill="rgba(44,85,69,.04)" stroke="#1D2C48" stroke-width="1.5"/>
        <polyline points="30,136 44,136 44,150" fill="none" stroke="#5D6872"/>
        <text x="105" y="168" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">18</text>
        <text x="104" y="95" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">30</text>
        <path d="M160,150 A20,20 0 0,0 167,138" fill="none" stroke="#B58D3D" stroke-width="1.5"/>
        <text x="157" y="132" font-size="10" fill="#B58D3D" font-family="Inter" font-weight="700">θ</text>
      </svg>
    </div>`,
    ch:["\\(36.9^\\circ\\)","\\(53.1^\\circ\\)","\\(31.0^\\circ\\)","\\(58.0^\\circ\\)"],
    ans:1,
    exp:"\\(\\cos\\theta=\\frac{18}{30}=0.6\\), so \\(\\theta=\\cos^{-1}(0.6)\\approx53.1^\\circ\\)."
  },
  {
    sec:"Law of Sines",
    prompt:"In \\(\\triangle ABC\\), \\(a=14\\), \\(b=11\\), and \\(\\angle A=72^\\circ\\). Find \\(\\angle B\\) to the nearest tenth.",
    ch:["\\(28.6^\\circ\\)","\\(48.4^\\circ\\)","\\(35.0^\\circ\\)","\\(51.4^\\circ\\)"],
    ans:1,
    exp:"By the Law of Sines, \\(\\frac{\\sin B}{11}=\\frac{\\sin72^\\circ}{14}\\). Thus \\(\\sin B = \\frac{11\\sin72^\\circ}{14} \\approx 0.7472\\), so \\(B \\approx 48.4^\\circ\\)."
  },
  {
    sec:"Law of Sines",
    prompt:"For \\(\\angle A=35^\\circ\\), \\(a=10\\), and \\(b=13\\), how many triangles are possible?",
    ch:["0","1","2","Infinitely many"],
    ans:2,
    exp:"This is the SSA ambiguous case. Compute the height: \\(h=b\\sin A=13\\sin35^\\circ\\approx7.46\\). Since \\(h<a<b\\), two triangles are possible."
  },
  {
    sec:"Law of Cosines",
    prompt:"Find side \\(c\\) if \\(a=9\\), \\(b=13\\), and \\(C=120^\\circ\\).",
    ch:["19","22","\\(\\sqrt{367}\\)","\\(\\sqrt{133}\\)"],
    ans:2,
    exp:"\\(c^2=a^2+b^2-2ab\\cos C=81+169-2(9)(13)(-\\tfrac12)=250+117=367\\). So \\(c=\\sqrt{367}\\)."
  },
  {
    sec:"Law of Cosines",
    prompt:"Find \\(\\angle C\\) to the nearest tenth if \\(a=8\\), \\(b=15\\), and \\(c=17\\).",
    ch:["\\(90.0^\\circ\\)","\\(56.3^\\circ\\)","\\(33.7^\\circ\\)","\\(102.5^\\circ\\)"],
    ans:0,
    exp:"Since \\(8^2+15^2=17^2\\), the triangle is right. So \\(\\angle C=90^\\circ\\)."
  },
  {
    sec:"Oblique Triangle Area",
    prompt:"Find the area of a triangle with sides \\(12\\) and \\(15\\) enclosing an angle of \\(38^\\circ\\).",
    ch:["\\(90\\sin38^\\circ\\)","\\(180\\sin38^\\circ\\)","\\(90\\cos38^\\circ\\)","\\(27\\sin38^\\circ\\)"],
    ans:0,
    exp:"Use \\(A=\\frac12ab\\sin C\\). So \\(A=\\frac12(12)(15)\\sin38^\\circ=90\\sin38^\\circ\\)."
  },
  {
    sec:"Applications",
    prompt:`From a point on the ground, the angle of elevation to the top of a building is \\(32^\\circ\\). If the point is 90 ft from the base of the building, what is the building’s height to the nearest tenth of a foot?
    <div class="fig">
      <svg viewBox="0 0 240 170" width="200" height="145" aria-hidden="true">
        <line x1="20" y1="145" x2="220" y2="145" stroke="#1D2C48" stroke-width="1.5"/>
        <line x1="170" y1="145" x2="170" y2="35" stroke="#1D2C48" stroke-width="1.5"/>
        <line x1="40" y1="145" x2="170" y2="35" stroke="#2C5545" stroke-width="1.7"/>
        <path d="M62,145 A22,22 0 0,1 78,133" fill="none" stroke="#B58D3D" stroke-width="1.5"/>
        <text x="78" y="129" font-size="10" fill="#B58D3D" font-family="Inter" font-weight="700">32°</text>
        <text x="102" y="160" font-size="11" fill="#1D2C48" font-family="Inter" font-weight="600">90 ft</text>
      </svg>
    </div>`,
    ch:["56.2 ft","144.0 ft","47.7 ft","67.4 ft"],
    ans:0,
    exp:"\\(\\tan32^\\circ=\\frac{h}{90}\\), so \\(h=90\\tan32^\\circ\\approx56.2\\text{ ft}\\)."
  },
  {
    sec:"Applications",
    prompt:"A ladder 18 ft long leans against a wall and makes a \\(63^\\circ\\) angle with the ground. How high up the wall does it reach, to the nearest tenth?",
    ch:["8.2 ft","16.0 ft","17.8 ft","15.9 ft"],
    ans:1,
    exp:"The vertical height is opposite the angle with the ground, so \\(h=18\\sin63^\\circ\\approx16.0\\text{ ft}\\)."
  },
  {
    sec:"Mixed Challenge",
    prompt:"If \\(\\sin\\theta=\\dfrac{5}{13}\\) and \\(\\cos\\theta<0\\), find the exact value of \\(\\sin(2\\theta)\\).",
    ch:["\\(-\\dfrac{120}{169}\\)","\\(\\dfrac{120}{169}\\)","\\(-\\dfrac{60}{169}\\)","\\(\\dfrac{60}{169}\\)"],
    ans:0,
    exp:"Since \\(\\sin\\theta>0\\) and \\(\\cos\\theta<0\\), \\(\\theta\\) is in Quadrant II. Then \\(\\cos\\theta=-\\frac{12}{13}\\). So \\(\\sin(2\\theta)=2\\sin\\theta\\cos\\theta=2\\cdot\\frac{5}{13}\\cdot\\left(-\\frac{12}{13}\\right)=-\\frac{120}{169}\\)."
  },
  {
    sec:"Mixed Challenge",
    prompt:"Which expression is equivalent to \\(\\dfrac{1-\\cos^2\\theta}{\\sin\\theta}\\), provided all denominators are defined?",
    ch:["\\(\\sin\\theta\\)","\\(\\cos\\theta\\)","\\(\\tan\\theta\\)","\\(\\sec\\theta\\)"],
    ans:0,
    exp:"Since \\(1-\\cos^2\\theta=\\sin^2\\theta\\), the expression becomes \\(\\dfrac{\\sin^2\\theta}{\\sin\\theta}=\\sin\\theta\\)."
  }
];

let state = {
  score: 0,
  answered: 0,
  remaining: TOTAL_SECONDS,
  answers: {},
  timeUp: false,
  completedShown: false
};

const nl = document.getElementById('nl');
const qs = document.getElementById('qs');
const ss = document.getElementById('ss');
const pt = document.getElementById('pt');
const pb = document.getElementById('pb');
const dn = document.getElementById('dn');
const fsc = document.getElementById('fsc');
const mxs = document.getElementById('mxs');
const doneMsg = document.getElementById('doneMsg');
const mainTimer = document.getElementById('mainTimer');
const sideTimer = document.getElementById('sideTimer');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menuBtn');

let timerInterval = null;
let lastSection = '';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Could not save state', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        state = Object.assign(state, parsed);
      }
    }
  } catch (e) {
    console.error('Could not load state', e);
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateTimerUI() {
  const text = formatTime(state.remaining);
  mainTimer.textContent = text;
  sideTimer.textContent = text;
  mainTimer.classList.remove('warn','danger');
  if (state.remaining <= 300 && state.remaining > 60) mainTimer.classList.add('warn');
  if (state.remaining <= 60) mainTimer.classList.add('danger');
}

function updateProgress() {
  ss.textContent = state.score;
  pt.textContent = state.answered + ' / ' + D.length + ' answered';
  pb.style.width = ((state.answered / D.length) * 100).toFixed(1) + '%';
  updateTimerUI();
}

function showCompletion(message) {
  dn.classList.add('sh');
  fsc.textContent = state.score;
  mxs.textContent = D.length * 10;
  doneMsg.textContent = message || '';
  state.completedShown = true;
  saveState();
}

function buildNavAndQuestions() {
  D.forEach((q, i) => {
    const n = i + 1;

    if (q.sec !== lastSection) {
      const h = document.createElement('li');
      h.innerHTML = '<div class="ns">' + q.sec + '</div>';
      nl.appendChild(h);
      lastSection = q.sec;
    }

    const li = document.createElement('li');
    li.innerHTML = '<a href="#q' + n + '" id="n' + n + '"><span class="d"></span>Q' + n + '</a>';
    nl.appendChild(li);

    let chHTML = '';
    q.ch.forEach((c, ci) => {
      chHTML += '<div class="ch" id="c' + n + '-' + ci + '">'
        + '<input type="radio" name="q' + n + '" value="' + ci + '" id="r' + n + '-' + ci + '">'
        + '<label for="r' + n + '-' + ci + '"><span class="lt">' + L[ci] + '</span><span>' + c + '</span></label>'
        + '</div>';
    });

    const card = document.createElement('article');
    card.className = 'qc';
    card.id = 'q' + n;
    card.innerHTML =
      '<div class="qn">Question ' + n + ' <span class="st">' + q.sec + '</span></div>' +
      '<div class="qp">' + q.prompt + '</div>' +
      '<div class="chs">' + chHTML + '</div>' +
      '<div class="row-actions">' +
      '<button class="sb" id="b' + n + '">Submit Answer</button>' +
      '<span class="vm" id="v' + n + '">Select an answer before submitting.</span>' +
      '</div>' +
      '<div class="fb" id="f' + n + '"></div>';
    qs.appendChild(card);

    document.getElementById('b' + n).addEventListener('click', () => go(n, q.ans, q.exp));
  });
}

function restoreStateToUI() {
  Object.keys(state.answers).forEach(key => {
    const n = parseInt(key, 10);
    const answerObj = state.answers[key];
    applyAnsweredState(n, answerObj.selected, answerObj.correct, D[n - 1].exp, false);
  });

  if (state.timeUp) {
    lockUnansweredDueToTime();
    showCompletion('Time is up.');
  } else if (state.answered === D.length && !state.completedShown) {
    showCompletion('All questions have been submitted.');
  } else if (state.completedShown) {
    const msg = state.timeUp ? 'Time is up.' : 'All questions have been submitted.';
    showCompletion(msg);
  }
}

function go(n, correctIndex, explanation) {
  if (state.timeUp) return;

  const selected = document.querySelector('input[name="q' + n + '"]:checked');
  const vm = document.getElementById('v' + n);
  if (!selected) {
    vm.style.display = 'inline';
    return;
  }
  vm.style.display = 'none';

  if (state.answers[n]) return;

  const selectedVal = parseInt(selected.value, 10);
  const isCorrect = selectedVal === correctIndex;
  state.answers[n] = { selected: selectedVal, correct: isCorrect };
  state.answered += 1;
  state.score += isCorrect ? 10 : -5;

  applyAnsweredState(n, selectedVal, isCorrect, explanation, true);
  updateProgress();
  saveState();

  if (state.answered === D.length) {
    clearInterval(timerInterval);
    showCompletion('All questions have been submitted.');
    dn.scrollIntoView({ behavior: 'smooth' });
  }
}

function applyAnsweredState(n, selectedVal, isCorrect, explanation, doTypeset) {
  const q = D[n - 1];
  const card = document.getElementById('q' + n);
  const fb = document.getElementById('f' + n);
  const navA = document.getElementById('n' + n);

  card.classList.add('lk');
  card.querySelectorAll('input').forEach(r => {
    r.disabled = true;
    if (parseInt(r.value, 10) === selectedVal) r.checked = true;
  });

  const btn = document.getElementById('b' + n);
  btn.disabled = true;
  btn.textContent = 'Submitted';

  document.getElementById('c' + n + '-' + q.ans).classList.add('ok');
  if (selectedVal !== q.ans) {
    document.getElementById('c' + n + '-' + selectedVal).classList.add('no');
  }

  if (isCorrect) {
    fb.className = 'fb sh ok';
    fb.innerHTML = '<strong>Correct! +10</strong> — ' + explanation;
    navA.classList.add('ok');
  } else {
    fb.className = 'fb sh no';
    fb.innerHTML = '<strong>Incorrect. −5</strong> — ' + explanation;
    navA.classList.add('no');
  }

  if (doTypeset && window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([fb]);
  }
}

function lockUnansweredDueToTime() {
  D.forEach((_, i) => {
    const n = i + 1;
    if (!state.answers[n]) {
      const card = document.getElementById('q' + n);
      const btn = document.getElementById('b' + n);
      if (card) {
        card.classList.add('lk');
        card.querySelectorAll('input').forEach(r => r.disabled = true);
      }
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Time Expired';
      }
    }
  });
}

function startTimer() {
  updateTimerUI();
  timerInterval = setInterval(() => {
    if (state.timeUp) {
      clearInterval(timerInterval);
      return;
    }
    if (state.answered === D.length) {
      clearInterval(timerInterval);
      return;
    }
    state.remaining -= 1;
    if (state.remaining <= 0) {
      state.remaining = 0;
      state.timeUp = true;
      updateProgress();
      saveState();
      clearInterval(timerInterval);
      lockUnansweredDueToTime();
      showCompletion('Time is up.');
      dn.scrollIntoView({ behavior: 'smooth' });
      return;
    }
    updateTimerUI();
    saveState();
  }, 1000);
}

function resetAssessment() {
  const ok = confirm('Reset all progress and restart the 30-minute timer?');
  if (!ok) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {
    console.error('Could not clear saved state', e);
  }
  location.reload();
}

function setActiveNav() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
        const id = 'n' + entry.target.id.replace('q','');
        const nav = document.getElementById(id);
        if (nav) nav.classList.add('active');
      }
    });
  }, { rootMargin: '-25% 0px -60% 0px' });

  document.querySelectorAll('.qc').forEach(card => observer.observe(card));
}

function initMenu() {
  menuBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('sh');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('sh');
  });
  document.querySelectorAll('.nav a').forEach(a => {
    a.addEventListener('click', () => {
      if (window.innerWidth <= 760) {
        sidebar.classList.remove('open');
        overlay.classList.remove('sh');
      }
    });
  });
}

document.getElementById('scrollTopBtn').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
document.getElementById('resetBtn').addEventListener('click', resetAssessment);

function init() {
  loadState();
  buildNavAndQuestions();
  updateProgress();
  restoreStateToUI();
  setActiveNav();
  initMenu();
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
  if (!state.timeUp && state.answered < D.length) startTimer();
}

window.addEventListener('load', init);
</script>
</body>
