  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #1D2C48;
      --navy-deep: #131E35;
      --green: #2C5545;
      --green-deep: #1E3B30;
      --gold: #B58D3D;
      --ink: #1D2C48;
      --muted: #5D6872;
      --bg: #F5F2EB;
      --bg-alt: #EAE6DD;
      --card: #FFFFFF;
      --border: #DCD8D0;
      --border-soft: #E6E2D9;
      --success: #2C5545;
      --error: #9B2C2C;
      --success-bg: #e8f0ec;
      --error-bg: #f5e6e6;
      --sidebar-w: 260px
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6
    }

    aside {
      background: var(--navy);
      color: #F5F2EB;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 100
    }

    aside::-webkit-scrollbar {
      width: 5px
    }

    aside::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .2);
      border-radius: 9px
    }

    .brand {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, .08)
    }

    .brand h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: .02em
    }

    .brand .tag {
      font-size: .68rem;
      color: rgba(245, 242, 235, .45);
      margin-top: 2px;
      letter-spacing: .03em
    }

    .side-score {
      padding: .85rem 1.25rem;
      background: rgba(255, 255, 255, .04);
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      font-weight: 700;
      font-size: .85rem;
      display: flex;
      justify-content: space-between
    }

    .side-score .pts {
      color: var(--gold);
      font-size: 1.1rem
    }

    .side-prog {
      padding: .6rem 1.25rem;
      font-size: .72rem;
      color: rgba(255, 255, 255, .4);
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    .side-prog .bar {
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, .1);
      margin-top: 5px;
      overflow: hidden
    }

    .side-prog .bar span {
      display: block;
      height: 100%;
      border-radius: 4px;
      background: var(--gold);
      width: 0%;
      transition: width .4s
    }

    .side-btns {
      padding: .6rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    .rst {
      background: rgba(255, 255, 255, .08);
      color: rgba(245, 242, 235, .7);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: .72rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all .15s;
      width: 100%
    }

    .rst:hover {
      background: rgba(255, 255, 255, .15);
      color: #fff
    }

    .nav {
      list-style: none;
      padding: .5rem 0;
      flex: 1;
      overflow-y: auto
    }

    .nav li a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 1.25rem;
      font-size: .78rem;
      color: rgba(245, 242, 235, .6);
      text-decoration: none;
      transition: background .15s
    }

    .nav li a:hover {
      background: rgba(255, 255, 255, .06);
      color: #fff
    }

    .nav li a .d {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, .25);
      flex-shrink: 0;
      transition: all .2s
    }

    .nav li a.ok .d {
      background: #48bb78;
      border-color: #48bb78
    }

    .nav li a.no .d {
      background: #f56565;
      border-color: #f56565
    }

    .ns {
      padding: 10px 1.25rem 4px;
      font-size: .64rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(245, 242, 235, .28);
      font-weight: 700;
      margin-top: 6px
    }

    main {
      padding: 2.5rem 3rem 4rem;
      max-width: 860px;
      overflow-y: auto
    }

    .hdr {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.8rem;
      border-bottom: 1px solid var(--border)
    }

    .hdr h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 1.75rem;
      color: var(--navy);
      line-height: 1.25
    }

    .hdr .sub {
      color: var(--muted);
      font-size: .88rem;
      margin-top: .35rem
    }

    .hdr .badge {
      display: inline-block;
      margin-top: .6rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      padding: 3px 14px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .03em
    }

    .qc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.4rem;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      transition: border-color .2s
    }

    .qc:target {
      border-color: var(--gold)
    }

    .qn {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: .82rem;
      color: var(--green);
      margin-bottom: .45rem;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .qn .st {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: var(--muted);
      font-size: .68rem;
      background: var(--bg);
      padding: 1px 8px;
      border-radius: 10px
    }

    .qp {
      font-size: .95rem;
      margin-bottom: 1rem;
      line-height: 1.65
    }

    .chs {
      display: flex;
      flex-direction: column;
      gap: .45rem;
      margin-bottom: .9rem
    }

    .ch {
      position: relative
    }

    .ch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0
    }

    .ch label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border-soft);
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s;
      font-size: .9rem;
      line-height: 1.5
    }

    .ch label .lt {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .75rem;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      transition: all .15s;
      margin-top: 1px
    }

    .ch input:checked~label {
      border-color: var(--navy);
      background: rgba(29, 44, 72, .03)
    }

    .ch input:checked~label .lt {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy)
    }

    .ch input:focus-visible~label {
      outline: 2px solid var(--gold);
      outline-offset: 2px
    }

    .ch.ok label {
      border-color: var(--success) !important;
      background: var(--success-bg) !important
    }

    .ch.ok label .lt {
      background: var(--success) !important;
      color: #fff !important;
      border-color: var(--success) !important
    }

    .ch.no label {
      border-color: var(--error) !important;
      background: var(--error-bg) !important
    }

    .ch.no label .lt {
      background: var(--error) !important;
      color: #fff !important;
      border-color: var(--error) !important
    }

    .lk .ch label {
      cursor: default;
      opacity: .85
    }

    .lk .ch input:checked~label {
      opacity: 1
    }

    .lk .ch.ok label {
      opacity: 1
    }

    .sb {
      background: var(--green);
      color: #fff;
      border: none;
      padding: .55rem 1.6rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit
    }

    .sb:hover {
      background: var(--green-deep)
    }

    .sb:disabled {
      opacity: .45;
      cursor: not-allowed
    }

    .fb {
      margin-top: .7rem;
      padding: .6rem .9rem;
      border-radius: 8px;
      font-size: .82rem;
      line-height: 1.55;
      display: none
    }

    .fb.sh {
      display: block
    }

    .fb.ok {
      background: var(--success-bg);
      color: var(--success);
      border-left: 3px solid var(--success)
    }

    .fb.no {
      background: var(--error-bg);
      color: var(--error);
      border-left: 3px solid var(--error)
    }

    .warn {
      color: var(--error);
      font-size: .78rem;
      margin-top: .3rem;
      display: none
    }

    .warn.sh {
      display: block
    }

    .done {
      display: none;
      text-align: center;
      padding: 2.5rem;
      background: var(--card);
      border: 2px solid var(--gold);
      border-radius: 14px;
      margin-top: 1.5rem
    }

    .done h2 {
      font-family: 'Poppins', sans-serif;
      color: var(--navy);
      font-weight: 900;
      font-size: 1.3rem
    }

    .done .fs {
      font-size: 2rem;
      font-weight: 900;
      color: var(--green);
      margin: .6rem 0
    }

    .done .mx {
      color: var(--muted);
      font-size: .88rem
    }

    .done.sh {
      display: block
    }

    @media(max-width:900px) {
      :root {
        --sidebar-w: 220px
      }

      main {
        padding: 2rem 1.5rem
      }
    }

    @media(max-width:700px) {
      body {
        grid-template-columns: 1fr
      }

      aside {
        position: fixed;
        left: -280px;
        width: 280px;
        transition: left .3s
      }

      aside.open {
        left: 0
      }

      .mt {
        display: flex !important
      }

      main {
        padding: 1.5rem 1rem
      }
    }

    .mt {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      background: var(--navy);
      color: #fff;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer
    }
  </style>
</head>

<body>
  <button class="mt" onclick="document.querySelector('aside').classList.toggle('open')"
    aria-label="Toggle navigation">☰</button>
  <aside>
    <div class="brand">
      <h1>ActiveSTEM</h1>
      <div class="tag">AP Calculus BC · Series Tests</div>

    <div class="side-score">Score <span class="pts" id="ss">0</span></div>

  <main>
    <div class="hdr">
      <h1>AP Series Convergence Tests</h1>
      <div class="sub">AP Calculus BC — Interactive Assessment (nth-Term to Root Test)</div>
      <span class="badge">25 Questions · +10 / −5 Scoring</span>
    </div>
    <div id="qs"></div>

      <h2>🎉 Assessment Complete</h2>

    </div>
  </main>

  <script>
    const D = [
      {
        "sec": "Convergence Fundamentals",
        "prompt": "Let \\(\\{a_n\\}\\) be a sequence. Which of the following conditions guarantees that \\(\\displaystyle\\sum_{n=1}^{\\infty} a_n\\) diverges?",
        "ch": [
          "\\(\\displaystyle\\lim_{n\\to\\infty} n^2 a_n = \\infty\\)",
          "\\(\\displaystyle\\lim_{n\\to\\infty} \\sqrt[n]{|a_n|} = 1\\)",
          "\\(\\displaystyle\\lim_{n\\to\\infty} \\left| \\frac{a_{n+1}}{a_n} \\right| = 1\\)",
          "\\(\\displaystyle\\lim_{n\\to\\infty} \\ln(1+a_n) = 1\\)"
        ],
        "ans": 3,
        "exp": "If \\(\\lim_{n\\to\\infty} \\ln(1+a_n) = 1\\), then \\(\\lim_{n\\to\\infty} (1+a_n) = e\\), so \\(\\lim_{n\\to\\infty} a_n = e-1 \\neq 0\\). The series diverges by the nth-term test for divergence. The limits in B and C are inconclusive. For A, if \\(a_n = 1/n^{3/2}\\), the series converges even though \\(\\lim_{n\\to\\infty} n^2 a_n = \\infty\\)."
      },
      {
        "sec": "Series Evaluation",
        "prompt": "Find the exact sum of the series \\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{2^{2n+1} - 3^{n-1}}{5^n}\\).",
        "ch": [
          "\\(\\frac{64}{5}\\)",
          "\\(\\frac{122}{20}\\)",
          "\\(\\frac{61}{10}\\)",
          "The series diverges."
        ],
        "ans": 2,
        "exp": "Separate the expression into two geometric series: \\(\\sum \\frac{2 \\cdot 4^n}{5^n} - \\sum \\frac{3^{-1} \\cdot 3^n}{5^n}\\). For the first series, the first term (at \\(n=2\\)) is \\(2(16/25) = 32/25\\), and \\(r=4/5\\), so its sum is \\(\\frac{32/25}{1 - 4/5} = 32/5\\). For the second series, the first term is \\(\\frac{1}{3}(9/25) = 3/25\\), and \\(r=3/5\\), so its sum is \\(\\frac{3/25}{1 - 3/5} = 3/10\\). Subtracting the two yields \\(\\frac{64}{10} - \\frac{3}{10} = \\frac{61}{10}\\)."
      },
      {
        "sec": "Series Evaluation",
        "prompt": "Determine the sum of the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{4}{n^2+2n}\\).",
        "ch": [
          "2",
          "3",
          "4",
          "1"
        ],
        "ans": 1,
        "exp": "Use partial fraction decomposition: \\(\\frac{4}{n(n+2)} = \\frac{2}{n} - \\frac{2}{n+2}\\). The partial sums telescope: \\((2 - 2/3) + (1 - 2/4) + (2/3 - 2/5) + \\dots\\). All terms eventually cancel except for the first two positive terms: \\(2\\) and \\(1\\). Thus, the sum is \\(2 + 1 = 3\\)."
      },
      {
        "sec": "Convergence Parameters",
        "prompt": "For what values of \\(p\\) does the series \\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{1}{n (\\ln n)^p}\\) converge?",
        "ch": [
          "\\(p \\ge 1\\)",
          "\\(p > 1\\)",
          "\\(p > 0\\)",
          "\\(p > 2\\)"
        ],
        "ans": 1,
        "exp": "Apply the Integral Test. Let \\(u = \\ln x\\), so \\(du = \\frac{1}{x} dx\\). The integral \\(\\int_2^{\\infty} \\frac{1}{x (\\ln x)^p} dx\\) becomes \\(\\int_{\\ln 2}^{\\infty} \\frac{1}{u^p} du\\). This improper integral behaves like a standard p-series integral, which converges if and only if \\(p > 1\\)."
      },
      {
        "sec": "Error Estimation",
        "prompt": "Consider the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^{n+1}}{\\sqrt{n+3}}\\). If the partial sum \\(S_k\\) is used to approximate the total sum \\(S\\), what is the smallest number of terms \\(k\\) needed to guarantee that the error is strictly less than 0.1?",
        "ch": [
          "96",
          "97",
          "99",
          "100"
        ],
        "ans": 1,
        "exp": "By the Alternating Series Error Bound, the error \\(|S - S_k|\\) is less than or equal to the magnitude of the first omitted term, \\(a_{k+1}\\). We need \\( \\frac{1}{\\sqrt{(k+1)+3}} < 0.1 \\), which means \\(\\sqrt{k+4} > 10\\). Squaring both sides yields \\(k+4 > 100\\), or \\(k > 96\\). The smallest integer satisfying this is \\(k = 97\\)."
      },
      {
        "sec": "Series Analysis",
        "prompt": "Which of the following statements about the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\sin\\left(\\frac{1}{n^2}\\right)\\) is true?",
        "ch": [
          "The series diverges by the nth-term test.",
          "The series converges by the Alternating Series Test.",
          "The series diverges because \\(\\sin(1/n^2) > 1/n\\).",
          "The series converges by the Limit Comparison Test with \\(\\sum \\frac{1}{n^2}\\)."
        ],
        "ans": 3,
        "exp": "For \\(n \\ge 1\\), \\(\\frac{1}{n^2}\\) is between 0 and 1, so the terms are positive. Using the Limit Comparison Test with \\(b_n = \\frac{1}{n^2}\\), \\(\\lim_{n\\to\\infty} \\frac{\\sin(1/n^2)}{1/n^2} = 1\\). Because \\(\\sum \\frac{1}{n^2}\\) is a convergent p-series (\\(p=2 > 1\\)), the given series also converges."
      },
      {
        "sec": "Theoretical Properties",
        "prompt": "Let \\(a_n\\) be a sequence of positive terms where \\(\\displaystyle\\lim_{n\\to\\infty} \\frac{a_{n+1}}{a_n} = 1\\). Which of the following must be true?",
        "ch": [
          "\\(\\sum a_n\\) diverges.",
          "\\(\\sum (-1)^n a_n\\) converges conditionally.",
          "The sequence \\(a_n\\) converges to 1.",
          "The Ratio Test provides no conclusion about the convergence of \\(\\sum a_n\\)."
        ],
        "ans": 3,
        "exp": "When the limit of the ratio is exactly 1, the Ratio Test is inconclusive. The series could diverge (e.g., \\(a_n = 1/n\\)), converge (e.g., \\(a_n = 1/n^2\\)), or have terms that do not approach 1. Therefore, no conclusion can be drawn from the Ratio Test alone."
      },
      {
        "sec": "Convergence Mechanics",
        "prompt": "Evaluate the limit \\(\\displaystyle\\lim_{n\\to\\infty} \\frac{a_{n+1}}{a_n}\\) for the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{n!\\, (2n)!}{(3n)!}\\).",
        "ch": [
          "\\(\\frac{4}{27}\\)",
          "\\(\\infty\\)",
          "\\(\\frac{2}{3}\\)",
          "0"
        ],
        "ans": 0,
        "exp": "Set up the ratio: \\(\\frac{(n+1)! (2n+2)!}{(3n+3)!} \\cdot \\frac{(3n)!}{n! (2n)!}\\). Simplifying the factorials yields \\(\\frac{(n+1)(2n+2)(2n+1)}{(3n+3)(3n+2)(3n+1)}\\). Taking the limit as \\(n \\to \\infty\\), we look at the leading coefficients of \\(n^3\\), giving \\(\\frac{1 \\cdot 2 \\cdot 2}{3 \\cdot 3 \\cdot 3} = \\frac{4}{27}\\)."
      },
      {
        "sec": "Convergence Analysis",
        "prompt": "The series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{1}{n + e^n}\\) converges. Which of the following inequalities provides a valid justification using the Direct Comparison Test?",
        "ch": [
          "\\(\\frac{1}{n+e^n} < \\frac{1}{n}\\)",
          "\\(\\frac{1}{n+e^n} < \\frac{1}{e^n}\\)",
          "\\(\\frac{1}{n+e^n} > \\frac{1}{e^n}\\)",
          "\\(\\frac{1}{n+e^n} > \\frac{1}{n}\\)"
        ],
        "ans": 1,
        "exp": "To use the Direct Comparison Test to show convergence, the terms must be smaller than those of a known convergent series. Inequality A is true, but \\(\\sum 1/n\\) diverges, so it does not prove convergence. Inequality B compares the terms to \\(\\frac{1}{e^n} = (1/e)^n\\), which is a convergent geometric series (\\(r = 1/e < 1\\)), proving convergence."
      },
      {
        "sec": "Convergence Analysis",
        "prompt": "Which of the following describes a valid mathematical method to prove that the series \\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{\\ln n}{n^2}\\) converges?",
        "ch": [
          "Direct comparison with \\(\\frac{1}{n^2}\\).",
          "Limit comparison with \\(\\frac{1}{n}\\).",
          "Limit comparison with \\(\\frac{1}{n^{1.5}}\\).",
          "The Ratio Test."
        ],
        "ans": 2,
        "exp": "Direct comparison with \\(1/n^2\\) fails since \\(\\ln n > 1\\). Limit comparison with \\(1/n\\) yields an infinite limit, which is inconclusive for proving convergence. Comparing to a p-series like \\(1/n^{1.5}\\) yields \\(\\lim_{n\\to\\infty} \\frac{(\\ln n)/n^2}{1/n^{1.5}} = \\lim_{n\\to\\infty} \\frac{\\ln n}{\\sqrt{n}} = 0\\) (by L'Hôpital's Rule). Since \\(\\sum 1/n^{1.5}\\) converges and the limit is 0, the given series converges."
      },
      {
        "sec": "Absolute & Conditional Convergence",
        "prompt": "For what values of the constant \\(k\\) is the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^n n^k}{n^3 + 1}\\) conditionally convergent?",
        "ch": [
          "\\(k \\ge 3\\)",
          "\\(k < 2\\)",
          "\\(2 \\le k < 3\\)",
          "\\(k = 3\\)"
        ],
        "ans": 2,
        "exp": "The series converges absolutely if \\(\\sum \\frac{n^k}{n^3+1}\\) converges. By limit comparison with \\(1/n^{3-k}\\), this happens when \\(3-k > 1\\), meaning \\(k < 2\\). For conditional convergence, it must fail absolute convergence (\\(k \\ge 2\\)) but still satisfy the Alternating Series Test. The terms decrease to 0 only if the denominator's degree is greater than the numerator's: \\(3 > k\\). Therefore, the series converges conditionally for \\(2 \\le k < 3\\)."
      },
      {
        "sec": "Convergence Mechanics",
        "prompt": "Let \\(a_n = \\left( \\frac{3n+2}{3n+5} \\right)^{n^2}\\). Evaluate the limit \\(L = \\displaystyle\\lim_{n\\to\\infty} \\sqrt[n]{a_n}\\).",
        "ch": [
          "1",
          "\\(e^{-3/5}\\)",
          "\\(e^{-1}\\)",
          "\\(e\\)"
        ],
        "ans": 2,
        "exp": "Taking the nth root, we evaluate \\(\\lim_{n\\to\\infty} \\left( \\frac{3n+2}{3n+5} \\right)^n = \\lim_{n\\to\\infty} \\left( 1 - \\frac{3}{3n+5} \\right)^n\\). Using the limit property \\(\\lim_{n\\to\\infty} (1 + \\frac{x}{n})^n = e^x\\), the exponent approaches \\(-3/3 = -1\\). The limit evaluates to \\(e^{-1}\\)."
      },
      {
        "sec": "Series Analysis",
        "prompt": "Which of the following alternating series diverges?",
        "ch": [
          "\\(\\displaystyle\\sum_{n=1}^{\\infty} (-1)^n \\frac{\\ln n}{n}\\)",
          "\\(\\displaystyle\\sum_{n=1}^{\\infty} (-1)^n \\cos\\left(\\frac{\\pi}{n}\\right)\\)",
          "\\(\\displaystyle\\sum_{n=1}^{\\infty} (-1)^n \\frac{\\sqrt{n}}{n+1}\\)",
          "\\(\\displaystyle\\sum_{n=1}^{\\infty} (-1)^n \\left(1 - \\cos \\frac{1}{n}\\right)\\)"
        ],
        "ans": 1,
        "exp": "For an alternating series to converge, the limit of the magnitude of its terms must be 0. For series B, \\(\\lim_{n\\to\\infty} \\cos(\\pi/n) = \\cos(0) = 1 \\neq 0\\). It diverges by the nth-term test. To ensure monotonic decrease for option A, observe that the derivative of \\(f(x) = \\frac{\\ln x}{x}\\) is \\(\\frac{1-\\ln x}{x^2}\\), which is negative for \\(x > e\\), so it converges by the Alternating Series Test."
      },
      {
        "sec": "Error Estimation",
        "prompt": "For the convergent series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{1}{n^4}\\), what is the smallest integer \\(N\\) such that the integral error bound \\(\\int_N^{\\infty} \\frac{1}{x^4}\\,dx\\) is strictly less than \\(10^{-3}\\)?",
        "ch": [
          "5",
          "6",
          "7",
          "8"
        ],
        "ans": 2,
        "exp": "Evaluate the improper integral: \\(\\int_N^\\infty x^{-4}\\,dx = \\left[ -\\frac{1}{3x^3} \\right]_N^\\infty = \\frac{1}{3N^3}\\). We set the bound: \\(\\frac{1}{3N^3} < \\frac{1}{1000}\\), which implies \\(3N^3 > 1000\\), or \\(N^3 > 333.3\\). Checking cubes (\\(6^3 = 216\\), \\(7^3 = 343\\)), the smallest integer that satisfies this inequality is \\(N=7\\)."
      },
      {
        "sec": "Convergence Mechanics",
        "prompt": "Let \\(a_n = \\frac{2^n}{n!}\\). What is the smallest integer \\(N\\) such that the ratio \\(\\left|\\frac{a_{n+1}}{a_n}\\right| < \\frac{1}{2}\\) accurately holds for all \\(n \\ge N\\)?",
        "ch": [
          "3",
          "4",
          "5",
          "6"
        ],
        "ans": 1,
        "exp": "Calculate the term ratio: \\(\\frac{a_{n+1}}{a_n} = \\frac{2^{n+1}}{(n+1)!} \\cdot \\frac{n!}{2^n} = \\frac{2}{n+1}\\). We want \\(\\frac{2}{n+1} < \\frac{1}{2}\\). This implies \\(4 < n+1\\), or \\(n > 3\\). The smallest integer satisfying this strictly is \\(N = 4\\)."
      },
      {
        "sec": "Convergence Analysis",
        "prompt": "Consider the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{\\cos(n) + \\sin(n)}{n^2+1}\\). Which of the following provides a complete proof of absolute convergence?",
        "ch": [
          "Show that \\(\\left| \\frac{\\cos n+\\sin n}{n^2+1} \\right| \\le \\frac{2}{n^2+1} < \\frac{2}{n^2}\\), and use Direct Comparison.",
          "Show that the terms naturally decay to 0, which guarantees convergence.",
          "Use the Alternating Series Test since sine and cosine oscillate.",
          "Compare to \\(1/n^2\\) using the Limit Comparison Test since \\(\\lim \\frac{\\cos n + \\sin n}{1} = 0\\)."
        ],
        "ans": 0,
        "exp": "Because \\(\\cos n\\) and \\(\\sin n\\) do not strictly alternate signs, the Alternating Series Test is not applicable. The Limit Comparison Test also fails because the limit of the ratio does not exist. However, the absolute value is bounded: \\(|\\cos n + \\sin n| \\le \\sqrt{2} < 2\\). Therefore, \\(\\left|\\frac{\\cos n+\\sin n}{n^2+1}\\right| < \\frac{2}{n^2}\\), proving absolute convergence by the Direct Comparison Test with a p-series (\\(p=2\\))."
      },
      {
        "sec": "Series Evaluation",
        "prompt": "Compute the exact sum of the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left( \\frac{1}{3^n} - \\frac{1}{n(n+1)} \\right)\\).",
        "ch": [
          "-\\(1/2\\)",
          "0",
          "1",
          "-\\(1/6\\)"
        ],
        "ans": 0,
        "exp": "The expression separates into two convergent series. The geometric series is \\(\\sum (1/3)^n\\) with \\(a=1/3\\) and \\(r=1/3\\). Its sum is \\(\\frac{1/3}{1-1/3} = \\frac{1}{2}\\). The second series is telescoping: \\(\\sum (\\frac{1}{n}-\\frac{1}{n+1})\\), which sums to 1. Subtracting the sums yields \\(1/2 - 1 = -1/2\\)."
      },
      {
        "sec": "Convergence Fundamentals",
        "prompt": "Which of the following statements about the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left( \\frac{n}{n+1} \\right)^n\\) is true?",
        "ch": [
          "The series converges by the Root Test.",
          "The series diverges by the nth-term test.",
          "The series diverges because it is a p-series with \\(p < 1\\).",
          "The series converges conditionally."
        ],
        "ans": 1,
        "exp": "First, evaluate the limit of the terms: \\(\\lim_{n\\to\\infty} \\left( \\frac{n}{n+1} \\right)^n = \\lim_{n\\to\\infty} \\left( 1 - \\frac{1}{n+1} \\right)^n = e^{-1}\\). Because the terms approach \\(1/e\\) instead of 0, the series diverges by the nth-term test for divergence."
      },
      {
        "sec": "Convergence Analysis",
        "prompt": "A student needs to prove the convergence of the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{e^{1/n}}{n^2}\\). Which of the following is an effective analytical approach?",
        "ch": [
          "Applying the Root Test.",
          "Using the Ratio Test to find the limit of successive terms.",
          "Using the Limit Comparison Test with \\(1/n^2\\).",
          "Using the Direct Comparison Test since \\(e^{1/n} > 1\\)."
        ],
        "ans": 2,
        "exp": "Both the Ratio and Root tests result in a limit of 1, providing no conclusion. Direct Comparison is complicated because \\(e^{1/n} > 1\\), meaning the terms are greater than \\(1/n^2\\), which is in the wrong direction for convergence. However, using the Limit Comparison Test with \\(1/n^2\\) yields \\(\\lim_{n\\to\\infty} \\frac{e^{1/n}}{n^2} \\cdot n^2 = \\lim_{n\\to\\infty} e^{1/n} = e^0 = 1\\), efficiently proving convergence."
      },
      {
        "sec": "Convergence Boundaries",
        "prompt": "Which of the following series diverges?",
        "ch": [
          "\\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{1}{n (\\ln n)^2}\\)",
          "\\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{\\ln n}{n^3}\\)",
          "\\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{1}{n^2 \\ln n}\\)",
          "\\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{1}{\\sqrt{n}\\, \\ln n}\\)"
        ],
        "ans": 3,
        "exp": "Option A converges by the Integral Test. Options B and C converge by comparison to standard p-series (like \\(1/n^{1.5}\\)). For option D, since \\(\\ln n < \\sqrt{n}\\) for large \\(n\\), the denominator \\(\\sqrt{n} \\ln n < n\\). This implies \\(\\frac{1}{\\sqrt{n} \\ln n} > \\frac{1}{n}\\). Since the harmonic series \\(\\sum 1/n\\) diverges, series D diverges by the Direct Comparison Test."
      },
      {
        "sec": "Convergence Parameters",
        "prompt": "For any positive constant \\(c\\), the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left(\\frac{cn}{2n+1}\\right)^n\\) will converge if and only if:",
        "ch": [
          "\\(c < 2\\)",
          "\\(c \\le 2\\)",
          "\\(c > 2\\)",
          "\\(c \\neq 2\\)"
        ],
        "ans": 0,
        "exp": "Using the Root Test, we evaluate \\(\\lim_{n\\to\\infty} \\sqrt[n]{|a_n|} = \\lim_{n\\to\\infty} \\frac{cn}{2n+1} = \\frac{c}{2}\\). The series converges if \\(\\frac{c}{2} < 1\\), meaning \\(c < 2\\). If \\(c \\ge 2\\), the limit is \\(\\ge 1\\). Specifically, at \\(c=2\\), the terms are \\(\\left( \\frac{2n}{2n+1} \\right)^n\\), which approaches \\(e^{-1/2} \\neq 0\\), so it diverges. Thus, it strictly converges for \\(c < 2\\)."
      },
      {
        "sec": "Convergence Mechanics",
        "prompt": "Let \\(a_n = \\frac{2^{n^2}}{n!}\\). Evaluate the limit \\(\\displaystyle\\lim_{n\\to\\infty} \\frac{a_{n+1}}{a_n}\\). Which statement defines the behavior of the series?",
        "ch": [
          "The limit is 0, so the series converges.",
          "The limit is 1, making the test inconclusive.",
          "The limit is 2, so the series diverges.",
          "The limit is \\(\\infty\\), so the series diverges."
        ],
        "ans": 3,
        "exp": "Examine the ratio of successive terms: \\(\\frac{a_{n+1}}{a_n} = \\frac{2^{(n+1)^2}}{(n+1)!} \\cdot \\frac{n!}{2^{n^2}} = \\frac{2^{n^2+2n+1}}{2^{n^2}} \\cdot \\frac{1}{n+1} = \\frac{2^{2n+1}}{n+1}\\). As \\(n \\to \\infty\\), the exponential numerator grows much faster than the linear denominator, so the limit is \\(\\infty\\). The series diverges by the Ratio Test."
      },
      {
        "sec": "Error Estimation",
        "prompt": "Let \\(S\\) be the sum of an alternating series that satisfies the conditions of the Alternating Series Test. Let \\(S_k\\) be its \\(k\\)-th partial sum. If the next omitted term is positive, what must be true about the exact sum \\(S\\)?",
        "ch": [
          "\\(S = S_k\\)",
          "\\(S > S_k\\)",
          "\\(S < S_k\\)",
          "The relationship depends on the magnitude of the terms."
        ],
        "ans": 1,
        "exp": "In an alternating series, the true sum \\(S\\) always lies between any two consecutive partial sums. Because the next term added to \\(S_k\\) is positive, the partial sums move upward. This guarantees that the true sum \\(S\\) is strictly greater than \\(S_k\\). Thus, \\(S > S_k\\)."
      },
      {
        "sec": "Convergence Analysis",
        "prompt": "Attempting to use the Limit Comparison Test with \\(b_n = \\frac{1}{n^2}\\) to prove convergence for \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{|\\sin(n)|}{n^2}\\) encounters which structural issue?",
        "ch": [
          "The limit resolves to 0, which proves nothing.",
          "The limit does not exist, invalidating the test.",
          "The terms are alternating, which violates the test conditions.",
          "The limit evaluates to \\(\\infty\\), incorrectly suggesting divergence."
        ],
        "ans": 1,
        "exp": "To use the Limit Comparison Test, one must evaluate \\(\\lim_{n\\to\\infty} \\frac{a_n}{b_n} = \\lim_{n\\to\\infty} |\\sin(n)|\\). Because sine oscillates continuously without approaching a single value, the limit does not exist. The Limit Comparison Test is therefore inconclusive, and the Direct Comparison Test is the appropriate method instead."
      },
      {
        "sec": "Absolute & Conditional Convergence",
        "prompt": "For what values of \\(r\\) does the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{r^n}{n}\\) converge conditionally?",
        "ch": [
          "\\(r = 1\\) only",
          "\\(-1 < r < 1\\)",
          "\\(r = -1\\) only",
          "\\(r = \\pm 1\\)"
        ],
        "ans": 2,
        "exp": "The series converges absolutely when \\(\\sum |\\frac{r^n}{n}|\\) converges. Using the Ratio Test yields absolute convergence for \\(|r| < 1\\). At \\(r=1\\), the series is the harmonic series \\(\\sum 1/n\\), which diverges. At \\(r=-1\\), the series is \\(\\sum \\frac{(-1)^n}{n}\\), which converges by the Alternating Series Test but diverges absolutely. Therefore, it is conditionally convergent only at \\(r=-1\\)."
      }
    ];
    const L = ['A', 'B', 'C', 'D'];
    const SKEY = 'activestem_calcbc_series_tests_state';
    let sc = 0, ans = 0, tot = D.length, state = Array(tot).fill(null);

    function saveState() { localStorage.setItem(SKEY, JSON.stringify({ sc, ans, state })); }
    function loadState() { try { const s = JSON.parse(localStorage.getItem(SKEY)); if (s && s.state && s.state.length === tot) { sc = s.sc; ans = s.ans; state = s.state; return true; } } catch (e) { } return false; }

    const nl = document.getElementById('nl'), qs = document.getElementById('qs');
    let ls = '';
    D.forEach((q, i) => {
      const n = i + 1;
      if (q.sec !== ls) { const h = document.createElement('li'); h.innerHTML = '<div class="ns">' + q.sec + '</div>'; nl.appendChild(h); ls = q.sec; }
      const li = document.createElement('li'); li.innerHTML = '<a href="#q' + n + '" id="n' + n + '"><span class="d"></span>Q' + n + '</a>'; nl.appendChild(li);
      let ch = ''; q.ch.forEach((c, ci) => { ch += '<div class="ch" id="c' + n + '-' + ci + '"><input type="radio" name="q' + n + '" value="' + ci + '" id="r' + n + '-' + ci + '"><label for="r' + n + '-' + ci + '"><span class="lt">' + L[ci] + '</span><span>' + c + '</span></label></div>'; });
      const cd = document.createElement('article'); cd.className = 'qc'; cd.id = 'q' + n;
      cd.innerHTML = '<div class="qn">Question ' + n + ' <span class="st">' + q.sec + '</span></div><div class="qp">' + q.prompt + '</div><div class="chs">' + ch + '</div><button class="sb" id="b' + n + '">Submit Answer</button><div class="warn" id="w' + n + '">Please select an answer.</div><div class="fb" id="f' + n + '"></div>';
      qs.appendChild(cd);
      document.getElementById('b' + n).addEventListener('click', () => go(n, q.ans, q.exp));
    });

    function restoreUI() {
      document.getElementById('ss').textContent = sc;
      document.getElementById('pt').textContent = ans + ' / ' + tot + ' answered';
      document.getElementById('pb').style.width = (ans / tot * 100) + '%';
      state.forEach((s, i) => {
        if (s === null) return;
        const n = i + 1, q = D[i], cd = document.getElementById('q' + n), na = document.getElementById('n' + n);
        cd.classList.add('lk'); cd.querySelectorAll('input').forEach(r => { r.disabled = true; if (parseInt(r.value) === s.chosen) r.checked = true; });
        document.getElementById('b' + n).disabled = true;
        document.getElementById('c' + n + '-' + q.ans).classList.add('ok');
        if (s.chosen !== q.ans) document.getElementById('c' + n + '-' + s.chosen).classList.add('no');
        const fb = document.getElementById('f' + n);
        if (s.chosen === q.ans) { fb.className = 'fb sh ok'; fb.innerHTML = '<strong>Correct! +10</strong> — ' + q.exp; na.classList.add('ok'); }
        else { fb.className = 'fb sh no'; fb.innerHTML = '<strong>Incorrect. −5</strong> — ' + q.exp; na.classList.add('no'); }
      });
      if (ans === tot) { const d = document.getElementById('dn'); d.classList.add('sh'); document.getElementById('fsc').textContent = sc; document.getElementById('mxs').textContent = tot * 10; }
    }

    if (loadState()) restoreUI();
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();

    function go(n, cor, exp) {
      const w = document.getElementById('w' + n);
      const s = document.querySelector('input[name="q' + n + '"]:checked');
      if (!s) { w.classList.add('sh'); return; }
      w.classList.remove('sh');
      const v = parseInt(s.value), cd = document.getElementById('q' + n), fb = document.getElementById('f' + n), na = document.getElementById('n' + n);
      cd.classList.add('lk'); cd.querySelectorAll('input').forEach(r => r.disabled = true); document.getElementById('b' + n).disabled = true;
      document.getElementById('c' + n + '-' + cor).classList.add('ok');
      if (v !== cor) document.getElementById('c' + n + '-' + v).classList.add('no');
      if (v === cor) { sc += 10; fb.className = 'fb sh ok'; fb.innerHTML = '<strong>Correct! +10</strong> — ' + exp; na.classList.add('ok'); }
      else { sc -= 5; fb.className = 'fb sh no'; fb.innerHTML = '<strong>Incorrect. −5</strong> — ' + exp; na.classList.add('no'); }
      ans++; state[n - 1] = { chosen: v };
      document.getElementById('ss').textContent = sc;
      document.getElementById('pt').textContent = ans + ' / ' + tot + ' answered';
      document.getElementById('pb').style.width = (ans / tot * 100) + '%';
      saveState();
      if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([fb]);
      if (ans === tot) { const d = document.getElementById('dn'); d.classList.add('sh'); document.getElementById('fsc').textContent = sc; document.getElementById('mxs').textContent = tot * 10; d.scrollIntoView({ behavior: 'smooth' }); }
    }

    document.getElementById('resetBtn').addEventListener('click', () => { if (confirm('Reset all progress? This cannot be undone.')) { localStorage.removeItem(SKEY); location.reload(); } });
  </script>
