<style>

<script>
const D=[
  {
    "sec": "nth-Term Test",
    "prompt": "Which of the following statements about the \\(n\\)-th term test for divergence is true?",
    "ch": [
      "If \\(\\lim_{n\\to\\infty} a_n = 0\\), then \\(\\sum a_n\\) converges.",
      "If \\(\\sum a_n\\) converges, then \\(\\lim_{n\\to\\infty} a_n\\) might not be 0.",
      "If \\(\\lim_{n\\to\\infty} a_n \\neq 0\\), then \\(\\sum a_n\\) diverges.",
      "If \\(\\lim_{n\\to\\infty} a_n = 0\\), then \\(\\sum a_n\\) is an alternating series."
    ],
    "ans": 2,
    "exp": "The \\(n\\)-th term test states that if the limit of the sequence \\(a_n\\) as \\(n\\to\\infty\\) is not zero (or does not exist), then the series \\(\\sum a_n\\) must diverge. If the limit is 0, the test is inconclusive."
  },
  {
    "sec": "nth-Term Test",
    "prompt": "For which of the following series does the \\(n\\)-th term test for divergence easily show that the series diverges?",
    "ch": [
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{n}{n^2+1}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{n^2}{2n^2+5}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^n}{n}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{1}{n\\ln n}\\)"
    ],
    "ans": 1,
    "exp": "For the series in B, \\(\\lim_{n\\to\\infty} a_n = 1/2 \\neq 0\\), so it diverges by the \\(n\\)-th term test. The limits of the terms in the other series are all 0, so the test is inconclusive for them."
  },
  {
    "sec": "Geometric Series",
    "prompt": "Evaluate the infinite geometric series: \\(\\displaystyle\\sum_{n=1}^{\\infty} 3\\left(\\frac{2}{5}\\right)^n\\).",
    "ch": [
      "\\(\\frac{6}{5}\\)",
      "\\(2\\)",
      "\\(5\\)",
      "\\(\\frac{15}{2}\\)"
    ],
    "ans": 1,
    "exp": "The first term \\(a = 3(2/5) = 6/5\\). The common ratio \\(r = 2/5\\). Since \\(|r| < 1\\), the sum is \\(S = \\frac{a}{1-r} = \\frac{6/5}{1-2/5} = \\frac{6/5}{3/5} = 2\\)."
  },
  {
    "sec": "Geometric Series",
    "prompt": "For what values of \\(x\\) does the series \\(\\displaystyle\\sum_{n=0}^{\\infty} \\left(\\frac{x-2}{3}\\right)^n\\) converge?",
    "ch": [
      "\\(-1 < x < 5\\)",
      "\\(-1 \\le x < 5\\)",
      "\\(-1 < x < 1\\)",
      "\\(1 < x < 5\\)"
    ],
    "ans": 0,
    "exp": "This is a geometric series with \\(r = \\frac{x-2}{3}\\). It converges when \\(|r| < 1\\), so \\(-1 < \\frac{x-2}{3} < 1 \\implies -3 < x-2 < 3 \\implies -1 < x < 5\\)."
  },
  {
    "sec": "Telescoping Series",
    "prompt": "Find the sum of the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left(\\frac{1}{n+1} - \\frac{1}{n+2}\\right)\\).",
    "ch": [
      "\\(1\\)",
      "\\(\\frac{1}{2}\\)",
      "\\(0\\)",
      "The series diverges"
    ],
    "ans": 1,
    "exp": "Writing out the partial sums gives: \\((\\frac{1}{2} - \\frac{1}{3}) + (\\frac{1}{3} - \\frac{1}{4}) + \\dots + (\\frac{1}{N+1} - \\frac{1}{N+2})\\). This telescopes to \\(\\frac{1}{2} - \\frac{1}{N+2}\\). As \\(N\\to\\infty\\), the sum is \\(1/2\\)."
  },
  {
    "sec": "p-Series Test",
    "prompt": "Which of the following describes the convergence of \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{1}{n\\sqrt{n}}\\)?",
    "ch": [
      "Converges because it is a \\(p\\)-series with \\(p=1.5 > 1\\)",
      "Diverges because it is a \\(p\\)-series with \\(p=1.5 > 1\\)",
      "Converges because it is a \\(p\\)-series with \\(p=0.5 < 1\\)",
      "Diverges because it is a \\(p\\)-series with \\(p=0.5 < 1\\)"
    ],
    "ans": 0,
    "exp": "The term is \\(\\frac{1}{n^{3/2}}\\). This is a \\(p\\)-series with \\(p=3/2=1.5\\). Since \\(p > 1\\), the series converges."
  },
  {
    "sec": "p-Series Test",
    "prompt": "For what values of \\(p\\) does the series \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{1}{n^{2p-1}}\\) converge?",
    "ch": [
      "\\(p > 0\\)",
      "\\(p > 1\\)",
      "\\(p > \\frac{1}{2}\\)",
      "\\(p < 1\\)"
    ],
    "ans": 1,
    "exp": "For a \\(p\\)-series \\(\\sum \\frac{1}{n^k}\\) to converge, we need the exponent \\(k > 1\\). So \\(2p-1 > 1 \\implies 2p > 2 \\implies p > 1\\)."
  },
  {
    "sec": "Integral Test",
    "prompt": "To use the Integral Test on \\(\\displaystyle\\sum_{n=1}^{\\infty} a_n\\) where \\(a_n = f(n)\\), which of the following must be true for \\(x \\ge 1\\)?",
    "ch": [
      "\\(f(x)\\) must be positive, continuous, and increasing.",
      "\\(f(x)\\) must be positive, continuous, and decreasing.",
      "\\(f(x)\\) must be alternating, continuous, and decreasing.",
      "\\(f(x)\\) must have a relative maximum."
    ],
    "ans": 1,
    "exp": "The Integral Test requires the associated function \\(f(x)\\) to be positive, continuous, and strictly decreasing for \\(x\\ge 1\\) (or eventually decreasing)."
  },
  {
    "sec": "Integral Test",
    "prompt": "Using the Integral Test, evaluate whether \\(\\displaystyle\\sum_{n=2}^{\\infty} \\frac{1}{n\\ln n}\\) converges or diverges.",
    "ch": [
      "Converges, because \\(\\displaystyle\\lim_{t\\to\\infty}\\int_2^t \\frac{1}{x\\ln x}\\,dx\\) is finite",
      "Diverges, because \\(\\displaystyle\\lim_{t\\to\\infty}\\int_2^t \\frac{1}{x\\ln x}\\,dx = \\infty\\)",
      "Converges, because \\(\\displaystyle\\lim_{t\\to\\infty}\\frac{1}{t\\ln t} = 0\\)",
      "Diverges, because the \\(n\\)-th term test limit is not zero"
    ],
    "ans": 1,
    "exp": "Evaluate \\(\\int_2^\\infty \\frac{1}{x\\ln x}dx\\). With \\(u=\\ln x\\), \\(du=1/x\\,dx\\), the integral is \\(\\int \\frac{1}{u}du = \\ln|\\ln x|\\). As \\(x\\to\\infty\\), \\(\\ln(\\ln x)\\to\\infty\\), so the integral diverges, meaning the series diverges."
  },
  {
    "sec": "Direct Comparison Test",
    "prompt": "Which test conclusively shows the convergence behavior of \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{1}{n^3+5}\\)?",
    "ch": [
      "Directly compared to \\(\\frac{1}{n^3}\\), it converges because \\(\\frac{1}{n^3+5} \\le \\frac{1}{n^3}\\)",
      "Directly compared to \\(\\frac{1}{n^3}\\), it diverges because \\(\\frac{1}{n^3+5} \\le \\frac{1}{n^3}\\)",
      "Directly compared to \\(\\frac{1}{n}\\), it diverges because \\(\\frac{1}{n^3+5} < \\frac{1}{n}\\)",
      "The test fails because \\(n^3+5 > n^3\\)"
    ],
    "ans": 0,
    "exp": "Since \\(n^3+5 > n^3\\) for all \\(n\\ge 1\\), we have \\(\\frac{1}{n^3+5} < \\frac{1}{n^3}\\). Since \\(\\sum \\frac{1}{n^3}\\) is a convergent \\(p\\)-series, our series converges by the Direct Comparison Test."
  },
  {
    "sec": "Limit Comparison Test",
    "prompt": "To test the series \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{3n+5}{n^3-2n+1}\\) with the Limit Comparison Test, which series is the most appropriate comparison, and what is the conclusion?",
    "ch": [
      "Compare to \\(\\sum \\frac{1}{n^2}\\); converges.",
      "Compare to \\(\\sum \\frac{1}{n^3}\\); converges.",
      "Compare to \\(\\sum \\frac{3}{n}\\); diverges.",
      "Compare to \\(\\sum \\frac{1}{n^2}\\); diverges."
    ],
    "ans": 0,
    "exp": "The dominant terms are \\(3n/n^3 = 3/n^2\\). The proper comparison series is \\(\\sum 1/n^2\\). Since \\(\\lim_{n\\to\\infty}\\frac{a_n}{b_n} = 3 > 0\\) and finite, both converge."
  },
  {
    "sec": "Limit Comparison Test",
    "prompt": "Suppose \\(a_n > 0\\) and \\(b_n > 0\\). If \\(\\displaystyle\\lim_{n\\to\\infty}\\frac{a_n}{b_n} = 0\\) and \\(\\sum b_n\\) diverges, what can we conclude about \\(\\sum a_n\\)?",
    "ch": [
      "\\(\\sum a_n\\) converges.",
      "\\(\\sum a_n\\) diverges.",
      "\\(\\sum a_n\\) converges conditionally.",
      "No conclusion can be drawn from the Limit Comparison Test."
    ],
    "ans": 3,
    "exp": "If the limit is 0, \\(a_n\\) is much smaller than \\(b_n\\). If the larger series \\(\\sum b_n\\) diverges, we know nothing about the smaller series \\(\\sum a_n\\)."
  },
  {
    "sec": "Alternating Series Test",
    "prompt": "Which of the following series converges strictly by the Alternating Series Test but is NOT absolutely convergent?",
    "ch": [
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^n}{n^2}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^n}{n}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{\\cos(n\\pi)}{n\\sqrt{n}}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}(-1)^n\\)"
    ],
    "ans": 1,
    "exp": "Option B is the alternating harmonic series. It converges by AST, but absolutely it becomes the harmonic series \\(\\sum 1/n\\), which diverges. Options A and C converge absolutely. Option D diverges."
  },
  {
    "sec": "Alternating Series Error Bound",
    "prompt": "If \\(\\displaystyle S = \\sum_{n=1}^{\\infty} \\frac{(-1)^{n+1}}{n^2}\\) is approximated using the first 4 terms, what is the upper bound on the error using the Alternating Series Error Bound?",
    "ch": [
      "\\(\\frac{1}{16}\\)",
      "\\(\\frac{1}{25}\\)",
      "\\(\\frac{1}{36}\\)",
      "\\(\\frac{1}{5}\\)"
    ],
    "ans": 1,
    "exp": "The AST error bound states the error is less than or equal to the absolute value of the first omitted term. The 5th term is \\(\\frac{1}{5^2} = \\frac{1}{25}\\)."
  },
  {
    "sec": "Absolute vs. Conditional",
    "prompt": "Consider the series \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^n}{\\sqrt{n+3}}\\). Which description is correct?",
    "ch": [
      "Converges absolutely",
      "Converges conditionally",
      "Diverges by the \\(n\\)-th term test",
      "Diverges because the \\(p\\)-series has \\(p < 1\\)"
    ],
    "ans": 1,
    "exp": "The alternating series converges by the AST since \\(\\frac{1}{\\sqrt{n+3}}\\) decreases to 0. But taking absolute values gives \\(\\sum \\frac{1}{\\sqrt{n+3}}\\), which diverges (limit compare to \\(1/{\\sqrt{n}}\\), \\(p=1/2 \\le 1\\)). Thus, it converges conditionally."
  },
  {
    "sec": "Ratio Test",
    "prompt": "Use the Ratio Test on \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{3^n}{n!}\\). What is the value of the limit \\(L = \\displaystyle\\lim_{n\\to\\infty} \\left|\\frac{a_{n+1}}{a_n}\\right|\\)?",
    "ch": [
      "\\(3\\)",
      "\\(1\\)",
      "\\(0\\)",
      "\\(\\infty\\)"
    ],
    "ans": 2,
    "exp": "\\(L = \\lim_{n\\to\\infty} \\frac{3^{n+1}/(n+1)!}{3^n/n!} = \\lim_{n\\to\\infty} \\frac{3}{n+1} = 0\\). Since \\(0 < 1\\), the series converges."
  },
  {
    "sec": "Ratio Test",
    "prompt": "For which of the following series is the Ratio Test inconclusive?",
    "ch": [
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{2^n}{n^3}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{n!}{5^n}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{3^n}{n!}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^n}{n^2+1}\\)"
    ],
    "ans": 3,
    "exp": "The Ratio Test yields \\(L=1\\) for rational or algebraic functions of \\(n\\), like \\(\\frac{1}{n^2+1}\\), making it inconclusive. The other options yield limits of 2, \\(\\infty\\), and 0."
  },
  {
    "sec": "Root Test",
    "prompt": "Use the Root Test to determine the convergence of \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left(\\frac{2n+1}{3n-1}\\right)^n\\). What is the limit \\(L = \\displaystyle\\lim_{n\\to\\infty} \\sqrt[n]{|a_n|}\\)?",
    "ch": [
      "\\(1\\)",
      "\\(\\frac{2}{3}\\)",
      "\\(0\\)",
      "\\(\\infty\\)"
    ],
    "ans": 1,
    "exp": "\\(L = \\lim_{n\\to\\infty} \\frac{2n+1}{3n-1} = \\frac{2}{3}\\). Because \\(L < 1\\), the series converges by the Root Test."
  },
  {
    "sec": "Mixed Tests",
    "prompt": "Which test conclusively establishes that \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{\\sin(n)}{n^3}\\) converges?",
    "ch": [
      "Alternating Series Test",
      "Direct Comparison Test with \\(1/n^3\\)",
      "Absolute Convergence test using Direct Comparison with \\(1/n^3\\)",
      "Ratio Test"
    ],
    "ans": 2,
    "exp": "Since \\(\\sin(n)\\) is not strictly and dependably alternating, the AST doesn't apply. But taking the absolute values, \\(|\\frac{\\sin n}{n^3}| \\le \\frac{1}{n^3}\\). So the series converges absolutely by the Direct Comparison Test."
  },
  {
    "sec": "Limit Comparison Test",
    "prompt": "Let \\(a_n = \\frac{1}{\\sqrt{n^3+1}}\\). Using the Limit Comparison Test with \\(b_n = \\frac{1}{n^{3/2}}\\), what is the value of \\(\\displaystyle\\lim_{n\\to\\infty} \\frac{a_n}{b_n}\\)?",
    "ch": [
      "\\(0\\)",
      "\\(1\\)",
      "\\(\\frac{1}{2}\\)",
      "\\(\\infty\\)"
    ],
    "ans": 1,
    "exp": "\\(\\lim_{n\\to\\infty} \\frac{a_n}{b_n} = \\lim_{n\\to\\infty} \\frac{\\frac{1}{\\sqrt{n^3+1}}}{\\frac{1}{\\sqrt{n^3}}} = \\lim_{n\\to\\infty} \\sqrt{\\frac{n^3}{n^3+1}} = 1\\). Both series converge since \\(p=3/2 > 1\\)."
  },
  {
    "sec": "Root Test",
    "prompt": "Evaluate the convergence of \\(\\displaystyle\\sum_{n=1}^{\\infty} \\left(1 + \\frac{1}{n}\\right)^{-n^2}\\) using the Root Test. What is \\(\\displaystyle\\lim_{n\\to\\infty} \\sqrt[n]{|a_n|}\\)?",
    "ch": [
      "\\(e\\)",
      "\\(1/e\\)",
      "\\(1\\)",
      "\\(0\\)"
    ],
    "ans": 1,
    "exp": "\\(\\sqrt[n]{|a_n|} = \\left(1+\\frac{1}{n}\\right)^{-n} = \\frac{1}{(1+\\frac{1}{n})^n}\\). As \\(n\\to\\infty\\), the denominator approaches \\(e\\), so the limit is \\(1/e\\). Since \\(1/e < 1\\), it converges."
  },
  {
    "sec": "Alternating Series Test",
    "prompt": "Does the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^n n}{n+5}\\) converge or diverge, and by what test?",
    "ch": [
      "Converges conditionally by AST",
      "Converges absolutely by Limit Comparison Test",
      "Diverges by the \\(n\\)-th term test",
      "Diverges by the Ratio Test"
    ],
    "ans": 2,
    "exp": "The limit of the terms without the alternating sign is \\(\\lim_{n\\to\\infty} \\frac{n}{n+5} = 1 \\neq 0\\). Therefore, \\(a_n\\) does not approach 0, so it diverges by the \\(n\\)-th term divergence test."
  },
  {
    "sec": "Absolute vs. Conditional",
    "prompt": "Which of the following series converges conditionally?",
    "ch": [
      "\\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^n}{n^{1.1}}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^n \\ln n}{n}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{(-1)^n e^n}{n!}\\)",
      "\\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{\\cos(n\\pi)}{n^3}\\)"
    ],
    "ans": 1,
    "exp": "Series A, C, and D all converge absolutely. Series B yields the absolute series \\(\\sum \\frac{\\ln n}{n}\\), which diverges by the integral test, yet the alternating version converges by AST. So B is conditional."
  },
  {
    "sec": "Direct Comparison Test",
    "prompt": "Consider the series \\(\\displaystyle\\sum_{n=1}^{\\infty} \\frac{2+\\sin n}{n^2}\\). This series converges by the Direct Comparison Test using which of the following inequalities?",
    "ch": [
      "\\(\\frac{2+\\sin n}{n^2} \\le \\frac{3}{n^2}\\)",
      "\\(\\frac{2+\\sin n}{n^2} \\ge \\frac{1}{n^2}\\)",
      "\\(\\frac{2+\\sin n}{n^2} \\le \\frac{1}{n^2}\\)",
      "\\(\\frac{2+\\sin n}{n^2} \\le \\frac{2}{n^2}\\)"
    ],
    "ans": 0,
    "exp": "Since \\(-1 \\le \\sin n \\le 1\\) for all \\(n\\), we have \\(1 \\le 2+\\sin n \\le 3\\). Thus, \\(\\frac{2+\\sin n}{n^2} \\le \\frac{3}{n^2}\\). Since \\(\\sum \\frac{3}{n^2}\\) converges (a constant multiple of a given \\(p\\)-series), the series converges."
  },
  {
    "sec": "Alternating Series Error Bound",
    "prompt": "How many terms of the series \\(\\displaystyle\\sum_{n=1}^{\\infty}\\frac{(-1)^{n+1}}{n^4}\\) are needed to ensure the partial sum is within \\(10^{-4}\\) of the exact sum?",
    "ch": [
      "\\(8\\)",
      "\\(9\\)",
      "\\(10\\)",
      "\\(99\\)"
    ],
    "ans": 1,
    "exp": "The error must be \\(\\le 10^{-4}\\). The AST error is \\(|a_{N+1}| = \\frac{1}{(N+1)^4} \\le \\frac{1}{10000}\\). Thus \\((N+1)^4 \\ge 10000\\), which means \\(N+1 \\ge 10\\), giving \\(N \\ge 9\\)."
  }
];
const L=['A','B','C','D'];
const SKEY='activestem_calcbc_series_tests_state';
let sc=0,ans=0,tot=D.length,state=Array(tot).fill(null);

function saveState(){localStorage.setItem(SKEY,JSON.stringify({sc,ans,state}));}
function loadState(){try{const s=JSON.parse(localStorage.getItem(SKEY));if(s&&s.state&&s.state.length===tot){sc=s.sc;ans=s.ans;state=s.state;return true;}}catch(e){}return false;}

const nl=document.getElementById('nl'),qs=document.getElementById('qs');
let ls='';
D.forEach((q,i)=>{
const n=i+1;
if(q.sec!==ls){const h=document.createElement('li');h.innerHTML='<div class="ns">'+q.sec+'</div>';nl.appendChild(h);ls=q.sec;}
const li=document.createElement('li');li.innerHTML='<a href="#q'+n+'" id="n'+n+'"><span class="d"></span>Q'+n+'</a>';nl.appendChild(li);
let ch='';q.ch.forEach((c,ci)=>{ch+='<div class="ch" id="c'+n+'-'+ci+'"><input type="radio" name="q'+n+'" value="'+ci+'" id="r'+n+'-'+ci+'"><label for="r'+n+'-'+ci+'"><span class="lt">'+L[ci]+'</span><span>'+c+'</span></label></div>';});
const cd=document.createElement('article');cd.className='qc';cd.id='q'+n;
cd.innerHTML='<div class="qn">Question '+n+' <span class="st">'+q.sec+'</span></div><div class="qp">'+q.prompt+'</div><div class="chs">'+ch+'</div><button class="sb" id="b'+n+'">Submit Answer</button><div class="warn" id="w'+n+'">Please select an answer.</div><div class="fb" id="f'+n+'"></div>';
qs.appendChild(cd);
document.getElementById('b'+n).addEventListener('click',()=>go(n,q.ans,q.exp));
});

function restoreUI(){
  document.getElementById('ss').textContent=sc;
  document.getElementById('pt').textContent=ans+' / '+tot+' answered';
  document.getElementById('pb').style.width=(ans/tot*100)+'%';
  state.forEach((s,i)=>{
    if(s===null)return;
    const n=i+1,q=D[i],cd=document.getElementById('q'+n),na=document.getElementById('n'+n);
    cd.classList.add('lk');cd.querySelectorAll('input').forEach(r=>{r.disabled=true;if(parseInt(r.value)===s.chosen)r.checked=true;});
    document.getElementById('b'+n).disabled=true;
    document.getElementById('c'+n+'-'+q.ans).classList.add('ok');
    if(s.chosen!==q.ans)document.getElementById('c'+n+'-'+s.chosen).classList.add('no');
    const fb=document.getElementById('f'+n);
    if(s.chosen===q.ans){fb.className='fb sh ok';fb.innerHTML='<strong>Correct! +10</strong> — '+q.exp;na.classList.add('ok');}
    else{fb.className='fb sh no';fb.innerHTML='<strong>Incorrect. −5</strong> — '+q.exp;na.classList.add('no');}
  });
  if(ans===tot){const d=document.getElementById('dn');d.classList.add('sh');document.getElementById('fsc').textContent=sc;document.getElementById('mxs').textContent=tot*10;}
}

if(loadState())restoreUI();
if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();

function go(n,cor,exp){
  const w=document.getElementById('w'+n);
  const s=document.querySelector('input[name="q'+n+'"]:checked');
  if(!s){w.classList.add('sh');return;}
  w.classList.remove('sh');
  const v=parseInt(s.value),cd=document.getElementById('q'+n),fb=document.getElementById('f'+n),na=document.getElementById('n'+n);
  cd.classList.add('lk');cd.querySelectorAll('input').forEach(r=>r.disabled=true);document.getElementById('b'+n).disabled=true;
  document.getElementById('c'+n+'-'+cor).classList.add('ok');
  if(v!==cor)document.getElementById('c'+n+'-'+v).classList.add('no');
  if(v===cor){sc+=10;fb.className='fb sh ok';fb.innerHTML='<strong>Correct! +10</strong> — '+exp;na.classList.add('ok');}
  else{sc-=5;fb.className='fb sh no';fb.innerHTML='<strong>Incorrect. −5</strong> — '+exp;na.classList.add('no');}
  ans++;state[n-1]={chosen:v};
  document.getElementById('ss').textContent=sc;
  document.getElementById('pt').textContent=ans+' / '+tot+' answered';
  document.getElementById('pb').style.width=(ans/tot*100)+'%';
  saveState();
  if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([fb]);
  if(ans===tot){const d=document.getElementById('dn');d.classList.add('sh');document.getElementById('fsc').textContent=sc;document.getElementById('mxs').textContent=tot*10;d.scrollIntoView({behavior:'smooth'});}
}

document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem(SKEY);location.reload();}});
</script>
</body></html>
