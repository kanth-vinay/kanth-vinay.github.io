*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

.brand{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08)}
.brand h1{font-family:'Poppins',sans-serif;font-weight:900;font-size:1.15rem;letter-spacing:.02em}
.brand .tag{font-size:.68rem;color:rgba(245,242,235,.45);margin-top:2px;letter-spacing:.03em}
.side-score{padding:.85rem 1.25rem;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);font-weight:700;font-size:.85rem;display:flex;justify-content:space-between}

.nav li a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav li a .d{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);flex-shrink:0;transition:all .2s}
.nav li a.ok .d{background:#48bb78;border-color:#48bb78}
.nav li a.no .d{background:#f56565;border-color:#f56565}
.ns{padding:10px 1.25rem 4px;font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(245,242,235,.28);font-weight:700;margin-top:6px}

.chs{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.9rem}
.ch{position:relative}
.ch input{position:absolute;opacity:0;width:0;height:0}
.ch label{display:flex;align-items:flex-start;gap:10px;padding:.65rem .9rem;border:1.5px solid var(--border-soft);border-radius:10px;cursor:pointer;transition:all .15s;font-size:.9rem;line-height:1.5}
.ch label .lt{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;border:1.5px solid var(--border);transition:all .15s;margin-top:1px}
.ch input:checked~label{border-color:var(--navy);background:rgba(29,44,72,.03)}
.ch input:checked~label .lt{background:var(--navy);color:#fff;border-color:var(--navy)}
.ch input:focus-visible~label{outline:2px solid var(--gold);outline-offset:2px}
.ch.ok label{border-color:var(--success)!important;background:var(--success-bg)!important}
.ch.ok label .lt{background:var(--success)!important;color:#fff!important;border-color:var(--success)!important}
.ch.no label{border-color:var(--error)!important;background:var(--error-bg)!important}
.ch.no label .lt{background:var(--error)!important;color:#fff!important;border-color:var(--error)!important}
.lk .ch label{cursor:default;opacity:.85}
.lk .ch input:checked~label{opacity:1}
.lk .ch.ok label{opacity:1}
.sb{background:var(--green);color:#fff;border:none;padding:.55rem 1.6rem;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;transition:background .15s;font-family:inherit}
.sb:hover{background:var(--green-deep)}
.sb:disabled{opacity:.45;cursor:not-allowed}
.fb{margin-top:.7rem;padding:.6rem .9rem;border-radius:8px;font-size:.82rem;line-height:1.55;display:none}
.fb.sh{display:block}
.fb.ok{background:var(--success-bg);color:var(--success);border-left:3px solid var(--success)}
.fb.no{background:var(--error-bg);color:var(--error);border-left:3px solid var(--error)}
.done{display:none;text-align:center;padding:2.5rem;background:var(--card);border:2px solid var(--gold);border-radius:14px;margin-top:1.5rem}
.done h2{font-family:'Poppins',sans-serif;color:var(--navy);font-weight:900;font-size:1.3rem}
.done .fs{font-size:2rem;font-weight:900;color:var(--green);margin:.6rem 0}
.done .mx{color:var(--muted);font-size:.88rem}
.done.sh{display:block}
@media(max-width:900px){:root{--sidebar-w:220px}main{padding:2rem 1.5rem}}
@media(max-width:700px){body{grid-template-columns:1fr}aside{position:fixed;left:-280px;width:280px;transition:left .3s}aside.open{left:0}.mt{display:flex!important}main{padding:1.5rem 1rem;margin-left:0}}
.mt{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--navy);color:#fff;border:none;width:40px;height:40px;border-radius:8px;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer}

e complement and supplement of \\(\\dfrac{\\pi}{8}\\).", "ch": ["Comp = \\(\\dfrac{\\pi}{8}\\), supp = \\(\\dfrac{7\\pi}{8}\\)", "Comp = \\(\\dfrac{3\\pi}{8}\\), supp = \\(\\dfrac{9\\pi}{8}\\)", "Comp = \\(\\dfrac{5\\pi}{8}\\), supp = \\(\\dfrac{7\\pi}{8}\\)", "Comp = \\(\\dfrac{3\\pi}{8}\\), Supp = \\(\\dfrac{7\\pi}{8}\\)"], "ans": 3, "exp": "Comp: \\(\\frac{\\pi}{2}-\\frac{\\pi}{8}=\\frac{3\\pi}{8}\\). Supp: \\(\\pi-\\frac{\\pi}{8}=\\frac{7\\pi}{8}\\). Adding \\(\\pi+\\frac{\\pi}{8}\\) gives the error \\(\\frac{9\\pi}{8}\\)."}, {"sec": "Complement & Supplement", "prompt": "Find the complement and supplement of \\(\\dfrac{2\\pi}{5}\\).", "ch": ["Comp = \\(\\dfrac{\\pi}{5}\\), supp = \\(\\dfrac{3\\pi}{5}\\)", "Comp = \\(\\dfrac{\\pi}{10}\\), Supp = \\(\\dfrac{3\\pi}{5}\\)", "Comp = \\(\\dfrac{\\pi}{10}\\), supp = \\(\\dfrac{7\\pi}{5}\\)", "Comp = \\(\\dfrac{3\\pi}{10}\\), supp = \\(\\dfrac{2\\pi}{5}\\)"], "ans": 1, "exp": "Comp: \\(\\frac{\\pi}{2}-\\frac{2\\pi}{5}=\\frac{\\pi}{10}\\). Supp: \\(\\pi-\\frac{2\\pi}{5}=\\frac{3\\pi}{5}\\)."}, {"sec": "DMS ↔ Decimal Degrees", "prompt": "Convert \\(135°\\,16'\\,45''\\) to decimal degrees (four places).", "ch": ["\\(135.1645°\\)", "\\(135.2833°\\)", "\\(135.0279°\\)", "\\(135.2792°\\)"], "ans": 3, "exp": "\\(135+\\frac{16}{60}+\\frac{45}{3600}\\approx135.2792°\\). Writing digits directly as decimals gives 135.1645°."}, {"sec": "DMS ↔ Decimal Degrees", "prompt": "Convert \\(-234°\\,0'\\,40''\\) to decimal degrees (four places).", "ch": ["\\(-234.6667°\\)", "\\(-234.0111°\\)", "\\(-234.4000°\\)", "\\(234.0111°\\)"], "ans": 1, "exp": "\\(-(234+\\frac{40}{3600})\\approx-234.0111°\\). Treating 40″ as 40′ gives −234.6667°."}, {"sec": "DMS ↔ Decimal Degrees", "prompt": "Convert \\(135.29°\\) to DMS.", "ch": ["\\(135°\\,17'\\,24''\\)", "\\(135°\\,29'\\,0''\\)", "\\(135°\\,17'\\,40''\\)", "\\(135°\\,16'\\,24''\\)"], "ans": 0, "exp": "\\(0.29\\times60=17.4'\\); \\(0.4\\times60=24''\\). Placing 29 directly as minutes is a common error."}, {"sec": "DMS ↔ Decimal Degrees", "prompt": "Convert \\(-85.36°\\) to DMS.", "ch": ["\\(-85°\\,36'\\,0''\\)", "\\(-85°\\,21'\\,60''\\)", "\\(-85°\\,21'\\,36''\\)", "\\(-85°\\,3'\\,36''\\)"], "ans": 2, "exp": "\\(0.36\\times60=21.6'\\); \\(0.6\\times60=36''\\). Using \\(0.6\\times100=60\\) gives the error 21′60″."}, {"sec": "Linear & Angular Speed", "prompt": "A CD has radius \\(6\\) cm and spins at \\(500\\) rev/min. Find the linear speed.", "ch": ["\\(3{,}000\\pi\\) cm/min", "\\(6{,}000\\pi\\) cm/min", "\\(12{,}000\\pi\\) cm/min", "\\(1{,}000\\pi\\) cm/min"], "ans": 1, "exp": "\\(\\omega=500\\times2\\pi=1000\\pi\\). \\(v=6\\times1000\\pi=6000\\pi\\). Using \\(\\pi\\) instead of \\(2\\pi\\) per rev gives \\(3000\\pi\\)."}, {"sec": "Linear & Angular Speed", "prompt": "A car at 28 mph has wheels of diameter \\(2\\tfrac13\\) ft. Find the angular speed in rad/min.", "ch": ["\\(1{,}056\\) rad/min", "\\(4{,}224\\) rad/min", "\\(2{,}112\\) rad/min", "\\(2{,}464\\) rad/min"], "ans": 2, "exp": "\\(v=\\frac{28\\times5280}{60}=2464\\) ft/min, \\(r=\\frac76\\) ft. \\(\\omega=\\frac{v}{r}=2112\\). Using diameter instead of radius gives \\(1056\\)."}, {"sec": "Law of Sines / Cosines", "prompt": "In \\(\\triangle ABC\\): \\(\\angle C=17°\\), \\(b=16\\) cm, \\(c=15\\) cm. Find \\(\\angle B\\) (acute) to the nearest tenth.", "ch": ["\\(17.0°\\)", "\\(161.8°\\)", "\\(36.4°\\)", "\\(18.2°\\)"], "ans": 3, "exp": "\\(\\sin B=\\frac{16\\sin17°}{15}\\approx0.312 \\Rightarrow B\\approx18.2°\\). The obtuse solution \\(161.8°\\) is the SSA ambiguous-case trap."}, {"sec": "Law of Sines / Cosines", "prompt": "In \\(\\triangle ABC\\): \\(\\angle A=66°\\), \\(c=9\\) mi, \\(a=21\\) mi. Find \\(\\angle C\\) to the nearest tenth.", "ch": ["\\(23.1°\\)", "\\(66.0°\\)", "\\(90.9°\\)", "\\(46.2°\\)"], "ans": 0, "exp": "\\(\\sin C=\\frac{9\\sin66°}{21}\\approx0.392 \\Rightarrow C\\approx23.1°\\). The value \\(90.9°\\) is actually \\(\\angle B\\)."}, {"sec": "Law of Sines / Cosines", "prompt": "In 44,85,69,.04)\" stroke=\"#1D2C48\" stroke-width=\"1.5\"/><polyline points=\"30,134 46,134 46,150\" fill=\"none\" stroke=\"#5D6872\"/><text x=\"100\" y=\"167\" font-size=\"11\" fill=\"#1D2C48\" font-family=\"Inter\" font-weight=\"600\" text-anchor=\"middle\"></text><text x=\"16\" y=\"95\" font-size=\"11\" fill=\"#1D2C48\" font-family=\"Inter\" font-weight=\"600\" text-anchor=\"middle\">13</text><text x=\"108\" y=\"80\" font-size=\"11\" fill=\"#1D2C48\" font-family=\"Inter\" font-weight=\"600\" text-anchor=\"middle\">27</text><path d=\"M150,150 A20,20 0 0,0 157,137\" fill=\"none\" stroke=\"#B58D3D\" stroke-width=\"1.5\"/><text x=\"146\" y=\"131\" font-size=\"10\" fill=\"#B58D3D\" font-family=\"Inter\" font-weight=\"700\">θ</text></svg>", "ch": ["\\(29°\\)", "\\(61°\\)", "\\(25°\\)", "\\(31°\\)"], "ans": 0, "exp": "\\(\\sin\\theta=\\frac{13}{27}\\approx0.481 \\Rightarrow \\theta\\approx29°\\). Using \\(\\cos^{-1}\\) instead gives the complement \\(61°\\)."}, {"sec": "Applications", "prompt": "You ski down a mountain with vertical height \\(1500\\) ft. The straight-line distance from top to base is \\(3000\\) ft. What is the angle of elevation?", "ch": ["\\(60°\\)", "\\(30°\\)", "\\(26.6°\\)", "\\(45°\\)"], "ans": 1, "exp": "\\(\\sin\\theta=\\frac{1500}{3000}=\\frac12 \\Rightarrow 30°\\). Using \\(\\cos^{-1}\\!\\left(\\frac12\\right)\\) gives \\(60°\\). Using \\(\\tan^{-1}\\!\\left(\\frac12\\right)\\) (treating 3000 as horizontal) gives \\(26.6°\\)."}];
const L=['A','B','C','D'];
