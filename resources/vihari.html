<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveSTEM: Dilation & Transformation Mastery</title>
  <meta name="description" content="Interactive assessment on dilations and transformations curated for accelerated high school math.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    :root {
      --navy: #1D2C48;
      --navy-deep: #131E35;
      --green: #2C5545;
      --green-deep: #1E3B30;
      --gold: #B58D3D;
      --ink: #1D2C48;
      --muted: #5D6872;
      --bg: #F5F2EB;
      --bg-alt: #EAE6DD;
      --card: #FFFFFF;
      --border: #DCD8D0;
      --border-soft: #E6E2D9;
      --success: #2C5545;
      --error: #9B2C2C;
      --success-bg: #e8f0ec;
      --error-bg: #f5e6e6;
      --sidebar-w: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      display: flex;
      min-height: 100vh;
      line-height: 1.6;
    }

    h1, h2, h3, .q-badge {
      font-family: 'Poppins', sans-serif;
    }

    /* Sidebar */
    aside {
      width: var(--sidebar-w);
      background-color: var(--navy);
      color: white;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .brand h1 { font-size: 1.5rem; color: var(--gold); margin-bottom: 0.2rem; }
    .brand .tag { font-size: 0.8rem; color: #8F9CB3; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2rem; }

    .side-score { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .side-score .pts { color: var(--gold); font-size: 1.5rem; display: block; }

    .side-prog { margin-bottom: 2rem; }
    .side-prog span { font-size: 0.85rem; color: #8F9CB3; display: block; margin-bottom: 0.5rem; }
    .side-prog .bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .side-prog .bar span { display: block; height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }

    .nav { list-style: none; }
    .nav .sec-hdr { font-size: 0.75rem; text-transform: uppercase; color: #8F9CB3; margin: 1.5rem 0 0.5rem 0; font-weight: 600; letter-spacing: 0.05em; }
    .nav a { display: flex; align-items: center; color: white; text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0; opacity: 0.8; transition: opacity 0.2s; }
    .nav a:hover { opacity: 1; }
    .nav a::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4A5A7A; margin-right: 10px; }
    .nav a.cor::before { background: #4CAF50; }
    .nav a.inc::before { background: #F44336; }

    .rst { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.6rem 1rem; border-radius: 6px; width: 100%; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 1.5rem; }
    .rst:hover { background: rgba(255,255,255,0.1); }

    /* Main Content */
    main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 3rem;
      max-width: 900px;
    }

    .hdr { margin-bottom: 3rem; }
    .hdr h1 { font-size: 2.2rem; color: var(--navy); margin-bottom: 0.5rem; }
    .hdr .sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 1.5rem; }
    
    .badge { display: inline-block; background: var(--bg-alt); padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--navy); border: 1px solid var(--border); margin-right: 0.5rem; }
    .timer-badge { background: var(--navy); color: white; border-color: var(--navy); }
    .timer-urgent { background: var(--error); border-color: var(--error); animation: pulse 1.5s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    /* Question Cards */
    article { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .q-badge { display: inline-block; background: var(--bg-alt); color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.2rem 0.6rem; border-radius: 4px; margin-bottom: 1rem; }
    .q-prompt { font-size: 1.1rem; margin-bottom: 1.5rem; }
    .q-prompt svg { border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    .q-opts { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }
    .choice { display: flex; align-items: center; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; background: white; }
    .choice:hover:not(.disabled) { border-color: var(--navy); background: #faf9f6; }
    .choice input { margin-right: 1rem; cursor: pointer; }
    .choice .lbl { font-weight: 600; color: var(--navy); margin-right: 0.5rem; }
    
    .choice.cor-ans { background: var(--success-bg); border-color: var(--success); }
    .choice.cor-ans .lbl, .choice.cor-ans { color: var(--success); }
    .choice.wr-ans { background: var(--error-bg); border-color: var(--error); }
    .choice.wr-ans .lbl, .choice.wr-ans { color: var(--error); }

    .btn-sub { background: var(--navy); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-sub:hover:not(:disabled) { background: var(--navy-deep); }
    .btn-sub:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.5; }

    .warn { color: var(--error); font-size: 0.9rem; margin-bottom: 1rem; display: none; }
    
    .fb { margin-top: 1.5rem; padding: 1.2rem; border-radius: 8px; font-size: 0.95rem; display: none; }
    .fb.sh { display: block; }
    .fb.ok { background: var(--success-bg); border: 1px solid var(--success); color: var(--green-deep); }
    .fb.no { background: var(--error-bg); border: 1px solid var(--error); color: #7B1B1B; }
    .fb strong { display: inline-block; margin-bottom: 0.5rem; }

    .copy-tex { margin-top: 0.8rem; background: transparent; border: 1px solid currentColor; color: inherit; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .copy-tex:hover { opacity: 0.7; }

    .done { background: var(--navy); color: white; padding: 3rem 2rem; border-radius: 12px; text-align: center; display: none; }
    .done.sh { display: block; }
    .done h2 { color: var(--gold); margin-bottom: 1rem; font-size: 2rem; }
    .done .fs { font-size: 3.5rem; font-weight: 700; line-height: 1; margin-bottom: 0.5rem; }
    .done .mx { color: #8F9CB3; font-size: 1.1rem; }

    /* Mobile */
    .mt { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200; background: var(--navy); color: white; border: none; padding: 0.5rem; border-radius: 4px; font-size: 1.5rem; cursor: pointer; }
    @media (max-width: 768px) {
      .mt { display: block; }
      aside { transform: translateX(-100%); }
      aside.open { transform: translateX(0); }
      main { margin-left: 0; padding: 4rem 1.5rem 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <button class="mt" onclick="document.querySelector('aside').classList.toggle('open')" aria-label="Toggle navigation">☰</button>

  <aside>
    <div class="brand">
      <h1>ActiveSTEM</h1>
      <div class="tag">Accelerated High School Math</div>
    </div>

    <div class="side-score">Score <span class="pts" id="ss">0</span></div>

    <div class="side-prog">
      <span id="pt">0 / 13 answered</span>
      <div class="bar"><span id="pb"></span></div>
    </div>

    <div class="side-btns">
      <button class="rst" id="resetBtn">↻ Reset Assessment</button>
    </div>

    <ul class="nav" id="nl"></ul>
  </aside>

  <main>
    <div class="hdr">
      <h1>Transformation & Dilation Mastery</h1>
      <div class="sub">Curated for IIT-JEE/AP Calculus Readiness</div>
      <div>
        <span class="badge">13 Questions · +10 / −5 Scoring</span>
        <span class="badge timer-badge" id="tb">Time: <span id="tm">30:00</span></span>
      </div>
    </div>

    <div id="qs"></div>

    <div class="done" id="dn">
      <h2>Assessment Complete</h2>
      <div class="fs" id="fsc"></div>
      <div class="mx">out of <span id="mxs"></span> possible points</div>
    </div>
  </main>

  <script>
    const D = [
      {
        sec: "Coordinate Dilations",
        prompt: `Enlarge the figure below with respect to the point \\( P(3,1) \\) by a factor of 2. <br>
        <svg viewBox="0 0 260 260" style="background:#fff; border:1px solid #ccc; max-width:300px; width:100%; margin: 1rem 0; font-family: sans-serif;">
          <defs><pattern id="g1" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="260" height="260" fill="url(#g1)"/>
          <line x1="20" y1="0" x2="20" y2="260" stroke="#888" stroke-width="2"/>
          <line x1="0" y1="240" x2="260" y2="240" stroke="#888" stroke-width="2"/>
          <polygon points="100,140 140,140 120,200" fill="#cce0ff" stroke="#333" stroke-width="1.5"/>
          <circle cx="80" cy="220" r="3" fill="black"/>
          <text x="65" y="215" font-size="14" font-weight="bold" font-style="italic">P</text>
        </svg><br>
        What are the coordinates of the enlarged triangle?`,
        ch: [
          "\\( (5,9) \\), \\( (9,9) \\), \\( (7,3) \\)",
          "\\( (8,10) \\), \\( (12,10) \\), \\( (10,4) \\)",
          "\\( (2,3) \\), \\( (4,3) \\), \\( (3,1.5) \\)",
          "\\( (7,6) \\), \\( (9,6) \\), \\( (8,3) \\)"
        ],
        ans: 0,
        exp: "To dilate a point \\( V \\) from a center \\( P \\) by a scale factor \\( k \\), use the formula: \\( V' = P + k(V - P) \\). The original vertices are \\( (4,5), (6,5), (5,2) \\). For vertex \\( (4,5) \\): \\( x' = 3 + 2(4-3) = 5 \\), \\( y' = 1 + 2(5-1) = 9 \\). Applying this to all vertices yields \\( (5,9) \\), \\( (9,9) \\), and \\( (7,3) \\)."
      },
      {
        sec: "Coordinate Dilations",
        prompt: `Shrink the figure with respect to the point \\( P(3,2) \\) by a scale factor of \\( \\frac{1}{2} \\).<br>
        <svg viewBox="0 0 260 260" style="background:#fff; border:1px solid #ccc; max-width:300px; width:100%; margin: 1rem 0; font-family: sans-serif;">
          <defs><pattern id="g2" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="260" height="260" fill="url(#g2)"/>
          <line x1="20" y1="0" x2="20" y2="260" stroke="#888" stroke-width="2"/>
          <line x1="0" y1="240" x2="260" y2="240" stroke="#888" stroke-width="2"/>
          <polygon points="140,120 200,120 200,60 140,60" fill="#cce0ff" stroke="#333" stroke-width="1.5"/>
          <circle cx="80" cy="200" r="3" fill="black"/>
          <text x="65" y="195" font-size="14" font-weight="bold" font-style="italic">P</text>
        </svg><br>
        What are the coordinates of the shrunken square?`,
        ch: [
          "\\( (1.5, 2) \\), \\( (3, 2) \\), \\( (3, 3.5) \\), \\( (1.5, 3.5) \\)",
          "\\( (4.5, 4) \\), \\( (6, 4) \\), \\( (6, 5.5) \\), \\( (4.5, 5.5) \\)",
          "\\( (3, 3) \\), \\( (4.5, 3) \\), \\( (4.5, 4.5) \\), \\( (3, 4.5) \\)",
          "\\( (12, 12) \\), \\( (18, 12) \\), \\( (18, 18) \\), \\( (12, 18) \\)"
        ],
        ans: 1,
        exp: "Applying \\( V' = P + 0.5(V - P) \\) to each vertex. The original vertices are \\( (6,6), (9,6), (9,9), (6,9) \\). For \\( (6,6) \\): \\( x' = 3 + 0.5(6-3) = 4.5 \\) and \\( y' = 2 + 0.5(6-2) = 4 \\). Repeating this computation for all vertices yields the coordinates \\( (4.5, 4) \\), \\( (6, 4) \\), \\( (6, 5.5) \\), and \\( (4.5, 5.5) \\)."
      },
      {
        sec: "Real-world Dilations",
        prompt: "Given the following scenario, what would represent the center of dilation, and what would the scale factor be? <br><br><em>Moving from a bright room to a dark room, the diameter of your pupils enlarges from 2.4mm to 4.8mm.</em>",
        ch: [
          "Center of the pupil, Scale Factor = 2",
          "The dark room, Scale Factor = 0.5",
          "Center of the pupil, Scale Factor = 2.4",
          "The bright room, Scale Factor = 2"
        ],
        ans: 0,
        exp: "The dilation occurs outwards from the center of the pupil. The scale factor is the ratio of the new image to the original pre-image: \\( k = \\frac{4.8}{2.4} = 2 \\)."
      },
      {
        sec: "Real-world Dilations",
        prompt: "Given the following scenario, what would represent the center of dilation, and what would the scale factor be? <br><br><em>A magazine editor needs to enlarge a photo to fill the entire cover of the next issue. The photo is enlarged 230%.</em>",
        ch: [
          "The length of the photo, Scale Factor = 230",
          "Center of the photo, Scale Factor = 0.23",
          "The editor's eyes, Scale Factor = 2.3",
          "Center of the photo, Scale Factor = 2.3"
        ],
        ans: 3,
        exp: "When a photo is enlarged proportionally, it scales from its center. A percentage enlargement of 230% translates to a decimal scale factor of \\( \\frac{230}{100} = 2.3 \\)."
      },
      {
        sec: "Real-world Dilations",
        prompt: `In the perspective drawing below, which point represents the center of dilation, and how can the scale factor be determined?<br>
        <svg viewBox="0 0 400 250" style="background:#87CEEB; max-width:450px; width:100%; margin: 1rem 0; border:1px solid #ccc; font-family:sans-serif;">
          <rect x="0" y="150" width="400" height="100" fill="#90EE90"/>
          <polygon points="0,150 50,80 120,150" fill="#A9A9A9"/>
          <polygon points="100,150 200,60 300,150" fill="#808080"/>
          <polygon points="250,150 350,90 400,150" fill="#A9A9A9"/>
          <polygon points="200,150 80,250 320,250" fill="#696969"/>
          <polygon points="200,150 180,250 220,250" fill="#808080"/>
          <line x1="200" y1="150" x2="200" y2="250" stroke="#FFF" stroke-width="4" stroke-dasharray="10, 15"/>
          <polygon points="0,20 60,40 60,200 0,220" fill="#779ECB"/>
          <polygon points="60,40 80,60 80,180 60,200" fill="#5F82A8"/>
          <polygon points="80,60 120,80 120,170 80,180" fill="#F49AC2"/>
          <polygon points="120,80 130,90 130,165 120,170" fill="#D37C9F"/>
          <circle cx="280" cy="80" r="4" fill="black"/><text x="270" y="70" font-weight="bold">A</text>
          <circle cx="85" cy="190" r="4" fill="black"/><text x="70" y="195" font-weight="bold">B</text>
          <circle cx="340" cy="180" r="4" fill="black"/><text x="345" y="170" font-weight="bold">C</text>
          <circle cx="80" cy="60" r="4" fill="black"/><text x="70" y="55" font-weight="bold">D</text>
          <circle cx="200" cy="150" r="4" fill="black"/><text x="195" y="140" font-weight="bold">E</text>
        </svg>`,
        ch: [
          "Point A; Count how many buildings there are in the image.",
          "Point E; Measure the distance from the center of dilation to the bottom of the image and divide it by distance another point is from the bottom of the image.",
          "Point E; Measure how far a point on a building is to the center of dilation and divide by the distance a corresponding point on another building is to the center of dilation.",
          "Point B; Determine the average distance the other points are from the center of dilation."
        ],
        ans: 2,
        exp: "The vanishing point (Point E) represents the center of dilation in one-point perspective. The scale factor is determined by taking the ratio of the distance from the center of dilation to a point on the image, divided by the distance to the corresponding point on the pre-image."
      },
      {
        sec: "Coordinate Dilations",
        prompt: `A triangle is dilated from center \\( D \\) with a scale factor of 2. <br>
        <svg viewBox="0 0 300 300" style="background:#fff; max-width:300px; width:100%; border:1px solid #ccc; margin: 1rem 0;">
          <defs><pattern id="g6" width="25" height="25" patternUnits="userSpaceOnUse"><rect width="25" height="25" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="300" height="300" fill="url(#g6)"/>
          <line x1="150" y1="0" x2="150" y2="300" stroke="#888" stroke-width="1.5"/>
          <line x1="0" y1="150" x2="300" y2="150" stroke="#888" stroke-width="1.5"/>
          <line x1="0" y1="175" x2="300" y2="175" stroke="#4a90e2" stroke-width="1"/>
          <line x1="0" y1="200" x2="300" y2="200" stroke="#4a90e2" stroke-width="1"/>
          <polygon points="150,150 200,150 100,75" fill="none" stroke="#333" stroke-width="1.5"/>
          <circle cx="150" cy="150" r="3"/><text x="135" y="145">A</text>
          <circle cx="200" cy="150" r="3"/><text x="205" y="145">B</text>
          <circle cx="100" cy="75" r="3"/><text x="85" y="70">C</text>
          <circle cx="150" cy="200" r="3" fill="black"/><text x="135" y="215">D</text>
        </svg><br>
        What are the coordinates of the new vertices \\( A', B', \\) and \\( C' \\)?`,
        ch: [
          "\\( A'(0, 2), B'(4, 2), C'(-4, 8) \\)",
          "\\( A'(0, 0), B'(4, 0), C'(-4, 6) \\)",
          "\\( A'(0, 4), B'(4, 4), C'(-4, 10) \\)",
          "\\( A'(0, 1), B'(2, 1), C'(-2, 4) \\)"
        ],
        ans: 0,
        exp: "Based on the grid, \\( A(0,0), B(2,0), C(-2,3), D(0,-2) \\). Using the formula \\( V' = D + 2(V - D) \\): For \\( A(0,0) \\), \\( A' = (0 + 2(0-0), -2 + 2(0 - (-2))) = (0, 2) \\). For \\( B(2,0) \\), \\( B' = (0 + 2(2), -2 + 2(2)) = (4, 2) \\). For \\( C(-2,3) \\), \\( C' = (0 + 2(-2), -2 + 2(5)) = (-4, 8) \\)."
      },
      {
        sec: "Coordinate Dilations",
        prompt: `A square is dilated with the center of dilation at point \\( D \\) and a scale factor of \\( \\frac{1}{4} \\).<br>
        <svg viewBox="0 0 300 300" style="background:#fff; max-width:300px; width:100%; border:1px solid #ccc; margin: 1rem 0;">
          <defs><pattern id="g7" width="25" height="25" patternUnits="userSpaceOnUse"><rect width="25" height="25" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="300" height="300" fill="url(#g7)"/>
          <line x1="150" y1="0" x2="150" y2="300" stroke="#888" stroke-width="1.5"/>
          <line x1="0" y1="150" x2="300" y2="150" stroke="#888" stroke-width="1.5"/>
          <rect x="100" y="100" width="100" height="100" fill="none" stroke="#333" stroke-width="2"/>
          <circle cx="100" cy="200" r="3"/><text x="85" y="215">D</text>
        </svg><br>
        What are the coordinates of the dilated square's top-right vertex?`,
        ch: [
          "\\( (1, 1) \\)",
          "\\( (-1, -1) \\)",
          "\\( (0.5, 0.5) \\)",
          "\\( (0, 0) \\)"
        ],
        ans: 1,
        exp: "The original top-right vertex is \\( (2, 2) \\). Using the center \\( D(-2,-2) \\) and \\( k = 0.25 \\): \\( x' = -2 + 0.25(2 - (-2)) = -2 + 0.25(4) = -1 \\). \\( y' = -2 + 0.25(2 - (-2)) = -1 \\). Thus, the new vertex is \\( (-1, -1) \\)."
      },
      {
        sec: "Properties of Transformations",
        prompt: "Which of the following visual transformations strictly represents a dilation?",
        ch: [
          `<svg viewBox="0 0 100 60" style="height:40px; vertical-align:middle; margin-right:10px;"><polygon points="10,50 30,50 20,20" fill="#bbb" stroke="#000"/><polygon points="50,30 70,30 60,0" fill="none" stroke="#000"/></svg> Translation`,
          `<svg viewBox="0 0 100 60" style="height:40px; vertical-align:middle; margin-right:10px;"><polygon points="10,50 30,50 20,20" fill="#bbb" stroke="#000"/><polygon points="80,20 60,40 90,50" fill="none" stroke="#000"/></svg> Rotation`,
          `<svg viewBox="0 0 100 60" style="height:40px; vertical-align:middle; margin-right:10px;"><polygon points="10,20 30,20 20,50" fill="#bbb" stroke="#000"/><polygon points="50,50 70,50 60,20" fill="none" stroke="#000"/></svg> Reflection`,
          `<svg viewBox="0 0 100 60" style="height:40px; vertical-align:middle; margin-right:10px;"><polygon points="10,50 40,50 25,20" fill="#bbb" stroke="#000"/><polygon points="10,50 70,50 40,-10" fill="none" stroke="#000"/></svg> Dilation`
        ],
        ans: 3,
        exp: "A dilation changes the size of the figure (unless \\( k=1 \\)) but preserves shape and orientation. If a scaled triangle shares a common vertex with the original, that vertex serves as the center of dilation."
      },
      {
        sec: "Properties of Transformations",
        prompt: `Circle \\( P' \\) is a dilation of Circle \\( P \\). <br>
        <svg viewBox="0 0 300 150" style="background:#fff; max-width:400px; width:100%; border:1px solid #ccc; margin: 1rem 0;">
          <defs><pattern id="g9" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="300" height="150" fill="url(#g9)"/>
          <circle cx="90" cy="75" r="40" fill="none" stroke="#333" stroke-width="1.5"/>
          <circle cx="90" cy="75" r="2" fill="black"/><text x="85" y="65">P</text>
          <circle cx="210" cy="75" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
          <circle cx="210" cy="75" r="2" fill="black"/><text x="205" y="65">P'</text>
        </svg><br>
        If the radius of Circle \\( P \\) is 4 grid units and the radius of Circle \\( P' \\) is 3 grid units, what is the scale factor of the dilation?`,
        ch: [
          "\\( 3 \\)",
          "\\( \\frac{4}{3} \\)",
          "\\( \\frac{1}{4} \\)",
          "\\( \\frac{3}{4} \\)"
        ],
        ans: 3,
        exp: "The scale factor \\( k \\) is the ratio of the image length to the pre-image length. Here, \\( k = \\frac{\\text{Radius of } P'}{\\text{Radius of } P} = \\frac{3}{4} \\)."
      },
      {
        sec: "Properties of Transformations",
        prompt: "Polygon P is dilated by some scale factor to Polygon Q. Which of the following sets of scale factors would ALL make Polygon Q strictly smaller than Polygon P?",
        ch: [
          "\\( \\frac{7}{8}, \\frac{1}{3}, \\frac{13}{14} \\)",
          "\\( \\frac{14}{13}, 3, \\frac{8}{7} \\)",
          "\\( 1, \\frac{14}{13}, \\frac{7}{8} \\)",
          "None of the above"
        ],
        ans: 0,
        exp: "A dilation produces a smaller image (a reduction) if and only if the absolute value of the scale factor \\( k \\) is less than 1. All fractions in the first set (\\( 7/8, 1/3, 13/14 \\)) are strictly less than 1."
      },
      {
        sec: "Properties of Transformations",
        prompt: "For the transformation rules listed below, which one strictly represents a dilation?",
        ch: [
          "\\( (x, y) \\rightarrow (x + 7, 6 - y) \\)",
          "\\( (x, y) \\rightarrow (10x, 9y) \\)",
          "\\( (x, y) \\rightarrow (5x, 5y) \\)",
          "\\( (x, y) \\rightarrow (9 - x, y + 3) \\)"
        ],
        ans: 2,
        exp: "A dilation from the origin scales both the x and y coordinates by the exact same constant factor \\( k \\). The rule \\( (x, y) \\rightarrow (5x, 5y) \\) scales both coordinates by 5, representing a dilation with a scale factor of 5."
      },
      {
        sec: "Coordinate Dilations",
        prompt: `Place \\( \\triangle ABC \\) so that its vertices are at \\( A(-2, 2) \\), \\( B(-6, 4) \\), and \\( C(-6, -6) \\).<br>
        <svg viewBox="0 0 300 300" style="background:#fff; max-width:300px; width:100%; border:1px solid #ccc; margin: 1rem 0;">
          <defs><pattern id="g12" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="none" stroke="#eaeaea" stroke-width="1"/></pattern></defs>
          <rect width="300" height="300" fill="url(#g12)"/>
          <line x1="200" y1="0" x2="200" y2="300" stroke="#888" stroke-width="1.5"/>
          <line x1="0" y1="150" x2="300" y2="150" stroke="#888" stroke-width="1.5"/>
          <polygon points="180,130 140,110 140,210" fill="none" stroke="#333" stroke-width="2"/>
          <circle cx="180" cy="130" r="3"/><text x="185" y="125" font-size="10">A</text>
          <circle cx="140" cy="110" r="3"/><text x="125" y="105" font-size="10">B</text>
          <circle cx="140" cy="210" r="3"/><text x="125" y="215" font-size="10">C</text>
        </svg><br>
        If it is dilated with a center of dilation at the origin and a scale factor of 2, what are the coordinates of the new vertices?`,
        ch: [
          "\\( A'(-4, 4), B'(-12, 8), C'(-12, -12) \\)",
          "\\( A'(0, 4), B'(-4, 6), C'(-4, -4) \\)",
          "\\( A'(-1, 1), B'(-3, 2), C'(-3, -3) \\)",
          "\\( A'(-4, 4), B'(-8, 8), C'(-8, -8) \\)"
        ],
        ans: 0,
        exp: "When the center of dilation is the origin \\( (0,0) \\), you simply multiply each coordinate by the scale factor \\( k=2 \\). Thus, \\( A' = (-2 \\times 2, 2 \\times 2) = (-4, 4) \\), \\( B' = (-12, 8) \\), and \\( C' = (-12, -12) \\)."
      },
      {
        sec: "Coordinate Dilations",
        prompt: "The vertices of \\( \\triangle ABC \\) are \\( A(-7, -4) \\), \\( B(10, 6) \\), and \\( C(-8, -2) \\). If \\( \\triangle ABC \\) dilates where the center of dilation is the origin and the scale factor is 3, what are the coordinates of the vertices of \\( \\triangle A'B'C' \\)?",
        ch: [
          "\\( A'(-21, -12), B'(30, 18), C'(-24, -6) \\)",
          "\\( A'(-4, -1), B'(13, 9), C'(-5, 1) \\)",
          "\\( A'(-10, -7), B'(7, 3), C'(-11, -5) \\)",
          "\\( A'(-14, -8), B'(20, 12), C'(-16, -4) \\)"
        ],
        ans: 0,
        exp: "Because the center of dilation is the origin, multiply all coordinates by the scale factor of 3. \\( A' = 3(-7, -4) = (-21, -12) \\); \\( B' = 3(10, 6) = (30, 18) \\); \\( C' = 3(-8, -2) = (-24, -6) \\)."
      }
    ];

    const SKEY = 'activestem_calcbc_timed_state';
    const L = ['A', 'B', 'C', 'D'];
    let sc = 0;
    let ans = 0;
    let tot = D.length;
    let state = Array(tot).fill(null);
    let timeRemaining = 30 * 60;
    let timerInterval;

    function init() {
      const saved = localStorage.getItem(SKEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        sc = parsed.sc || 0;
        ans = parsed.ans || 0;
        state = parsed.state || Array(tot).fill(null);
        timeRemaining = parsed.timeRemaining || (30 * 60);
      }
      
      document.getElementById('resetBtn').addEventListener('click', resetQuiz);
      
      renderUI();
      
      if (ans < tot && timeRemaining > 0) {
        timerInterval = setInterval(timerTick, 1000);
      } else if (timeRemaining <= 0 || ans === tot) {
        finish();
      }
    }

    function renderUI() {
      const qs = document.getElementById('qs');
      const nl = document.getElementById('nl');
      qs.innerHTML = '';
      nl.innerHTML = '';
      
      document.getElementById('ss').textContent = sc;
      document.getElementById('pt').textContent = `${ans} / ${tot} answered`;
      document.getElementById('pb').style.width = `${(ans / tot) * 100}%`;

      let currentSec = '';

      D.forEach((q, i) => {
        if (q.sec !== currentSec) {
          nl.innerHTML += `<li class="sec-hdr">${q.sec}</li>`;
          currentSec = q.sec;
        }

        const st = state[i];
        let statClass = '';
        if (st) statClass = st.isCorrect ? 'cor' : 'inc';
        nl.innerHTML += `<li><a href="#q${i}" id="n${i}" class="${statClass}">Question ${i+1}</a></li>`;

        let chHtml = '';
        q.ch.forEach((c, j) => {
          let isSel = st && st.sel === j;
          let isCor = st && j === q.ans;
          let isWr = st && isSel && !isCor;
          let cls = st ? (isCor ? 'cor-ans' : (isWr ? 'wr-ans' : '')) : '';
          let dis = (st || timeRemaining <= 0) ? 'disabled' : '';
          let chk = isSel ? 'checked' : '';
          
          chHtml += `
            <label class="choice ${cls} ${dis}">
              <input type="radio" name="q${i}" value="${j}" ${dis} ${chk}> 
              <span class="lbl">${L[j]}</span> <div>${c}</div>
            </label>
          `;
        });

        let fbHtml = '';
        if (st) {
          let fClass = st.isCorrect ? 'fb sh ok' : 'fb sh no';
          let msg = st.isCorrect ? 'Correct! +10' : 'Incorrect. −5';
          let encodedExp = encodeURIComponent(q.exp);
          fbHtml = `
            <div class="${fClass}">
              <strong>${msg}</strong> &mdash; ${q.exp}<br>
              <button class="copy-tex" onclick="copyTex(this)" data-tex="${encodedExp}">Copy Explanation (LaTeX)</button>
            </div>
          `;
        }

        let btnDis = (st || timeRemaining <= 0) ? 'disabled' : '';
        // FIX: Removed the expEnc parameter from the onclick handler to prevent JavaScript string literal errors.
        qs.innerHTML += `
          <article id="q${i}">
            <div class="q-badge">${q.sec}</div>
            <div class="q-prompt">${q.prompt}</div>
            <div class="q-opts">${chHtml}</div>
            <div class="warn" id="w${i}">Please select an answer.</div>
            <button class="btn-sub" id="btn${i}" onclick="go(${i}, ${q.ans})" ${btnDis}>Submit Answer</button>
            <div id="fb${i}">${fbHtml}</div>
          </article>
        `;
      });

      if (window.MathJax) {
        MathJax.typesetPromise();
      }
      updateTimerDisplay();
    }

    function go(n, cor) {
      if (timeRemaining <= 0) return;
      
      const radios = document.getElementsByName(`q${n}`);
      let sel = -1;
      for (let r of radios) {
        if (r.checked) { sel = parseInt(r.value); break; }
      }

      if (sel === -1) {
        document.getElementById(`w${n}`).style.display = 'block';
        return;
      }
      document.getElementById(`w${n}`).style.display = 'none';

      const isCorrect = (sel === cor);
      if (isCorrect) sc += 10;
      else sc -= 5;
      
      ans++;
      state[n] = { sel, isCorrect };
      
      saveState();
      renderUI(); 

      if (ans === tot) {
        clearInterval(timerInterval);
        finish();
      }
    }

    function saveState() {
      localStorage.setItem(SKEY, JSON.stringify({ sc, ans, state, timeRemaining }));
    }

    function timerTick() {
      timeRemaining--;
      if (timeRemaining % 5 === 0) saveState();
      
      updateTimerDisplay();

      if (timeRemaining <= 0) {
        clearInterval(timerInterval);
        timeRemaining = 0;
        saveState();
        renderUI(); 
        alert('Time is up! The assessment is locked.');
        finish();
      }
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
      const s = (timeRemaining % 60).toString().padStart(2, '0');
      document.getElementById('tm').textContent = `${m}:${s}`;
      
      const tb = document.getElementById('tb');
      if (timeRemaining <= 300 && timeRemaining > 0) {
        tb.classList.add('timer-urgent');
      } else {
        tb.classList.remove('timer-urgent');
      }
    }

    function finish() {
      const dn = document.getElementById('dn');
      dn.classList.add('sh');
      document.getElementById('fsc').textContent = sc;
      document.getElementById('mxs').textContent = tot * 10;
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function resetQuiz() {
      if (confirm('Reset all progress and restart the timer? This cannot be undone.')) {
        localStorage.removeItem(SKEY);
        location.reload();
      }
    }

    window.copyTex = function(btn) {
      const tex = decodeURIComponent(btn.getAttribute('data-tex'));
      navigator.clipboard.writeText(tex).then(() => {
        const old = btn.innerHTML;
        btn.innerHTML = 'Copied to Clipboard';
        setTimeout(() => btn.innerHTML = old, 2000);
      });
    };

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
