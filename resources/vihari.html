<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveSTEM: Quadratic Mastery Drill</title>
  <meta name="description" content="Gamified high-stakes drill for solving advanced linear and quadratic equations.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      chtml: { scale: 1.05 },
      startup: {
        ready: () => {
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #F4F7FB;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --success-light: #ECFDF5;
      --danger: #EF4444;
      --danger-light: #FEF2F2;
      --warning: #F59E0B;
      --radius: 16px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }

    /* ── Header & Gamified HUD ── */
    header {
      background: var(--card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .brand span { color: var(--text); }

    .hud {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .score-box { color: var(--primary); position: relative; }
    .streak-box { color: var(--text-muted); transition: all 0.3s ease; }
    .streak-box.active { color: var(--warning); transform: scale(1.1); text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }

    /* Floating Score Animation */
    .float-text {
      position: absolute;
      top: 0;
      right: 0;
      font-weight: 800;
      font-size: 1.5rem;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
    }
    .float-pos { color: var(--success); animation: floatUp 1s ease-out forwards; }
    .float-neg { color: var(--danger); animation: floatUp 1s ease-out forwards; }

    /* ── Main Layout ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress & Timer ── */
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    
    .timer-container {
      width: 100%;
      height: 12px;
      background: #E2E8F0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }
    
    .timer-bar {
      height: 100%;
      width: 100%;
      background: var(--success);
      border-radius: 6px;
      transition: width 1s linear, background-color 0.3s ease;
    }
    .timer-bar.warn { background: var(--warning); }
    .timer-bar.danger { background: var(--danger); }

    /* ── Question Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    .card.shake { animation: shake 0.4s ease-in-out; border-color: var(--danger); }
    .card.celebrate { border-color: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }

    .q-prompt {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .choice {
      display: flex;
      align-items: center;
      padding: 1.25rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1.05rem;
      font-weight: 600;
    }
    .choice:hover:not(.locked) {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
    }
    .choice input { display: none; }
    
    .choice-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--border);
      color: var(--text-muted);
      font-weight: 800;
      margin-right: 1rem;
      transition: all 0.2s;
    }

    .choice:hover:not(.locked) .choice-letter {
      background: var(--primary);
      color: white;
    }

    /* Locked States */
    .choice.locked { cursor: default; }
    .choice.dim { opacity: 0.5; filter: grayscale(1); }
    
    .choice.cor-ans {
      background: var(--success-light);
      border-color: var(--success);
      color: var(--success);
    }
    .choice.cor-ans .choice-letter { background: var(--success); color: white; }

    .choice.wr-ans {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }
    .choice.wr-ans .choice-letter { background: var(--danger); color: white; }

    /* ── Feedback & Next Button ── */
    .feedback {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      background: var(--bg);
      display: none;
      animation: fadeInDown 0.3s ease forwards;
    }
    .feedback.show { display: block; }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fb-header {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .fb-header.ok { color: var(--success); }
    .fb-header.no { color: var(--danger); }
    
    .fb-text { color: var(--text); font-size: 1rem; }

    .btn-next {
      margin-top: 2rem;
      width: 100%;
      padding: 1.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }
    .btn-next:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }

    /* ── End Screen ── */
    .end-screen {
      background: var(--card);
      border-radius: var(--radius);
      padding: 4rem 2rem;
      text-align: center;
      box-shadow: var(--shadow);
      display: none;
    }
    .end-title { font-size: 2.5rem; color: var(--text); margin-bottom: 1rem; }
    .end-score { font-size: 5rem; font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 1rem; }
    .end-subtitle { font-size: 1.25rem; color: var(--text-muted); font-weight: 600; }

    @media (max-width: 600px) {
      header { padding: 1rem; flex-direction: column; gap: 1rem; }
      .hud { width: 100%; justify-content: space-between; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">Active<span>STEM</span></div>
    <div class="hud">
      <div class="stat">
        <span class="stat-label">Streak</span>
        <span class="stat-value streak-box" id="streakDisplay">🔥 x0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Score</span>
        <div class="score-box">
          <span class="stat-value" id="scoreDisplay">0</span>
          <div id="scoreFloat" class="float-text"></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="quizArea">
      <div class="progress-header">
        <span id="qCountDisplay">Question 1 of 20</span>
        <span id="timeText">60s</span>
      </div>
      <div class="timer-container">
        <div class="timer-bar" id="tBar"></div>
      </div>

      <div class="card" id="qCard">
        <div class="q-prompt" id="qPrompt"></div>
        <div class="options" id="qOpts"></div>
        
        <div class="feedback" id="fbBox">
          <div class="fb-header" id="fbHeader"></div>
          <div class="fb-text" id="fbText"></div>
        </div>

        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next Question &rarr;</button>
      </div>
    </div>

    <div class="end-screen" id="endScreen">
      <h2 class="end-title">Drill Complete!</h2>
      <div class="end-score" id="finalScore">0</div>
      <div class="end-subtitle">Great execution discipline.</div>
    </div>
  </main>

  <script>
    // ── Equation Database ──
    const rawQuestions = [
      {
        q: "Solve for \\(x\\): \\( 4(2x - 3) + 7 = 3x - (x - 5) \\)",
        ans: "\\( x = 5/3 \\)",
        dist: ["\\( x = 5/4 \\)", "\\( x = -5/3 \\)", "\\( x = 3/5 \\)"],
        exp: "Expand to \\( 8x - 12 + 7 = 2x + 5 \\). Combine terms: \\( 8x - 5 = 2x + 5 \\). Subtract \\( 2x \\) and add 5: \\( 6x = 10 \\). Divide to get \\( x = 10/6 = 5/3 \\)."
      },
      {
        q: "Solve for \\(x\\): \\( \\frac{x-2}{4} - \\frac{x+1}{3} = -2 \\)",
        ans: "\\( x = 14 \\)",
        dist: ["\\( x = -14 \\)", "\\( x = 10 \\)", "\\( x = 34 \\)"],
        exp: "Multiply by LCD (12): \\( 3(x-2) - 4(x+1) = -24 \\). Expand: \\( 3x - 6 - 4x - 4 = -24 \\). Simplify to \\( -x - 10 = -24 \\). Thus \\( -x = -14 \\), so \\( x = 14 \\)."
      },
      {
        q: "Solve for \\(x\\) in terms of the other variables: \\( mx - p = nx + q \\)",
        ans: "\\( x = \\frac{p+q}{m-n} \\)",
        dist: ["\\( x = \\frac{q-p}{m-n} \\)", "\\( x = \\frac{p+q}{n-m} \\)", "\\( x = \\frac{m-n}{p+q} \\)"],
        exp: "Group \\(x\\) terms: \\( mx - nx = p + q \\). Factor out \\(x\\): \\( x(m - n) = p + q \\). Divide by \\( (m-n) \\) to isolate \\(x\\)."
      },
      {
        q: "Solve by factoring: \\( 3x^2 - 14x - 5 = 0 \\)",
        ans: "\\( \\{5, -1/3\\} \\)",
        dist: ["\\( \\{-5, 1/3\\} \\)", "\\( \\{5, 1/3\\} \\)", "\\( \\{-5, -1/3\\} \\)"],
        exp: "Factor into \\( (3x + 1)(x - 5) = 0 \\). Setting each factor to zero gives \\( 3x = -1 \\implies x = -1/3 \\) and \\( x = 5 \\)."
      },
      {
        q: "Solve by factoring: \\( 4x^2 = 25x \\)",
        ans: "\\( \\{0, 25/4\\} \\)",
        dist: ["\\( \\{25/4\\} \\) only", "\\( \\{\\pm 5/2\\} \\)", "\\( \\{0, 5/2\\} \\)"],
        exp: "Move all terms to one side: \\( 4x^2 - 25x = 0 \\). Factor out the GCF: \\( x(4x - 25) = 0 \\). Therefore, \\( x = 0 \\) or \\( x = 25/4 \\). Dividing by \\(x\\) loses the zero solution."
      },
      {
        q: "Solve by factoring: \\( x^2 - 8x + 16 = 0 \\)",
        ans: "\\( \\{4\\} \\) (multiplicity 2)",
        dist: ["\\( \\{\\pm 4\\} \\)", "\\( \\{-4\\} \\)", "\\( \\{8, 2\\} \\)"],
        exp: "This is a perfect square trinomial: \\( (x - 4)^2 = 0 \\). Taking the square root gives \\( x - 4 = 0 \\), so \\( x = 4 \\)."
      },
      {
        q: "Solve using the square root property: \\( 2(x - 3)^2 = 50 \\)",
        ans: "\\( \\{8, -2\\} \\)",
        dist: ["\\( \\{2, -8\\} \\)", "\\( \\{5, -5\\} \\)", "\\( \\{28, -22\\} \\)"],
        exp: "Divide by 2: \\( (x - 3)^2 = 25 \\). Take the square root of both sides (include \\(\\pm\\)): \\( x - 3 = \\pm 5 \\). So \\( x = 3+5 = 8 \\) and \\( x = 3-5 = -2 \\)."
      },
      {
        q: "Find the complex roots: \\( (x + 2)^2 + 36 = 0 \\)",
        ans: "\\( x = -2 \\pm 6i \\)",
        dist: ["\\( x = 2 \\pm 6i \\)", "\\( x = -2 \\pm 36i \\)", "\\( x = \\pm 4i \\)"],
        exp: "Isolate the square: \\( (x + 2)^2 = -36 \\). Taking the square root gives \\( x + 2 = \\pm \\sqrt{-36} = \\pm 6i \\). Subtract 2: \\( x = -2 \\pm 6i \\)."
      },
      {
        q: "Solve using the square root property: \\( 5x^2 + 120 = 0 \\)",
        ans: "\\( x = \\pm 2i\\sqrt{6} \\)",
        dist: ["\\( x = \\pm 2\\sqrt{6} \\)", "\\( x = \\pm 4i\\sqrt{6} \\)", "\\( x = \\pm 24i \\)"],
        exp: "Isolate \\(x^2\\): \\( 5x^2 = -120 \\implies x^2 = -24 \\). Square root: \\( x = \\pm \\sqrt{-24} \\). Simplify the radical: \\( \\pm \\sqrt{4 \\times 6 \\times -1} = \\pm 2i\\sqrt{6} \\)."
      },
      {
        q: "Solve using the quadratic formula: \\( x^2 - 6x + 7 = 0 \\)",
        ans: "\\( x = 3 \\pm \\sqrt{2} \\)",
        dist: ["\\( x = -3 \\pm \\sqrt{2} \\)", "\\( x = 3 \\pm 2\\sqrt{2} \\)", "\\( x = 6 \\pm \\sqrt{2} \\)"],
        exp: "Using the formula: \\( x = \\frac{6 \\pm \\sqrt{36 - 4(1)(7)}}{2} = \\frac{6 \\pm \\sqrt{8}}{2} \\). Simplify \\( \\sqrt{8} = 2\\sqrt{2} \\). Divide by 2 to get \\( 3 \\pm \\sqrt{2} \\)."
      },
      {
        q: "Find the complex roots: \\( 2x^2 - 4x + 5 = 0 \\)",
        ans: "\\( x = 1 \\pm \\frac{i\\sqrt{6}}{2} \\)",
        dist: ["\\( x = -1 \\pm \\frac{i\\sqrt{6}}{2} \\)", "\\( x = 1 \\pm i\\sqrt{6} \\)", "\\( x = 2 \\pm i\\sqrt{6} \\)"],
        exp: "Formula: \\( \\frac{4 \\pm \\sqrt{16 - 4(2)(5)}}{4} = \\frac{4 \\pm \\sqrt{-24}}{4} \\). Simplify \\( \\sqrt{-24} = 2i\\sqrt{6} \\). Divide terms by 4: \\( \\frac{4}{4} \\pm \\frac{2i\\sqrt{6}}{4} = 1 \\pm \\frac{i\\sqrt{6}}{2} \\)."
      },
      {
        q: "For what value of \\( c \\) does \\( x^2 + 8x + c = 0 \\) have exactly one real root?",
        ans: "\\( c = 16 \\)",
        dist: ["\\( c = \\pm 16 \\)", "\\( c = 8 \\)", "\\( c = 4 \\)"],
        exp: "For one real root, the discriminant must be 0. \\( b^2 - 4ac = 0 \\implies 64 - 4(1)(c) = 0 \\implies 4c = 64 \\implies c = 16 \\)."
      },
      {
        q: "To solve \\( x^2 - 5x - 2 = 0 \\) by completing the square, what value must be added to both sides of \\( x^2 - 5x = 2 \\)?",
        ans: "\\( 25/4 \\)",
        dist: ["\\( -25/4 \\)", "\\( 25 \\)", "\\( 5/2 \\)"],
        exp: "Take half of the linear coefficient \\( (-5/2) \\) and square it: \\( (-5/2)^2 = 25/4 \\)."
      },
      {
        q: "Solve by completing the square: \\( x^2 + 4x - 8 = 0 \\)",
        ans: "\\( x = -2 \\pm 2\\sqrt{3} \\)",
        dist: ["\\( x = 2 \\pm 2\\sqrt{3} \\)", "\\( x = -2 \\pm 4\\sqrt{3} \\)", "\\( x = -4 \\pm 2\\sqrt{3} \\)"],
        exp: "Move constant: \\( x^2 + 4x = 8 \\). Add \\( (4/2)^2 = 4 \\) to both sides: \\( x^2 + 4x + 4 = 12 \\). Factor: \\( (x+2)^2 = 12 \\). Square root: \\( x+2 = \\pm \\sqrt{12} = \\pm 2\\sqrt{3} \\). Isolate \\(x\\)."
      },
      {
        q: "Solve the polynomial equation: \\( x^4 - 13x^2 + 36 = 0 \\)",
        ans: "\\( \\{\\pm 3, \\pm 2\\} \\)",
        dist: ["\\( \\{9, 4\\} \\)", "\\( \\{3, 2\\} \\)", "\\( \\{\\pm 9, \\pm 4\\} \\)"],
        exp: "Substitute \\( u = x^2 \\) to get \\( u^2 - 13u + 36 = 0 \\). Factor: \\( (u - 9)(u - 4) = 0 \\). So \\( x^2 = 9 \\) or \\( x^2 = 4 \\). Take the square roots: \\( x = \\pm 3, \\pm 2 \\)."
      },
      {
        q: "Solve using substitution: \\( (x-1)^2 - 5(x-1) - 14 = 0 \\)",
        ans: "\\( \\{8, -1\\} \\)",
        dist: ["\\( \\{7, -2\\} \\)", "\\( \\{6, -3\\} \\)", "\\( \\{-8, 1\\} \\)"],
        exp: "Let \\( u = x-1 \\). The equation is \\( u^2 - 5u - 14 = 0 \\), factoring to \\( (u-7)(u+2) = 0 \\). So \\( u = 7 \\) or \\( u = -2 \\). Substitute back: \\( x-1 = 7 \\implies x=8 \\) and \\( x-1 = -2 \\implies x=-1 \\)."
      },
      {
        q: "Solve the radical equation: \\( \\sqrt{3x + 7} = x + 1 \\)",
        ans: "\\( x = 3 \\)",
        dist: ["\\( x = \\{3, -2\\} \\)", "\\( x = -2 \\)", "No solution"],
        exp: "Square both sides: \\( 3x + 7 = x^2 + 2x + 1 \\). Rearrange: \\( x^2 - x - 6 = 0 \\). Factor: \\( (x-3)(x+2) = 0 \\). Check roots: If \\( x=-2 \\), \\( \\sqrt{1} = -1 \\) (False, extraneous). Only \\( x=3 \\) works."
      },
      {
        q: "Solve the rational equation: \\( \\frac{2x}{x-1} + \\frac{1}{x} = 2 \\)",
        ans: "\\( x = 1/3 \\)",
        dist: ["\\( x = -1/3 \\)", "\\( x = 3 \\)", "No solution"],
        exp: "Multiply by LCD \\( x(x-1) \\): \\( 2x(x) + 1(x-1) = 2x(x-1) \\). Expand: \\( 2x^2 + x - 1 = 2x^2 - 2x \\). Cancel \\( 2x^2 \\) to get \\( x - 1 = -2x \\). Thus \\( 3x = 1 \\implies x = 1/3 \\)."
      },
      {
        q: "The length of a rectangle is 7 meters more than its width. The area is 60 square meters. Find the width \\( w \\).",
        ans: "\\( w = 5 \\text{ m} \\)",
        dist: ["\\( w = 12 \\text{ m} \\)", "\\( w = \\{-12, 5\\} \\text{ m} \\)", "\\( w = 7 \\text{ m} \\)"],
        exp: "Area equation: \\( w(w+7) = 60 \\implies w^2 + 7w - 60 = 0 \\). Factor: \\( (w+12)(w-5) = 0 \\). Width cannot be negative (extraneous \\(-12\\)), so \\( w = 5 \\)."
      },
      {
        q: "A projectile's height is given by \\( h = -16t^2 + 64t + 80 \\). At what time \\( t > 0 \\) does it hit the ground (\\(h=0\\))?",
        ans: "\\( t = 5 \\text{ sec} \\)",
        dist: ["\\( t = 1 \\text{ sec} \\)", "\\( t = \\{5, -1\\} \\text{ sec} \\)", "\\( t = 4 \\text{ sec} \\)"],
        exp: "Set \\( h = 0 \\) and divide by -16: \\( t^2 - 4t - 5 = 0 \\). Factor: \\( (t-5)(t+1) = 0 \\). Time must be positive, so \\( t = 5 \\)."
      }
    ];

    // ── Engine Variables ──
    const LETTERS = ['A', 'B', 'C', 'D'];
    let score = 0;
    let streak = 0;
    let currIdx = 0;
    let timeRem = 60;
    let tInterval = null;
    let qLocked = false;
    let shuffledQ = [];

    // ── Helper: Fisher-Yates Shuffle ──
    function shuffle(array) {
      let cur = array.length, rand;
      while (cur !== 0) {
        rand = Math.floor(Math.random() * cur);
        cur--;
        [array[cur], array[rand]] = [array[rand], array[cur]];
      }
      return array;
    }

    // ── Initialization ──
    function init() {
      // Shuffle questions array
      shuffledQ = shuffle([...rawQuestions]);
      renderQuestion();
    }

    function renderQuestion() {
      qLocked = false;
      timeRem = 60;
      
      const q = shuffledQ[currIdx];
      
      // Update UI Header
      document.getElementById('qCountDisplay').innerText = `Question ${currIdx + 1} of ${shuffledQ.length}`;
      
      // Prep Options
      let opts = [ { t: q.ans, c: true }, ...q.dist.map(d => ({ t: d, c: false })) ];
      opts = shuffle(opts);

      let optsHtml = '';
      opts.forEach((o, i) => {
        optsHtml += `
          <label class="choice" id="choice-${i}">
            <input type="radio" name="qRad" value="${i}" data-cor="${o.c}">
            <div class="choice-letter">${LETTERS[i]}</div>
            <div class="choice-text">${o.t}</div>
          </label>
        `;
      });

      document.getElementById('qPrompt').innerHTML = q.q;
      document.getElementById('qOpts').innerHTML = optsHtml;
      
      // Hide feedback and next button
      document.getElementById('fbBox').classList.remove('show');
      document.getElementById('btnNext').style.display = 'none';
      document.getElementById('qCard').className = 'card';

      // Attach Click Listeners to custom radios
      document.querySelectorAll('.choice').forEach((el, i) => {
        el.addEventListener('click', (e) => {
          if (qLocked) { e.preventDefault(); return; }
          el.querySelector('input').checked = true;
          processAnswer(i, opts[i].c);
        });
      });

      // Typeset newly injected MathJax
      if (window.MathJax) {
        MathJax.typesetPromise([document.getElementById('qCard')]).catch(err => console.log(err));
      }

      startTimer();
    }

    // ── Timer Logic ──
    function startTimer() {
      clearInterval(tInterval);
      updateTimerUI();
      
      tInterval = setInterval(() => {
        timeRem--;
        updateTimerUI();
        if (timeRem <= 0) {
          clearInterval(tInterval);
          processAnswer(-1, false); // Timeout
        }
      }, 1000);
    }

    function updateTimerUI() {
      document.getElementById('timeText').innerText = `${timeRem}s`;
      const bar = document.getElementById('tBar');
      bar.style.width = `${(timeRem / 60) * 100}%`;
      
      if (timeRem <= 10) bar.className = 'timer-bar danger';
      else if (timeRem <= 25) bar.className = 'timer-bar warn';
      else bar.className = 'timer-bar';
    }

    // ── Game Logic & Feedback ──
    function processAnswer(selIdx, isCor) {
      if (qLocked) return;
      qLocked = true;
      clearInterval(tInterval);

      const q = shuffledQ[currIdx];
      const card = document.getElementById('qCard');
      const radios = document.getElementsByName('qRad');

      // Disable inputs & lock visual states
      document.querySelectorAll('.choice').forEach((el, i) => {
        el.classList.add('locked');
        if (i !== selIdx && !radios[i].dataset.cor.includes("true")) {
          el.classList.add('dim');
        }
        // Highlight correct answer no matter what
        if (radios[i].dataset.cor === "true") {
          el.classList.add('cor-ans');
          el.classList.remove('dim');
        }
      });

      // Score Calculation
      let pointsDelta = 0;
      let fbHead = "";

      if (isCor) {
        // Base + Speed + Streak
        let base = 100;
        let speedBonus = timeRem;
        let mult = (streak >= 2) ? 1.5 : 1.0; 
        
        pointsDelta = Math.floor((base + speedBonus) * mult);
        score += pointsDelta;
        streak++;
        
        fbHead = "CORRECT";
        card.classList.add('celebrate');
        showFloatText(`+${pointsDelta}`, 'pos');

      } else {
        // Brutal penalty, break streak
        pointsDelta = -50;
        score += pointsDelta;
        streak = 0;
        
        fbHead = selIdx === -1 ? "TIME EXPIRED" : "INCORRECT";
        card.classList.add('shake');
        
        if (selIdx !== -1) {
          document.getElementById(`choice-${selIdx}`).classList.add('wr-ans');
        }
        showFloatText(`${pointsDelta}`, 'neg');
      }

      // Update HUD
      updateHUD();

      // Show Feedback Box
      const fbBox = document.getElementById('fbBox');
      const fbHeader = document.getElementById('fbHeader');
      const fbText = document.getElementById('fbText');

      fbHeader.innerText = fbHead;
      fbHeader.className = 'fb-header ' + (isCor ? 'ok' : 'no');
      
      // Breakdown score text
      let scoreBreakdown = isCor ? `<br><span style="font-size:0.85rem; color:var(--text-muted);">Base: 100 | Speed: +${timeRem} | Mult: x${(streak>2)?1.5:1.0}</span>` : '';
      
      fbText.innerHTML = `<strong>Explanation:</strong> ${q.exp} ${scoreBreakdown}`;
      fbBox.classList.add('show');

      // Show Next Button
      document.getElementById('btnNext').style.display = 'block';

      // Typeset feedback
      if (window.MathJax) {
        MathJax.typesetPromise([fbBox]).catch(e => console.log(e));
      }
    }

    function updateHUD() {
      // Score
      const sDisp = document.getElementById('scoreDisplay');
      sDisp.innerText = score;
      if (score < 0) sDisp.style.color = "var(--danger)";
      else sDisp.style.color = "var(--text)";

      // Streak
      const strkDisp = document.getElementById('streakDisplay');
      strkDisp.innerText = `🔥 x${streak}`;
      if (streak >= 3) {
        strkDisp.classList.add('active');
      } else {
        strkDisp.classList.remove('active');
      }
    }

    function showFloatText(txt, type) {
      const floatEl = document.getElementById('scoreFloat');
      // Reset animation
      floatEl.style.animation = 'none';
      floatEl.offsetHeight; // trigger reflow
      
      floatEl.innerText = txt;
      floatEl.className = `float-text float-${type}`;
    }

    function nextQuestion() {
      currIdx++;
      if (currIdx < shuffledQ.length) {
        renderQuestion();
      } else {
        showEndScreen();
      }
    }

    function showEndScreen() {
      document.getElementById('quizArea').style.display = 'none';
      const endScreen = document.getElementById('endScreen');
      endScreen.style.display = 'block';
      
      const fs = document.getElementById('finalScore');
      fs.innerText = score;
      if (score < 0) fs.style.color = "var(--danger)";
    }

    // Start
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
