<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveSTEM: Written Articulation Exam</title>
  <meta name="description" content="Keyword-graded written articulation drill for functions.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']], processEscapes: true },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
      chtml: { scale: 1.05 },
      startup: { ready: () => { MathJax.startup.defaultReady(); } }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #F4F7FB;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --success: #10B981;
      --success-light: #ECFDF5;
      --danger: #EF4444;
      --danger-light: #FEF2F2;
      --warning: #F59E0B;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
    h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }

    /* ── Header ── */
    header { background: var(--card); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
    .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .brand span { color: var(--text); }

    .hud { display: flex; gap: 2rem; align-items: center; }
    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; }
    .stat-value { font-size: 1.75rem; font-weight: 800; font-family: 'Outfit', sans-serif; font-variant-numeric: tabular-nums; transition: color 0.3s; }
    
    .score-box { color: var(--primary); position: relative; }
    .float-text { position: absolute; top: 0; right: 0; font-weight: 800; font-size: 1.5rem; pointer-events: none; opacity: 0; z-index: 50; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.2); } }
    .float-pos { color: var(--success); animation: floatUp 1s ease-out forwards; }
    .float-neg { color: var(--danger); animation: floatUp 1s ease-out forwards; }

    main { flex: 1; width: 100%; max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; }

    /* ── Timer ── */
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: 700; color: var(--text-muted); }
    .timer-container { width: 100%; height: 12px; background: #E2E8F0; border-radius: 6px; overflow: hidden; margin-bottom: 2rem; }
    .timer-bar { height: 100%; width: 100%; background: var(--success); transition: width 1s linear, background-color 0.3s ease; }
    .timer-bar.warn { background: var(--warning); }
    .timer-bar.danger { background: var(--danger); }

    /* ── Card ── */
    .card { background: var(--card); border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow); position: relative; margin-bottom: 2rem;}
    .q-prompt { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }

    textarea { width: 100%; height: 180px; padding: 1.25rem; border: 2px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1.05rem; resize: vertical; margin-bottom: 1rem; transition: all 0.2s; color: var(--text); line-height: 1.5;}
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    textarea:disabled { background: var(--bg); color: var(--text-muted); cursor: not-allowed; }

    .warn-msg { color: var(--danger); font-size: 0.9rem; font-weight: 700; margin-bottom: 1rem; display: none; }

    .btn { width: 100%; padding: 1.25rem; font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 800; color: white; background: var(--primary); border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3); }
    .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
    .btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── Feedback Area ── */
    .feedback-area { display: none; margin-top: 2rem; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .keyword-panel { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .keyword-panel h3 { font-size: 1rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 0.05em;}
    
    .kw-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .kw-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--card); border-radius: 6px; border-left: 4px solid var(--danger); }
    .kw-item.found { border-left-color: var(--success); background: var(--success-light); }
    .kw-name { font-weight: 700; font-size: 1.05rem; }
    .kw-status { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; }
    .kw-item.found .kw-status { color: var(--success); }
    .kw-item:not(.found) .kw-status { color: var(--danger); }

    .exemplar-box { background: var(--success-light); border: 2px solid var(--success); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .exemplar-box h3 { font-size: 1rem; text-transform: uppercase; color: var(--success); margin-bottom: 0.5rem; }

    .btn-next { background: var(--success); box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3); }
    .btn-next:hover { background: #047857; box-shadow: 0 6px 20px rgba(5, 150, 105, 0.4); }

    /* ── End Screen ── */
    .end-screen { background: var(--card); border-radius: var(--radius); padding: 4rem 2rem; text-align: center; box-shadow: var(--shadow); display: none; }
    .end-title { font-size: 2.5rem; color: var(--text); margin-bottom: 1rem; }
    .end-score { font-size: 5rem; font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 1rem; }

    @media (max-width: 600px) {
      header { padding: 1rem; flex-direction: column; gap: 1rem; }
      .hud { width: 100%; justify-content: space-between; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">Active<span>STEM</span></div>
    <div class="hud">
      <div class="stat">
        <span class="stat-label">Articulation Score</span>
        <div class="score-box">
          <span class="stat-value" id="scoreDisplay">0</span>
          <div id="scoreFloat" class="float-text"></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="quizArea">
      <div class="progress-header">
        <span id="qCountDisplay">Question 1 of 5</span>
        <span id="timeText">30:00</span>
      </div>
      <div class="timer-container">
        <div class="timer-bar" id="tBar"></div>
      </div>

      <div class="card">
        <div class="q-prompt" id="qPrompt"></div>
        <textarea id="studentInput" placeholder="Explain your mathematical reasoning here. Be sure to use proper terminology..."></textarea>
        <div class="warn-msg" id="wMsg">You must write an explanation before locking your answer.</div>
        
        <button class="btn" id="btnSubmit" onclick="gradeResponse()">Lock & Evaluate</button>

        <div class="feedback-area" id="feedbackArea">
          <div class="keyword-panel">
            <h3>Keyword Analysis Engine</h3>
            <div class="kw-list" id="kwList"></div>
          </div>
          
          <div class="exemplar-box">
            <h3>Exemplar Answer</h3>
            <div id="modelText" style="line-height: 1.6;"></div>
          </div>

          <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">Next Question &rarr;</button>
        </div>
      </div>
    </div>

    <div class="end-screen" id="endScreen">
      <h2 class="end-title" id="endTitle">Exam Complete!</h2>
      <div class="end-score" id="finalScore">0</div>
      <div style="color: var(--text-muted); font-size: 1.2rem; font-weight: 700; text-transform: uppercase;">Total Points Earned</div>
      <button class="btn" style="width:auto; padding: 1rem 3rem; margin-top:2rem;" onclick="location.reload()">Restart Exam</button>
    </div>
  </main>

  <script>
    // ── Database: Keyword-Driven Articulation ──
    const db = [
      {
        q: "Explain, step-by-step, how to find the domain of the rational function \\( f(x) = \\frac{2x + 1}{x^2 - 16} \\). What is the final domain in interval notation?",
        model: "The rule for rational functions is that the **denominator cannot equal zero**. Set the denominator equal to zero and factor: \\( (x - 4)(x + 4) = 0 \\). This means \\( x \\) cannot be 4 or -4. The domain must **exclude** these values using open **parentheses**: \\( (-\\infty, -4) \\cup (-4, 4) \\cup (4, \\infty) \\).",
        keywords: [
          { concept: "Identify target area", terms: ["denominator", "bottom"] },
          { concept: "State the rule", terms: ["zero", "0"] },
          { concept: "Exclude the values", terms: ["exclude", "cannot equal", "not equal", "restriction", "parentheses", "open"] }
        ]
      },
      {
        q: "Explain the general rule for finding the domain of a radical function like \\( g(x) = \\sqrt{2x + 10} \\). How does interval notation reflect this?",
        model: "The expression inside the square root (the **radicand**) must be **greater than or equal to zero** to produce a real number. We set \\( 2x + 10 \\ge 0 \\) and solve to get \\( x \\ge -5 \\). Because -5 is included, we use a closed **bracket** in interval notation: \\( [-5, \\infty) \\).",
        keywords: [
          { concept: "Identify target area", terms: ["radicand", "inside", "under"] },
          { concept: "State the rule", terms: ["greater", "positive", ">= 0"] },
          { concept: "Interval notation rule", terms: ["bracket", "closed", "include"] }
        ]
      },
      {
        q: "Let \\( h(x) = -2x^2 + 5x \\). Explain the order of operations required to properly evaluate \\( h(-3) \\).",
        model: "First, **substitute** -3 into the equation using **parentheses**: \\( -2(-3)^2 + 5(-3) \\). According to PEMDAS, evaluate the **exponent** first to get 9. Then **multiply** the coefficients: -2(9) = -18 and 5(-3) = -15. Finally, combine them.",
        keywords: [
          { concept: "Input method", terms: ["substitute", "plug", "replace"] },
          { concept: "Formatting", terms: ["parentheses", "bracket"] },
          { concept: "First mathematical step", terms: ["exponent", "square", "power", "pemdas"] }
        ]
      },
      {
        q: "Explain what the Vertical Line Test is and what it proves about a graph.",
        model: "The Vertical Line Test proves whether a graph represents a valid **function**. You draw vertical lines through the graph; if any line **intersects** the graph more than **once**, it means a single x-value (input) has multiple y-values (outputs), so it is not a function.",
        keywords: [
          { concept: "What it proves", terms: ["function"] },
          { concept: "The action", terms: ["intersect", "cross", "touch", "pass"] },
          { concept: "The condition", terms: ["once", "one point", "multiple", "more than one"] }
        ]
      },
      {
        q: "Why do polynomial functions (like \\( p(x) = x^3 - 4x + 1 \\)) have a domain of all real numbers?",
        model: "Polynomial functions have no variables in the **denominator** (so there is no risk of dividing by zero) and no variables inside a **square root** or radical (so there is no risk of imaginary numbers). Therefore, there are no mathematical **restrictions**.",
        keywords: [
          { concept: "No division risk", terms: ["denominator", "divide", "fraction", "bottom"] },
          { concept: "No radical risk", terms: ["square root", "radical", "even root"] },
          { concept: "Conclusion", terms: ["restriction", "limit", "all real numbers", "infinity"] }
        ]
      }
    ];

    const EXAM_TIME_SECONDS = 1800; // 30 minutes
    let score = 0;
    let currIdx = 0;
    let globalTimeRem = EXAM_TIME_SECONDS;
    let tInterval = null;
    let examLocked = false;

    function init() {
      updateHUD();
      renderQuestion();
      startGlobalTimer();
    }

    function renderQuestion() {
      if (examLocked) return;
      const q = db[currIdx];

      document.getElementById('qCountDisplay').innerText = `Question ${currIdx + 1} of ${db.length}`;
      document.getElementById('qPrompt').innerHTML = q.q;
      
      const txt = document.getElementById('studentInput');
      txt.value = "";
      txt.disabled = false;
      
      document.getElementById('btnSubmit').style.display = 'block';
      document.getElementById('btnNext').style.display = 'none';
      document.getElementById('feedbackArea').style.display = 'none';
      document.getElementById('wMsg').style.display = 'none';

      if (window.MathJax) MathJax.typesetPromise();
    }

    function startGlobalTimer() {
      clearInterval(tInterval);
      updateTimerUI();
      
      tInterval = setInterval(() => {
        globalTimeRem--;
        if (globalTimeRem < 0) globalTimeRem = 0;
        updateTimerUI();

        if (globalTimeRem <= 0) {
          clearInterval(tInterval);
          examLocked = true;
          // Force grade whatever is in the box
          gradeResponse(true);
        }
      }, 1000);
    }

    function updateTimerUI() {
      let m = Math.floor(globalTimeRem / 60);
      let s = (globalTimeRem % 60).toString().padStart(2, '0');
      document.getElementById('timeText').innerText = `${m}:${s}`;
      
      const bar = document.getElementById('tBar');
      bar.style.width = `${(globalTimeRem / EXAM_TIME_SECONDS) * 100}%`;
      if (globalTimeRem <= 300) bar.className = 'timer-bar danger'; 
      else if (globalTimeRem <= 900) bar.className = 'timer-bar warn'; 
      else bar.className = 'timer-bar';
    }

    function gradeResponse(isTimeout = false) {
      if (examLocked && !isTimeout) return;
      
      const txtEl = document.getElementById('studentInput');
      const ans = txtEl.value.trim().toLowerCase();
      const wMsg = document.getElementById('wMsg');

      if (ans === "" && !isTimeout) {
        wMsg.style.display = "block";
        return;
      }
      wMsg.style.display = "none";
      txtEl.disabled = true;

      const q = db[currIdx];
      let pointsEarned = 0;
      const pointsPerKeyword = 20; 

      let kwHtml = '';

      q.keywords.forEach(kwObj => {
        // Check if ANY of the synonymous terms exist in the student's answer
        const found = kwObj.terms.some(term => ans.includes(term.toLowerCase()));
        
        if (found) {
          pointsEarned += pointsPerKeyword;
          kwHtml += `
            <div class="kw-item found">
              <span class="kw-name">${kwObj.concept}</span>
              <span class="kw-status">✓ Detected</span>
            </div>`;
        } else {
          kwHtml += `
            <div class="kw-item">
              <span class="kw-name">${kwObj.concept}</span>
              <span class="kw-status">✗ Missing</span>
            </div>`;
        }
      });

      // Update Score
      score += pointsEarned;
      updateHUD();
      showFloatText(`+${pointsEarned}`, 'pos');

      // Update UI
      document.getElementById('btnSubmit').style.display = 'none';
      document.getElementById('kwList').innerHTML = kwHtml;
      document.getElementById('modelText').innerHTML = q.model;
      document.getElementById('feedbackArea').style.display = 'block';

      const nxtBtn = document.getElementById('btnNext');
      if (isTimeout) nxtBtn.innerText = "View Final Results →";
      nxtBtn.style.display = 'block';

      if (window.MathJax) MathJax.typesetPromise([document.getElementById('feedbackArea')]);
    }

    function updateHUD() {
      document.getElementById('scoreDisplay').innerText = score;
    }

    function showFloatText(txt, type) {
      const floatEl = document.getElementById('scoreFloat');
      floatEl.style.animation = 'none';
      floatEl.offsetHeight; 
      floatEl.innerText = txt;
      floatEl.className = `float-text float-${type}`;
    }

    function nextQuestion() {
      if (examLocked) {
        showEndScreen(true);
        return;
      }
      
      currIdx++;
      if (currIdx < db.length) renderQuestion();
      else showEndScreen(false);
    }

    function showEndScreen(fromTimeout = false) {
      clearInterval(tInterval);
      document.getElementById('quizArea').style.display = 'none';
      const endScreen = document.getElementById('endScreen');
      endScreen.style.display = 'block';
      
      if (fromTimeout) {
         document.getElementById('endTitle').innerText = "Time Expired!";
         document.getElementById('endTitle').style.color = "var(--danger)";
      }
      document.getElementById('finalScore').innerText = score;
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
