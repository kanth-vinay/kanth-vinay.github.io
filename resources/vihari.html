<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveSTEM: Quadratic Mastery Drill (Advanced)</title>
  <meta name="description" content="Gamified high-stakes drill for solving advanced quadratic equations with complex numbers.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      chtml: { scale: 1.05 },
      startup: {
        ready: () => {
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #F4F7FB;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --success-light: #ECFDF5;
      --danger: #EF4444;
      --danger-light: #FEF2F2;
      --warning: #F59E0B;
      --radius: 16px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }

    /* ── Header & Gamified HUD ── */
    header {
      background: var(--card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .brand span { color: var(--text); }

    .hud {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .score-box { color: var(--primary); position: relative; }
    .streak-box { color: var(--text-muted); transition: all 0.3s ease; }
    .streak-box.active { color: var(--warning); transform: scale(1.1); text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }

    /* Floating Score Animation */
    .float-text {
      position: absolute;
      top: 0;
      right: 0;
      font-weight: 800;
      font-size: 1.5rem;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
    }
    .float-pos { color: var(--success); animation: floatUp 1s ease-out forwards; }
    .float-neg { color: var(--danger); animation: floatUp 1s ease-out forwards; }

    /* ── Main Layout ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress & Timer ── */
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    
    .timer-container {
      width: 100%;
      height: 12px;
      background: #E2E8F0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }
    
    .timer-bar {
      height: 100%;
      width: 100%;
      background: var(--success);
      border-radius: 6px;
      transition: width 1s linear, background-color 0.3s ease;
    }
    .timer-bar.warn { background: var(--warning); }
    .timer-bar.danger { background: var(--danger); }

    /* ── Question Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    .card.shake { animation: shake 0.4s ease-in-out; border-color: var(--danger); }
    .card.celebrate { border-color: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }

    .q-prompt {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .choice {
      display: flex;
      align-items: center;
      padding: 1.25rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1.05rem;
      font-weight: 600;
    }
    .choice:hover:not(.locked) {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
    }
    .choice input { display: none; }
    
    .choice-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--border);
      color: var(--text-muted);
      font-weight: 800;
      margin-right: 1rem;
      transition: all 0.2s;
    }

    .choice:hover:not(.locked) .choice-letter {
      background: var(--primary);
      color: white;
    }

    /* Locked States */
    .choice.locked { cursor: default; }
    .choice.dim { opacity: 0.5; filter: grayscale(1); }
    
    .choice.cor-ans {
      background: var(--success-light);
      border-color: var(--success);
      color: var(--success);
    }
    .choice.cor-ans .choice-letter { background: var(--success); color: white; }

    .choice.wr-ans {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }
    .choice.wr-ans .choice-letter { background: var(--danger); color: white; }

    /* ── Feedback & Next Button ── */
    .feedback {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      background: var(--bg);
      display: none;
      animation: fadeInDown 0.3s ease forwards;
    }
    .feedback.show { display: block; }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fb-header {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .fb-header.ok { color: var(--success); }
    .fb-header.no { color: var(--danger); }
    
    .fb-text { color: var(--text); font-size: 1rem; }

    .btn-next {
      margin-top: 2rem;
      width: 100%;
      padding: 1.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }
    .btn-next:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }

    /* ── End Screen ── */
    .end-screen {
      background: var(--card);
      border-radius: var(--radius);
      padding: 4rem 2rem;
      text-align: center;
      box-shadow: var(--shadow);
      display: none;
    }
    .end-title { font-size: 2.5rem; color: var(--text); margin-bottom: 1rem; }
    .end-score { font-size: 5rem; font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 1rem; }
    .end-subtitle { font-size: 1.25rem; color: var(--text-muted); font-weight: 600; }

    @media (max-width: 600px) {
      header { padding: 1rem; flex-direction: column; gap: 1rem; }
      .hud { width: 100%; justify-content: space-between; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">Active<span>STEM</span></div>
    <div class="hud">
      <div class="stat">
        <span class="stat-label">Streak</span>
        <span class="stat-value streak-box" id="streakDisplay">🔥 x0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Score</span>
        <div class="score-box">
          <span class="stat-value" id="scoreDisplay">0</span>
          <div id="scoreFloat" class="float-text"></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="quizArea">
      <div class="progress-header">
        <span id="qCountDisplay">Question 1 of 20</span>
        <span id="timeText">3:00</span>
      </div>
      <div class="timer-container">
        <div class="timer-bar" id="tBar"></div>
      </div>

      <div class="card" id="qCard">
        <div class="q-prompt" id="qPrompt"></div>
        <div class="options" id="qOpts"></div>
        
        <div class="feedback" id="fbBox">
          <div class="fb-header" id="fbHeader"></div>
          <div class="fb-text" id="fbText"></div>
        </div>

        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next Question &rarr;</button>
      </div>
    </div>

    <div class="end-screen" id="endScreen">
      <h2 class="end-title">Drill Complete!</h2>
      <div class="end-score" id="finalScore">0</div>
      <div class="end-subtitle">Great execution discipline.</div>
      <button class="btn-next" style="display:inline-block; width:auto; padding: 1rem 3rem; margin-top:2rem;" onclick="resetQuiz()">Attempt Again</button>
    </div>
  </main>

  <script>
    // ── Algebra 2 Quadratic Equation Database ──
    const rawQuestions = [
      {
        q: "Solve by taking square roots: \\( x^2 - 16 = 0 \\)",
        ans: "\\( \\{\\pm 4\\} \\)",
        dist: ["\\( \\{4\\} \\) only", "\\( \\{\\pm 8\\} \\)", "\\( \\{-4\\} \\) only"],
        exp: "Add 16 to both sides: \\( x^2 = 16 \\). When taking the square root, you must include both the positive and negative root. Therefore, \\( x = \\pm 4 \\)."
      },
      {
        q: "Find the complex roots by taking square roots: \\( x^2 + 25 = 0 \\)",
        ans: "\\( \\{\\pm 5i\\} \\)",
        dist: ["\\( \\{\\pm 5\\} \\)", "\\( \\{5i\\} \\) only", "\\( \\{\\pm 25i\\} \\)"],
        exp: "Subtract 25 from both sides: \\( x^2 = -25 \\). Take the square root: \\( x = \\pm \\sqrt{-25} \\). Since \\( \\sqrt{-1} = i \\), the solution is \\( x = \\pm 5i \\)."
      },
      {
        q: "Find the complex roots: \\( 4x^2 + 36 = 0 \\)",
        ans: "\\( \\{\\pm 3i\\} \\)",
        dist: ["\\( \\{\\pm 9i\\} \\)", "\\( \\{\\pm 3\\} \\)", "\\( \\{\\pm 6i\\} \\)"],
        exp: "Subtract 36: \\( 4x^2 = -36 \\). Divide by 4: \\( x^2 = -9 \\). Taking the square root gives \\( x = \\pm \\sqrt{-9} = \\pm 3i \\)."
      },
      {
        q: "Solve by factoring: \\( x^2 - 7x + 10 = 0 \\)",
        ans: "\\( \\{2, 5\\} \\)",
        dist: ["\\( \\{-2, -5\\} \\)", "\\( \\{-2, 5\\} \\)", "\\( \\{1, 10\\} \\)"],
        exp: "Find two numbers that multiply to 10 and add to -7. Those numbers are -2 and -5. Factor into \\( (x - 2)(x - 5) = 0 \\). Setting each to zero yields \\( x = 2 \\) and \\( x = 5 \\)."
      },
      {
        q: "Solve by factoring: \\( 2x^2 + 5x - 3 = 0 \\)",
        ans: "\\( \\{1/2, -3\\} \\)",
        dist: ["\\( \\{-1/2, 3\\} \\)", "\\( \\{3/2, -1\\} \\)", "\\( \\{-3/2, 1\\} \\)"],
        exp: "Using grouping or trial and error, this factors to \\( (2x - 1)(x + 3) = 0 \\). Set each factor to zero: \\( 2x - 1 = 0 \\implies x = 1/2 \\), and \\( x + 3 = 0 \\implies x = -3 \\)."
      },
      {
        q: "Solve the radical equation: \\( \\sqrt{x + 6} = x \\)",
        ans: "\\( \\{3\\} \\)",
        dist: ["\\( \\{-2, 3\\} \\)", "\\( \\{-2\\} \\)", "No solution"],
        exp: "Square both sides: \\( x + 6 = x^2 \\). Set to zero: \\( x^2 - x - 6 = 0 \\). Factor: \\( (x - 3)(x + 2) = 0 \\). You MUST check for extraneous solutions. If \\( x = -2 \\), \\( \\sqrt{4} = -2 \\) is false. So only \\( x = 3 \\) is valid."
      },
      {
        q: "To solve \\( x^2 - 10x = 4 \\) by completing the square, what value must be added to both sides of the equation?",
        ans: "25",
        dist: ["100", "-25", "5"],
        exp: "Take half of the \\(b\\)-coefficient (-10) and square it: \\( (-10 / 2)^2 = (-5)^2 = 25 \\)."
      },
      {
        q: "Solve by completing the square: \\( x^2 + 6x - 7 = 0 \\)",
        ans: "\\( \\{1, -7\\} \\)",
        dist: ["\\( \\{-1, 7\\} \\)", "\\( \\{3 \\pm \\sqrt{7}\\} \\)", "\\( \\{-3 \\pm \\sqrt{16}\\} \\)"],
        exp: "Move the 7: \\( x^2 + 6x = 7 \\). Add \\( (6/2)^2 = 9 \\) to both sides: \\( x^2 + 6x + 9 = 16 \\). Factor to \\( (x + 3)^2 = 16 \\). Square root: \\( x + 3 = \\pm 4 \\). So \\( x = -3 \\pm 4 \\), giving 1 and -7."
      },
      {
        q: "Solve by completing the square: \\( x^2 - 4x - 1 = 0 \\)",
        ans: "\\( \\{2 \\pm \\sqrt{5}\\} \\)",
        dist: ["\\( \\{-2 \\pm \\sqrt{5}\\} \\)", "\\( \\{2 \\pm \\sqrt{3}\\} \\)", "\\( \\{4 \\pm \\sqrt{5}\\} \\)"],
        exp: "Move the 1: \\( x^2 - 4x = 1 \\). Add \\( (-4/2)^2 = 4 \\) to both sides: \\( x^2 - 4x + 4 = 5 \\). Factor to \\( (x - 2)^2 = 5 \\). Square root: \\( x - 2 = \\pm \\sqrt{5} \\). Isolate x: \\( x = 2 \\pm \\sqrt{5} \\)."
      },
      {
        q: "Use the quadratic formula to solve: \\( x^2 - 3x - 4 = 0 \\)",
        ans: "\\( \\{4, -1\\} \\)",
        dist: ["\\( \\{-4, 1\\} \\)", "\\( \\{4, 1\\} \\)", "\\( \\{-4, -1\\} \\)"],
        exp: "\\( x = \\frac{-(-3) \\pm \\sqrt{(-3)^2 - 4(1)(-4)}}{2(1)} \\). Simplify the radical: \\( \\sqrt{9 + 16} = \\sqrt{25} = 5 \\). The solutions are \\( \\frac{3 \\pm 5}{2} \\), which are 4 and -1."
      },
      {
        q: "Use the quadratic formula to find the complex roots: \\( x^2 - 2x + 5 = 0 \\)",
        ans: "\\( \\{1 \\pm 2i\\} \\)",
        dist: ["\\( \\{-1 \\pm 2i\\} \\)", "\\( \\{1 \\pm 4i\\} \\)", "\\( \\{2 \\pm 2i\\} \\)"],
        exp: "\\( x = \\frac{-(-2) \\pm \\sqrt{(-2)^2 - 4(1)(5)}}{2(1)} = \\frac{2 \\pm \\sqrt{4 - 20}}{2} = \\frac{2 \\pm \\sqrt{-16}}{2} \\). Simplify the radical to \\( 4i \\). Divide by 2 to get \\( 1 \\pm 2i \\)."
      },
      {
        q: "Use the quadratic formula to solve: \\( 3x^2 - 5x + 1 = 0 \\)",
        ans: "\\( \\frac{5 \\pm \\sqrt{13}}{6} \\)",
        dist: ["\\( \\frac{-5 \\pm \\sqrt{13}}{6} \\)", "\\( \\frac{5 \\pm \\sqrt{37}}{6} \\)", "\\( \\frac{5 \\pm \\sqrt{13}}{3} \\)"],
        exp: "\\( x = \\frac{-(-5) \\pm \\sqrt{(-5)^2 - 4(3)(1)}}{2(3)} = \\frac{5 \\pm \\sqrt{25 - 12}}{6} = \\frac{5 \\pm \\sqrt{13}}{6} \\)."
      },
      {
        q: "Calculate the Discriminant and determine the nature of the roots for: \\( x^2 - 5x + 2 = 0 \\)",
        ans: "Discriminant = 17; Two real, irrational roots",
        dist: ["Discriminant = 17; Two complex roots", "Discriminant = -17; Two complex roots", "Discriminant = 33; Two real roots"],
        exp: "Discriminant is \\( b^2 - 4ac = (-5)^2 - 4(1)(2) = 25 - 8 = 17 \\). Since 17 is positive and not a perfect square, there are two real irrational roots."
      },
      {
        q: "Determine the nature of the roots for: \\( x^2 - 12x + 36 = 0 \\)",
        ans: "Discriminant = 0; One real root (repeated)",
        dist: ["Discriminant = 144; Two real roots", "Discriminant = 0; Two complex roots", "Discriminant = -144; Two complex roots"],
        exp: "Discriminant is \\( (-12)^2 - 4(1)(36) = 144 - 144 = 0 \\). A discriminant of exactly zero means there is only one real solution."
      },
      {
        q: "Calculate the Discriminant and determine the nature of the roots for: \\( 2x^2 + x + 3 = 0 \\)",
        ans: "Discriminant = -23; Two complex roots",
        dist: ["Discriminant = 25; Two real roots", "Discriminant = -23; One real root", "Discriminant = 23; Two real roots"],
        exp: "Discriminant is \\( 1^2 - 4(2)(3) = 1 - 24 = -23 \\). Since the discriminant is negative, there are no real solutions, meaning there are two complex roots."
      },
      {
        q: "For what values of \\( k \\) will the equation \\( x^2 + kx + 16 = 0 \\) have exactly one real root?",
        ans: "\\( k = \\pm 8 \\)",
        dist: ["\\( k = 8 \\) only", "\\( k = \\pm 4 \\)", "\\( k = 16 \\)"],
        exp: "For one real root, the discriminant must be 0. \\( k^2 - 4(1)(16) = 0 \\implies k^2 - 64 = 0 \\implies k^2 = 64 \\implies k = \\pm 8 \\)."
      },
      {
        q: "Write a quadratic equation in standard form with the roots \\( x = 2 \\) and \\( x = -3 \\).",
        ans: "\\( x^2 + x - 6 = 0 \\)",
        dist: ["\\( x^2 - x - 6 = 0 \\)", "\\( x^2 - 5x + 6 = 0 \\)", "\\( x^2 + 5x - 6 = 0 \\)"],
        exp: "If the roots are 2 and -3, the factors are \\( (x - 2) \\) and \\( (x + 3) \\). Multiplying them out: \\( (x - 2)(x + 3) = x^2 + 3x - 2x - 6 = x^2 + x - 6 = 0 \\)."
      },
      {
        q: "The length of a rectangle is 3 meters longer than its width. The area is 28 square meters. Find the width \\( x \\).",
        ans: "4 meters",
        dist: ["7 meters", "14 meters", "-7 meters"],
        exp: "Area = width \\(\\times\\) length. \\( x(x + 3) = 28 \\). Expand to \\( x^2 + 3x - 28 = 0 \\). Factoring gives \\( (x + 7)(x - 4) = 0 \\). Since width cannot be negative, \\( x = 4 \\)."
      },
      {
        q: "A projectile's height in feet is modeled by \\( h = -16t^2 + 64t \\). At what time \\( t > 0 \\) does the object hit the ground?",
        ans: "4 seconds",
        dist: ["2 seconds", "8 seconds", "16 seconds"],
        exp: "Hit the ground means \\( h = 0 \\). So, \\( -16t^2 + 64t = 0 \\). Factor out \\(-16t\\): \\( -16t(t - 4) = 0 \\). The solutions are \\( t=0 \\) (launch) and \\( t=4 \\) (landing)."
      },
      {
        q: "Solve the linear equation to review: \\( 3(2x - 4) + 5 = 5x - (x - 9) \\)",
        ans: "\\( x = 8 \\)",
        dist: ["\\( x = -4 \\)", "\\( x = 2 \\)", "No solution"],
        exp: "Expand: \\( 6x - 12 + 5 = 5x - x + 9 \\). Combine terms: \\( 6x - 7 = 4x + 9 \\). Subtract \\( 4x \\) and add 7: \\( 2x = 16 \\). Divide by 2: \\( x = 8 \\)."
      }
    ];

    // ── Engine Variables ──
    const LETTERS = ['A', 'B', 'C', 'D'];
    const SKEY = 'activestem_quad_complex_v1';
    const MAX_TIME = 180; // 3 minutes per question (60 min total for 20 questions)

    let score = 0;
    let streak = 0;
    let currIdx = 0;
    let timeRem = MAX_TIME;
    let tInterval = null;
    let qLocked = false;
    let shuffledQ = [];
    let state = Array(rawQuestions.length).fill(null);

    // ── Helper: Fisher-Yates Shuffle ──
    function shuffle(array) {
      let cur = array.length, rand;
      while (cur !== 0) {
        rand = Math.floor(Math.random() * cur);
        cur--;
        [array[cur], array[rand]] = [array[rand], array[cur]];
      }
      return array;
    }

    // ── Initialization ──
    function init() {
      try {
        const saved = localStorage.getItem(SKEY);
        if (saved) {
          const p = JSON.parse(saved);
          score = Number.isFinite(p.score) ? p.score : 0;
          streak = Number.isFinite(p.streak) ? p.streak : 0;
          currIdx = Number.isFinite(p.currIdx) ? p.currIdx : 0;
          timeRem = Number.isFinite(p.timeRem) ? p.timeRem : MAX_TIME;
          qLocked = Boolean(p.qLocked);
          state = Array.isArray(p.state) ? p.state : Array(rawQuestions.length).fill(null);
          shuffledQ = Array.isArray(p.shuffledQ) && p.shuffledQ.length > 0 ? p.shuffledQ : shuffle([...rawQuestions]);

          if (timeRem < 0 || timeRem > MAX_TIME) timeRem = MAX_TIME;
        } else {
          shuffledQ = shuffle([...rawQuestions]);
        }
      } catch (e) {
        shuffledQ = shuffle([...rawQuestions]);
        localStorage.removeItem(SKEY);
      }

      updateHUD();
      if (currIdx < shuffledQ.length) {
        renderQuestion();
      } else {
        showEndScreen();
      }
    }

    function saveState() {
      localStorage.setItem(SKEY, JSON.stringify({ score, streak, currIdx, timeRem, qLocked, state, shuffledQ }));
    }

    function renderQuestion() {
      const q = shuffledQ[currIdx];
      const existing = state[currIdx];

      if (!existing && (timeRem <= 0 || !Number.isFinite(timeRem))) timeRem = MAX_TIME;

      // Update UI Header
      document.getElementById('qCountDisplay').innerText = `Question ${currIdx + 1} of ${shuffledQ.length}`;
      
      // Prep Options
      let opts = [];
      if (existing) {
        // If restoring, options are already saved in state to preserve order
        opts = existing.opts;
        qLocked = true;
      } else {
        opts = [ { t: q.ans, c: true }, ...q.dist.map(d => ({ t: d, c: false })) ];
        opts = shuffle(opts);
        qLocked = false;
      }

      let optsHtml = '';
      opts.forEach((o, i) => {
        let cls = "choice";
        if (existing) {
          cls += " locked";
          if (existing.sel === i) cls += " sel";
        }
        optsHtml += `
          <label class="${cls}" id="choice-${i}">
            <input type="radio" name="qRad" value="${i}" data-cor="${o.c}" ${existing && existing.sel === i ? 'checked' : ''} ${existing ? 'disabled' : ''}>
            <div class="choice-letter">${LETTERS[i]}</div>
            <div class="choice-text">${o.t}</div>
          </label>
        `;
      });

      document.getElementById('qPrompt').innerHTML = q.q;
      document.getElementById('qOpts').innerHTML = optsHtml;
      
      const card = document.getElementById('qCard');
      card.className = 'card';
      const btnNext = document.getElementById('btnNext');

      // Attach Click Listeners
      document.querySelectorAll('.choice').forEach((el, i) => {
        el.addEventListener('click', (e) => {
          if (qLocked || existing) return;
          el.querySelector('input').checked = true;
          // Store the options array order for state persistence
          state[currIdx] = { opts: opts, sel: null, isCor: null }; 
          processAnswer(i, opts[i].c);
        });
      });

      // Typeset newly injected MathJax
      if (window.MathJax) {
        if (window.MathJax.typesetClear) window.MathJax.typesetClear([card]);
        MathJax.typesetPromise([card]).catch(err => console.log(err));
      }

      if (existing) {
        clearInterval(tInterval);
        restoreLockedVisuals(existing);
        btnNext.style.display = 'block';
      } else {
        document.getElementById('fbBox').classList.remove('show');
        btnNext.style.display = 'none';
        startTimer();
      }
    }

    // ── Timer Logic ──
    function startTimer() {
      clearInterval(tInterval);
      updateTimerUI();
      
      tInterval = setInterval(() => {
        timeRem--;
        if (timeRem < 0) timeRem = 0;
        updateTimerUI();
        saveState();

        if (timeRem <= 0) {
          clearInterval(tInterval);
          // Auto-fail on timeout (time = 0)
          state[currIdx] = { opts: Array.from(document.querySelectorAll('.choice')).map((el, i) => {
             return { t: el.querySelector('.choice-text').innerHTML, c: el.querySelector('input').dataset.cor === "true" }
          }), sel: -1, isCor: false };
          processAnswer(-1, false);
        }
      }, 1000);
    }

    function updateTimerUI() {
      let m = Math.floor(timeRem / 60);
      let s = (timeRem % 60).toString().padStart(2, '0');
      document.getElementById('timeText').innerText = `${m}:${s}`;
      
      const bar = document.getElementById('tBar');
      bar.style.width = `${(timeRem / MAX_TIME) * 100}%`;
      
      if (timeRem <= 30) bar.className = 'timer-bar danger';
      else if (timeRem <= 60) bar.className = 'timer-bar warn';
      else bar.className = 'timer-bar';
    }

    // ── Game Logic & Feedback ──
    function processAnswer(selIdx, isCor) {
      if (qLocked && !state[currIdx].isCor) return; // Prevent double process if not restoring
      qLocked = true;
      clearInterval(tInterval);

      const q = shuffledQ[currIdx];
      const card = document.getElementById('qCard');
      const radios = document.getElementsByName('qRad');

      // Update State
      state[currIdx].sel = selIdx;
      state[currIdx].isCor = isCor;

      // Score Calculation
      let pointsDelta = 0;
      let fbHead = "";
      let scoreBreakdown = "";

      if (isCor) {
        // Base + Speed + Streak
        let base = 100;
        let speedBonus = Math.floor(timeRem / 2); // Max 90 points for speed
        let mult = (streak >= 2) ? 1.5 : 1.0; 
        
        pointsDelta = Math.floor((base + speedBonus) * mult);
        score += pointsDelta;
        streak++;
        
        fbHead = "CORRECT";
        card.classList.add('celebrate');
        showFloatText(`+${pointsDelta}`, 'pos');
        scoreBreakdown = `<br><span style="font-size:0.85rem; color:var(--text-muted); font-weight:700;">Base: 100 | Speed: +${speedBonus} | Mult: x${mult}</span>`;

      } else {
        // Brutal penalty, break streak
        pointsDelta = -50;
        score += pointsDelta;
        streak = 0;
        
        fbHead = selIdx === -1 ? "TIME EXPIRED" : "INCORRECT";
        card.classList.add('shake');
        showFloatText(`${pointsDelta}`, 'neg');
      }

      saveState();
      updateHUD();
      
      // Visual locks
      document.querySelectorAll('.choice').forEach((el, i) => {
        el.classList.add('locked');
        if (i !== selIdx && radios[i] && !radios[i].dataset.cor.includes("true")) {
          el.classList.add('dim');
        }
        if (radios[i] && radios[i].dataset.cor === "true") {
          el.classList.add('cor-ans');
          el.classList.remove('dim');
        } else if (i === selIdx) {
          el.classList.add('wr-ans');
        }
      });

      // Show Feedback
      const fbBox = document.getElementById('fbBox');
      const fbHeader = document.getElementById('fbHeader');
      const fbText = document.getElementById('fbText');

      fbHeader.innerText = fbHead;
      fbHeader.className = 'fb-header ' + (isCor ? 'ok' : 'no');
      fbText.innerHTML = `<strong>Explanation:</strong> ${q.exp} ${scoreBreakdown}`;
      fbBox.classList.add('show');

      document.getElementById('btnNext').style.display = 'block';

      if (window.MathJax) {
        MathJax.typesetPromise([fbBox]).catch(e => console.log(e));
      }
    }

    function restoreLockedVisuals(existing) {
      const q = shuffledQ[currIdx];
      const selIdx = existing.sel;
      const isCor = existing.isCor;
      
      document.querySelectorAll('.choice').forEach((el, i) => {
        el.classList.add('locked');
        if (i !== selIdx && !existing.opts[i].c) {
          el.classList.add('dim');
        }
        if (existing.opts[i].c) {
          el.classList.add('cor-ans');
          el.classList.remove('dim');
        } else if (i === selIdx) {
          el.classList.add('wr-ans');
        }
      });

      const fbBox = document.getElementById('fbBox');
      const fbHeader = document.getElementById('fbHeader');
      const fbText = document.getElementById('fbText');

      fbHeader.innerText = isCor ? "CORRECT" : (selIdx === -1 ? "TIME EXPIRED" : "INCORRECT");
      fbHeader.className = 'fb-header ' + (isCor ? 'ok' : 'no');
      fbText.innerHTML = `<strong>Explanation:</strong> ${q.exp}`;
      fbBox.classList.add('show');

      if (window.MathJax) {
        MathJax.typesetPromise([fbBox]).catch(e => console.log(e));
      }
    }

    function updateHUD() {
      // Score
      const sDisp = document.getElementById('scoreDisplay');
      sDisp.innerText = score;
      if (score < 0) sDisp.style.color = "var(--danger)";
      else sDisp.style.color = "var(--text)";

      // Streak
      const strkDisp = document.getElementById('streakDisplay');
      strkDisp.innerText = `🔥 x${streak}`;
      if (streak >= 3) {
        strkDisp.classList.add('active');
      } else {
        strkDisp.classList.remove('active');
      }
    }

    function showFloatText(txt, type) {
      const floatEl = document.getElementById('scoreFloat');
      // Reset animation
      floatEl.style.animation = 'none';
      floatEl.offsetHeight; // trigger reflow
      
      floatEl.innerText = txt;
      floatEl.className = `float-text float-${type}`;
    }

    function nextQuestion() {
      currIdx++;
      timeRem = MAX_TIME;
      qLocked = false;
      saveState();

      if (currIdx < shuffledQ.length) {
        renderQuestion();
      } else {
        showEndScreen();
      }
    }

    function showEndScreen() {
      clearInterval(tInterval);
      document.getElementById('quizArea').style.display = 'none';
      const endScreen = document.getElementById('endScreen');
      endScreen.style.display = 'block';
      
      const fs = document.getElementById('finalScore');
      fs.innerText = score;
      if (score < 0) fs.style.color = "var(--danger)";
    }

    function resetQuiz() {
      if (confirm('Erase this attempt and restart?')) {
        clearInterval(tInterval);
        localStorage.removeItem(SKEY);
        location.reload();
      }
    }

    // Start
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
